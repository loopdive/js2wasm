<!doctype html>
<html>
  <head>
    <title>js2wasm playground</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        scrollbar-color: #3b3b3b #181818;
      }
      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-track {
        background: #181818;
      }
      *::-webkit-scrollbar-thumb {
        background: #3b3b3b;
        border-radius: 4px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      body {
        font-family: "SF Mono", "Fira Code", monospace;
        background: #181818;
        color: #cccccc;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      h2 {
        margin-bottom: 0;
        font-size: 1.1rem;
        color: #e0e0e0;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0 1rem;
        border-top: 1px solid #2b2b2b;
        flex-shrink: 0;
      }
      .toolbar-logo {
        height: 22px;
      }
      .toolbar-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        background: none;
        border: none;
        padding: 0 0.6rem;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        height: 35px;
        align-self: center;
      }
      .toolbar-btn:hover:not(:disabled) .tb-label {
        color: #ccc;
      }
      .toolbar-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .toolbar-btn .tb-icon {
        color: #ffffff;
        font-size: 0.9rem;
        line-height: 1;
      }
      .toolbar-btn .tb-icon.lg {
        font-size: 1.15rem;
      }
      .toolbar-btn .tb-label {
        color: #666;
        transition: color 0.15s;
      }
      .toolbar-link {
        text-decoration: none;
      }
      .toolbar-spacer {
        margin-left: auto;
      }
      .timing {
        font-size: 0.75rem;
        color: #5a5a5a;
        padding: 0.3rem 0;
      }
      .toolbar-btn.icon-only {
        padding: 0 0.35rem;
        min-width: 35px;
        justify-content: center;
      }
      .toolbar-btn.icon-only .tb-icon {
        margin-right: 0;
      }
      .toolbar-btn.icon-only .tb-label {
        display: none;
      }

      /* ─── Main area ───────────────────────────────────── */
      .main-area {
        flex: 1;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }

      /* ─── Layout system ─────────────────────────────────── */
      .layout-divider-h {
        width: 6px;
        background: transparent;
        cursor: col-resize;
        position: relative;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .layout-divider-v {
        height: 6px;
        background: transparent;
        cursor: row-resize;
        position: relative;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .layout-divider-h:hover,
      .layout-divider-h.active,
      .layout-divider-v:hover,
      .layout-divider-v.active {
        background: #4e4e4e;
      }
      .layout-divider-h::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -3px;
        right: -3px;
      }
      .layout-divider-v::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: -3px;
        bottom: -3px;
      }

      /* Panel tab bar */
      .panel-tab-bar {
        display: flex;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
        overflow-x: auto;
        background: #1e1e1e;
      }
      .panel-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        cursor: grab;
        font-size: 12px;
        color: #888;
        border-right: 1px solid #2b2b2b;
        white-space: nowrap;
        flex-shrink: 0;
        user-select: none;
      }
      .panel-tab:hover {
        color: #bbb;
        background: rgba(255, 255, 255, 0.03);
      }
      .panel-tab.active {
        color: #cccccc;
        background: #181818;
      }
      .panel-tab.dragging {
        opacity: 0.4;
      }
      .panel-tab .close-btn {
        font-size: 14px;
        line-height: 1;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 3px;
        opacity: 0;
        cursor: pointer;
      }
      .panel-tab:hover .close-btn,
      .panel-tab.active .close-btn {
        opacity: 0.5;
      }
      .panel-tab .close-btn:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.1);
      }

      /* Drop overlay */
      .drop-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 100;
      }
      .drop-indicator {
        position: absolute;
        background: rgba(0, 122, 204, 0.18);
        border: 2px dashed rgba(0, 122, 204, 0.5);
        border-radius: 4px;
        transition: all 0.1s ease;
      }

      /* Drag ghost */
      .drag-ghost {
        position: absolute;
        top: -1000px;
        left: -1000px;
        padding: 4px 10px;
        background: #252526;
        border: 1px solid #007acc;
        border-radius: 4px;
        color: #ccc;
        font-size: 12px;
        font-family: inherit;
        white-space: nowrap;
      }

      /* Content panels (mounted dynamically by layout system) */
      #console-panel {
        width: 100%;
        height: 100%;
        overflow: auto;
      }
      #errors-panel {
        width: 100%;
        height: 100%;
        overflow: auto;
      }
      #preview-panel {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: auto;
        padding: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #preview-panel * {
        margin: revert;
        padding: revert;
        font: revert;
      }
      #treemap-panel {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      pre {
        background: #181818;
        padding: 0.8rem;
        overflow: auto;
        font-size: 13px;
        margin: 0;
        white-space: pre-wrap;
        height: 100%;
      }
      .error {
        color: #f48771;
      }
      .console {
        color: #b5cea8;
      }

      /* ─── Treemap panel ─────────────────────────────────── */
      .tm-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 8px;
        background: #1f1f1f;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
      }
      .tm-view-toggle {
        display: flex;
        gap: 3px;
      }
      .tm-toggle {
        padding: 2px 8px !important;
        border-radius: 3px !important;
        border: 1px solid #3b3b3b !important;
        background: transparent !important;
        color: #5a5a5a !important;
        font-size: 11px !important;
        cursor: pointer;
      }
      .tm-toggle.active {
        background: #2b2b2b !important;
        color: #cccccc !important;
      }
      .tm-threshold {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #5a5a5a;
      }
      .tm-threshold input[type="range"] {
        width: 60px;
        accent-color: #4e4e4e;
      }
      .tm-info-bar {
        padding: 3px 8px;
        font-size: 10px;
        color: #5a5a5a;
        background: #181818;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
      }
      .tm-breadcrumbs {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 2px 8px;
        font-size: 11px;
        flex-shrink: 0;
        min-height: 0;
      }
      .tm-crumb {
        padding: 1px 6px;
        border-radius: 3px;
        cursor: pointer;
        color: #9cdcfe;
        background: none;
        border: none;
        font-family: inherit;
        font-size: 11px;
      }
      .tm-crumb:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .tm-crumb-sep {
        color: #5a5a5a;
      }
      .tm-treemap {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-height: 0;
        background: #000;
      }
      .tm-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #555;
        font-size: 12px;
      }
      .tm-node {
        position: absolute;
        overflow: hidden;
        background: transparent;
      }
      .tm-node-inner {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .tm-label {
        position: absolute;
        inset: 1px;
        padding: 2px 5px;
        font-size: 11px;
        font-weight: 600;
        overflow: hidden;
        word-break: break-all;
        pointer-events: none;
        z-index: 1;
        line-height: 18px;
      }
      .tm-label-size {
        font-weight: 400;
        opacity: 0.7;
        font-size: 10px;
        white-space: nowrap;
      }
      .tm-leaf:hover {
        outline: 2px solid rgba(255, 255, 255, 0.7);
        outline-offset: -2px;
        z-index: 100;
      }
      .tm-branch:hover > .tm-node-inner {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      }
      .tm-leaf,
      .tm-branch {
        cursor: pointer;
      }
      .tm-highlight > .tm-node-inner {
        box-shadow: inset 0 0 0 2px rgba(255, 240, 150, 0.6);
      }
      .cross-highlight {
        background: rgba(255, 255, 255, 0.06) !important;
      }
      .cross-highlight-pinned {
        background: rgba(255, 240, 150, 0.12) !important;
      }
      .tm-remainder > .tm-node-inner {
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 4px,
          rgba(255, 255, 255, 0.04) 4px,
          rgba(255, 255, 255, 0.04) 8px
        ) !important;
      }
      .tm-tooltip {
        position: fixed;
        display: none;
        background: #0d1117;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 12px;
        line-height: 1.7;
        max-width: 550px;
        z-index: 10000;
        pointer-events: none;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
        font-family: "SF Mono", "Fira Code", monospace;
        color: #e0e0e0;
      }
      .tm-tt-path {
        color: #7ec8e3;
        font-weight: 600;
        word-break: break-all;
        margin-bottom: 6px;
      }
      .tm-tt-row {
        display: flex;
        justify-content: space-between;
        gap: 24px;
      }
      .tm-tt-label {
        color: #8888aa;
      }
      .tm-tt-value {
        color: #e0e0e0;
        font-weight: 500;
      }
      .tm-tt-hint {
        color: #666;
        font-size: 10px;
        margin-top: 6px;
        font-style: italic;
      }

      /* ─── Test262 browser ───────────────────────────────── */
      #test262-panel {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .t262-browser {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: #181818;
      }
      .t262-search-wrap {
        padding: 6px 8px;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
        background: #1e1e1e;
      }
      .t262-search {
        width: 100%;
        background: #2b2b2b;
        border: 1px solid #3b3b3b;
        border-radius: 3px;
        color: #ccc;
        padding: 4px 8px;
        font-family: inherit;
        font-size: 12px;
        outline: none;
      }
      .t262-search:focus {
        border-color: #555;
      }
      .t262-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      .t262-cat-header {
        padding: 4px 10px;
        cursor: pointer;
        font-size: 12px;
        color: #9cdcfe;
        user-select: none;
      }
      .t262-cat-header:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .t262-top-header {
        display: flex;
        align-items: center;
      }
      .t262-arrow {
        font-size: 9px;
        display: inline-block;
        width: 12px;
        color: #888;
      }
      .t262-cat-count {
        color: #555;
        font-size: 11px;
      }
      .t262-files {
        padding-left: 18px;
      }
      .t262-file {
        font-size: 0.7rem;
        color: #999;
        padding: 2px 10px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .t262-file:hover {
        color: #ddd;
        background: #1a1a2e;
      }
      .t262-file.active {
        color: #7c9dfc;
        background: #1a1a3a;
      }
      .bench-file-name {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bench-file-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bench-run-btn {
        flex-shrink: 0;
        font: inherit;
        font-size: 11px;
        line-height: 1;
        width: 16px;
        height: 16px;
        padding: 0;
        border: none;
        background: transparent;
        color: #6f6f6f;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .bench-run-btn:hover {
        color: #d8d8d8;
      }
      .bench-run-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .bench-result {
        position: relative;
        height: 6px;
        margin-top: 4px;
        border-radius: 999px;
        background: transparent;
        overflow: hidden;
      }
      .bench-result-label {
        margin-top: 3px;
        font-size: 10px;
        line-height: 1.2;
        color: #777;
      }
      .t262-section-header {
        font-size: 0.65rem;
        font-weight: bold;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        padding: 10px 10px 6px;
        border-bottom: 1px solid #2a2a2a;
      }
      .t262-group-header {
        font-size: 0.75rem;
        font-weight: bold;
        color: #ddd;
        padding: 4px 10px 2px;
        margin-top: 4px;
      }

      /* ─── Test262 results dashboard ────────────────────── */
      .t262-suite-summary {
        margin: 6px 0 2px 18px;
        padding-right: 10px;
        cursor: default;
      }
      .t262-suite-summary-compact {
        margin-top: 4px;
      }
      .t262-stats-segments {
        display: flex;
        height: 6px;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 4px;
      }
      .t262-stats-segments > div {
        height: 100%;
        min-width: 1px;
      }
      .t262-seg-pass {
        background: #4caf50;
      }
      .t262-seg-fail {
        background: #f44336;
      }
      .t262-seg-ce {
        background: #ff9800;
      }
      .t262-seg-skip {
        background: #555;
      }
      .t262-stats-text {
        font-size: 11px;
        color: #888;
        line-height: 1.35;
      }
      .t262-stats-text strong {
        color: #ccc;
        font-weight: 600;
      }
      .t262-no-results {
        padding: 16px 10px;
        font-size: 12px;
        color: #666;
        text-align: center;
        font-style: italic;
      }
      .t262-cat-stats {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 6px;
        font-size: 10px;
      }
      .t262-cat-bar {
        display: inline-block;
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: #333;
        overflow: hidden;
        vertical-align: middle;
      }
      .t262-cat-bar-fill {
        height: 100%;
        border-radius: 2px;
      }
      .t262-cat-pct {
        color: #888;
        font-size: 10px;
        min-width: 32px;
        text-align: right;
      }
      .t262-file-status {
        display: inline-block;
        width: 12px;
        margin-right: 4px;
        text-align: center;
        font-size: 10px;
      }
      .t262-status-pass {
        color: #4caf50;
      }
      .t262-status-fail {
        color: #f44336;
      }
      .t262-status-ce {
        color: #ff9800;
      }
      .t262-status-skip {
        color: #666;
      }

      /* ─── Hex viewer section decorations ──────────────── */
      /* Background and label colors generated dynamically from SECTION_COLORS */
      .hex-sec-label {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 0 4px;
        border-radius: 2px;
        margin-left: 4px;
      }
    </style>
  </head>

  <body>
    <div class="main-area" id="layout-root"></div>
    <div class="toolbar">
      <img src="./image-white.png" alt="js2wasm" class="toolbar-logo" />
      <button class="toolbar-btn" id="compile">
        <span class="tb-icon lg">&#9881;</span><span class="tb-label">compile</span>
      </button>
      <button class="toolbar-btn" id="run" disabled>
        <span class="tb-icon lg">&#9654;</span><span class="tb-label">run</span>
      </button>
      <button class="toolbar-btn" id="bench" disabled>
        <span class="tb-icon">&#9201;</span><span class="tb-label">bench</span>
      </button>
      <button class="toolbar-btn" id="download-wat" disabled>
        <span class="tb-icon">&#11015;</span><span class="tb-label">.wat</span>
      </button>
      <button class="toolbar-btn" id="download-wasm" disabled>
        <span class="tb-icon">&#11015;</span><span class="tb-label">.wasm</span>
      </button>
      <a class="toolbar-btn toolbar-link" href="./benchmarks/report.html">
        <span class="tb-icon">&#9638;</span><span class="tb-label">compatibility</span>
      </a>
      <a class="toolbar-btn toolbar-link" href="./dashboard/">
        <span class="tb-icon">&#9783;</span><span class="tb-label">plan</span>
      </a>
      <span class="toolbar-spacer"></span>
      <span class="timing" id="timing"></span>
      <button class="toolbar-btn icon-only" id="toggle-sidebar" title="Toggle sidebar">
        <span class="tb-icon">&#9776;</span><span class="tb-label">sidebar</span>
      </button>
      <button class="toolbar-btn icon-only" id="reset-layout" title="Reset playground">
        <span class="tb-icon">&#8634;</span><span class="tb-label">reset</span>
      </button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
