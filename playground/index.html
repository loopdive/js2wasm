<!doctype html>
<html>
  <head>
    <title>ts2wasm playground</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: "SF Mono", "Fira Code", monospace;
        background: #181818;
        color: #cccccc;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      h2 {
        margin-bottom: 0;
        font-size: 1.1rem;
        color: #e0e0e0;
      }
      .toolbar {
        display: flex;
        gap: 1rem;
        padding: 0 1rem;
        border-top: 1px solid #2b2b2b;
        flex-shrink: 0;
      }
      .toolbar-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        background: none;
        border: none;
        padding: 0 0.6rem;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        height: 35px;
        align-self: center;
      }
      .toolbar-btn:hover:not(:disabled) .tb-label {
        color: #ccc;
      }
      .toolbar-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .toolbar-btn .tb-icon {
        color: #ffffff;
        font-size: 0.9rem;
        line-height: 1;
      }
      .toolbar-btn .tb-icon.lg {
        font-size: 1.15rem;
      }
      .toolbar-btn .tb-label {
        color: #666;
        transition: color 0.15s;
      }
      .timing {
        font-size: 0.75rem;
        color: #5a5a5a;
        margin-left: auto;
        padding: 0.3rem 0;
      }

      /* ─── IDE 3-zone layout ────────────────────────────── */
      .ide-container {
        display: grid;
        grid-template-columns: var(--sidebar-width, min-content) 1px 1fr;
        flex: 1;
        min-height: 0;
      }

      /* ─── Sidebar ──────────────────────────────────────── */
      .sidebar {
        background: #181818;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        white-space: nowrap;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
      }
      .sidebar-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        flex-shrink: 0;
        border-bottom: 1px solid transparent;
      }
      .sidebar-logo img {
        height: 40px;
      }
      .sidebar-section {
        padding: 6px 12px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #bbb;
        font-weight: 700;
        flex-shrink: 0;
        background: #181818;
        border-bottom: 1px solid transparent;
      }
      .file-tree {
        flex: 1;
        overflow-y: auto;
        padding: 2px 0;
      }
      .tree-folder {
        cursor: pointer;
        user-select: none;
      }
      .tree-folder-label {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px 4px 12px;
        font-size: 13px;
        color: #ccc;
        font-weight: 700;
        transition: background 0.1s;
      }
      .tree-folder-label:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .tree-folder-arrow {
        font-size: 9px;
        width: 12px;
        text-align: center;
        transition: transform 0.1s;
        color: #888;
      }
      .tree-folder.collapsed .tree-folder-arrow {
        transform: rotate(-90deg);
      }
      .tree-folder.collapsed .tree-children {
        display: none;
      }
      .tree-file {
        display: flex;
        align-items: center;
        padding: 4px 8px 4px 32px;
        font-size: 13px;
        cursor: pointer;
        color: #ccc;
        position: relative;
        transition: background 0.1s;
        letter-spacing: 0.2px;
      }
      .tree-file:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .tree-file.active {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
      }
      .tree-file.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #007acc;
      }
      .tree-file.dimmed {
        color: #555;
      }
      .tree-file.dimmed:hover {
        color: #777;
      }

      /* ─── Sidebar divider ──────────────────────────────── */
      .divider-sidebar {
        background: transparent;
        cursor: col-resize;
        position: relative;
      }
      .divider-sidebar:hover,
      .divider-sidebar.active {
        background: #007acc;
      }
      .divider-sidebar::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -3px;
        right: -3px;
      }

      /* ─── Main area (editor + output) ──────────────────── */
      .main-area {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
      }

      /* ─── Editor area ──────────────────────────────────── */
      .editor-area {
        flex: 1;
        display: flex;
        flex-direction: row;
        min-height: 0;
      }
      .editor-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
      }
      .editor-pane .editor-container {
        flex: 1;
        min-height: 0;
      }

      /* ─── Editor divider ──────────────────────────────── */
      .divider-editor {
        width: 6px;
        background: transparent;
        cursor: col-resize;
        position: relative;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .divider-editor:hover,
      .divider-editor.active {
        background: #4e4e4e;
      }
      .divider-editor::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -3px;
        right: -3px;
      }

      /* Editor tabs */
      .editor-tabs {
        display: flex;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
        overflow-x: auto;
        background: #1e1e1e;
      }
      .editor-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 12px;
        color: #888;
        border-right: 1px solid #2b2b2b;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .editor-tab:hover {
        color: #bbb;
        background: rgba(255, 255, 255, 0.03);
      }
      .editor-tab.active {
        color: #cccccc;
        background: #181818;
      }
      .editor-tab .close-btn {
        font-size: 14px;
        line-height: 1;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 3px;
        opacity: 0;
      }
      .editor-tab:hover .close-btn,
      .editor-tab.active .close-btn {
        opacity: 0.5;
      }
      .editor-tab .close-btn:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.1);
      }
      .editor-tab .close-btn.permanent {
        display: none;
      }

      /* ─── Horizontal divider (output) ──────────────────── */
      .divider-output {
        height: 6px;
        background: transparent;
        cursor: row-resize;
        position: relative;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .divider-output:hover,
      .divider-output.active {
        background: #4e4e4e;
      }
      .divider-output::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: -3px;
        bottom: -3px;
      }

      /* ─── Output panel ─────────────────────────────────── */
      .output-panel {
        flex: 0 0 var(--output-height, 200px);
        display: flex;
        flex-direction: row;
        min-height: 0;
        border-top: 1px solid #2b2b2b;
      }
      .output-panel.collapsed {
        flex-basis: 0 !important;
        min-height: 0;
        overflow: hidden;
      }
      .output-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }
      .output-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        border-left: 1px solid #2b2b2b;
      }
      .output-tabs {
        display: flex;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
        background: #1e1e1e;
      }
      .output-tab {
        padding: 4px 12px;
        cursor: pointer;
        font-size: 11px;
        color: #5a5a5a;
        border-bottom: 2px solid transparent;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .output-tab:hover {
        color: #999;
      }
      .output-tab.active {
        color: #cccccc;
        border-bottom-color: #cccccc;
      }
      .output-tab.static {
        cursor: default;
        color: #cccccc;
        border-bottom-color: #cccccc;
      }
      .output-content {
        flex: 1;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }

      /* Output sub-panels */
      #console-panel {
        position: absolute;
        inset: 0;
        display: none;
        overflow: auto;
      }
      #errors-panel {
        position: absolute;
        inset: 0;
        display: none;
        overflow: auto;
      }
      #preview-panel {
        position: absolute;
        inset: 0;
        display: none;
        background: transparent;
        overflow: auto;
      }
      #treemap-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }
      pre {
        background: #181818;
        padding: 0.8rem;
        overflow: auto;
        font-size: 13px;
        margin: 0;
        white-space: pre-wrap;
        height: 100%;
      }
      .error {
        color: #f48771;
      }
      .console {
        color: #b5cea8;
      }

      /* ─── Treemap panel ─────────────────────────────────── */
      .tm-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 8px;
        background: #1f1f1f;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
      }
      .tm-view-toggle {
        display: flex;
        gap: 3px;
      }
      .tm-toggle {
        padding: 2px 8px !important;
        border-radius: 3px !important;
        border: 1px solid #3b3b3b !important;
        background: transparent !important;
        color: #5a5a5a !important;
        font-size: 11px !important;
        cursor: pointer;
      }
      .tm-toggle.active {
        background: #2b2b2b !important;
        color: #cccccc !important;
      }
      .tm-threshold {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #5a5a5a;
      }
      .tm-threshold input[type="range"] {
        width: 60px;
        accent-color: #4e4e4e;
      }
      .tm-info-bar {
        padding: 3px 8px;
        font-size: 10px;
        color: #5a5a5a;
        background: #181818;
        border-bottom: 1px solid #2b2b2b;
        flex-shrink: 0;
      }
      .tm-breadcrumbs {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 2px 8px;
        font-size: 11px;
        flex-shrink: 0;
        min-height: 0;
      }
      .tm-crumb {
        padding: 1px 6px;
        border-radius: 3px;
        cursor: pointer;
        color: #9cdcfe;
        background: none;
        border: none;
        font-family: inherit;
        font-size: 11px;
      }
      .tm-crumb:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .tm-crumb-sep {
        color: #5a5a5a;
      }
      .tm-treemap {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-height: 0;
      }
      .tm-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #555;
        font-size: 12px;
      }
      .tm-node {
        position: absolute;
        overflow: hidden;
        background: transparent;
      }
      .tm-node-inner {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .tm-label {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 2px 5px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
        z-index: 1;
        line-height: 18px;
      }
      .tm-label-size {
        font-weight: 400;
        opacity: 0.7;
        font-size: 10px;
      }
      .tm-leaf:hover {
        outline: 2px solid rgba(255, 255, 255, 0.7);
        outline-offset: -2px;
        z-index: 100;
      }
      .tm-branch:hover > .tm-node-inner {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      }
      .tm-leaf,
      .tm-branch {
        cursor: pointer;
      }
      .tm-remainder > .tm-node-inner {
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 4px,
          rgba(255, 255, 255, 0.04) 4px,
          rgba(255, 255, 255, 0.04) 8px
        ) !important;
      }
      .tm-tooltip {
        position: fixed;
        display: none;
        background: #0d1117;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 12px;
        line-height: 1.7;
        max-width: 550px;
        z-index: 10000;
        pointer-events: none;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
        font-family: "SF Mono", "Fira Code", monospace;
        color: #e0e0e0;
      }
      .tm-tt-path {
        color: #7ec8e3;
        font-weight: 600;
        word-break: break-all;
        margin-bottom: 6px;
      }
      .tm-tt-row {
        display: flex;
        justify-content: space-between;
        gap: 24px;
      }
      .tm-tt-label {
        color: #8888aa;
      }
      .tm-tt-value {
        color: #e0e0e0;
        font-weight: 500;
      }
      .tm-tt-hint {
        color: #666;
        font-size: 10px;
        margin-top: 6px;
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <div class="ide-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-logo">
          <img src="./image-white.png" alt="ts2wasm" />
        </div>
        <div class="sidebar-section">Explorer</div>
        <div class="file-tree" id="file-tree"></div>
      </div>
      <!-- Sidebar divider -->
      <div class="divider-sidebar" id="divider-sidebar"></div>
      <!-- Main area -->
      <div class="main-area">
        <!-- Editor area -->
        <div class="editor-area">
          <div class="editor-pane left">
            <div class="editor-tabs" id="editor-tabs-left"></div>
            <div class="editor-container" id="editor-container-left"></div>
          </div>
          <div class="divider-editor" id="divider-editor"></div>
          <div class="editor-pane right">
            <div class="editor-tabs" id="editor-tabs-right"></div>
            <div class="editor-container" id="editor-container-right"></div>
          </div>
        </div>
        <!-- Output divider -->
        <div class="divider-output" id="divider-output"></div>
        <!-- Output panel -->
        <div class="output-panel" id="output-panel">
          <div class="output-left">
            <div class="output-tabs" id="output-tabs">
              <div class="output-tab" data-panel="console">Console</div>
              <div class="output-tab" data-panel="errors">Errors</div>
              <div class="output-tab active" data-panel="preview">Preview</div>
            </div>
            <div class="output-content">
              <pre id="console-panel" class="console"></pre>
              <pre id="errors-panel" class="error"></pre>
              <div id="preview-panel" style="display: block"></div>
            </div>
          </div>
          <div class="output-right">
            <div class="output-tabs">
              <div class="output-tab static">Treemap</div>
            </div>
            <div id="treemap-panel"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="toolbar">
      <button class="toolbar-btn" id="compile">
        <span class="tb-icon lg">&#9881;</span
        ><span class="tb-label">compile</span>
      </button>
      <button class="toolbar-btn" id="run" disabled>
        <span class="tb-icon lg">&#9654;</span><span class="tb-label">run</span>
      </button>
      <button class="toolbar-btn" id="download-wat" disabled>
        <span class="tb-icon">&#11015;</span><span class="tb-label">.wat</span>
      </button>
      <button class="toolbar-btn" id="download-wasm" disabled>
        <span class="tb-icon">&#11015;</span><span class="tb-label">.wasm</span>
      </button>
      <span class="timing" id="timing"></span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
