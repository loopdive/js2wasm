<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ts2wasm — Conformance &amp; Performance Report</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --pass: #3fb950;
    --fail: #f85149;
    --skip: #8b949e;
    --error: #d29922;
    --accent: #58a6ff;
    --bar-bg: #21262d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.25rem; }
  h2 { font-size: 1.25rem; font-weight: 600; margin: 2rem 0 1rem; color: var(--text); }
  h3 { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: var(--text-muted); }
  .subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem; }
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
  }
  .card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .card .value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
  .card .pct { font-size: 0.875rem; color: var(--text-muted); }
  .cat-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8125rem;
    font-variant-numeric: tabular-nums;
  }
  .cat-table th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 2px solid var(--border);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .cat-table th.num { text-align: right; }
  .cat-table td {
    padding: 0.375rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .cat-table td.num { text-align: right; font-family: "SF Mono", SFMono-Regular, Consolas, monospace; font-size: 0.75rem; }
  .cat-table tr:hover { background: rgba(88, 166, 255, 0.04); }
  .cat-table .group-header td {
    padding-top: 1rem;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
  }
  .bar-container {
    width: 100%;
    height: 8px;
    background: var(--bar-bg);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }
  .overall-bar { height: 24px; border-radius: 6px; margin-bottom: 2rem; }
  .legend {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.375rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .bench-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .bench-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
  }
  .bench-name { font-weight: 600; font-size: 0.875rem; margin-bottom: 0.75rem; }
  .bench-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.375rem;
    font-size: 0.75rem;
  }
  .bench-label {
    width: 70px;
    flex-shrink: 0;
    color: var(--text-muted);
    font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
  }
  .bench-bar-bg {
    flex: 1;
    height: 14px;
    background: var(--bar-bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .bench-bar { height: 100%; border-radius: 3px; min-width: 2px; }
  .bench-time {
    width: 80px;
    text-align: right;
    flex-shrink: 0;
    font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
    color: var(--text-muted);
  }
  .speedup { font-size: 0.6875rem; margin-left: 0.5rem; }
  .timestamp { font-size: 0.75rem; color: var(--text-muted); margin-top: 2rem; text-align: center; }
  .clickable { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
  .clickable:hover { text-decoration-style: solid; }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.8125rem;
    outline: none;
  }
  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { border-color: var(--accent); }
  .filter-toggles {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.375rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .filter-toggle:hover { border-color: var(--text-muted); }
  .filter-toggle.active { border-color: var(--accent); background: rgba(88, 166, 255, 0.08); color: var(--text); }
  .filter-toggle .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .card.filter-card { cursor: pointer; user-select: none; transition: border-color 0.15s; }
  .card.filter-card:hover { border-color: var(--text-muted); }
  .card.filter-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .detail-row td { padding: 0 !important; border-bottom: 1px solid var(--border); }
  .detail-content {
    max-height: 300px;
    overflow-y: auto;
    padding: 0.5rem 0.75rem;
    background: rgba(0,0,0,0.2);
    font-size: 0.6875rem;
    font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
    scrollbar-color: #30363d #161b22;
  }
  .detail-content::-webkit-scrollbar { width: 6px; }
  .detail-content::-webkit-scrollbar-track { background: #161b22; }
  .detail-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .detail-file { padding: 4px 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .detail-file:last-child { border-bottom: none; }
  .detail-file-header { display: flex; align-items: baseline; gap: 0.375rem; }
  .detail-fname { color: var(--accent); word-break: break-all; }
  .detail-err { color: var(--error); word-break: break-word; white-space: pre-wrap; padding-left: 1.25rem; font-size: 0.625rem; margin-top: 2px; }
  .detail-status-pass { color: var(--pass); }
  .detail-status-fail { color: var(--fail); }
  .detail-status-err { color: var(--error); }
  .no-data { color: var(--text-muted); font-style: italic; padding: 2rem; text-align: center; }
  .trend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .trend-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
  }
  .trend-card .bench-name { margin-bottom: 0.5rem; }
  .trend-card svg { display: block; width: 100%; }
  .trend-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.6875rem;
    color: var(--text-muted);
    margin-top: 0.375rem;
    font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
  }
  .trend-delta { font-weight: 600; }
  .trend-delta.improved { color: var(--pass); }
  .trend-delta.regressed { color: var(--fail); }
  .trend-delta.neutral { color: var(--text-muted); }
</style>
</head>
<body>

<h1>ts2wasm</h1>
<div class="subtitle">ECMAScript conformance &amp; performance report</div>
<div id="app"><div class="no-data">Loading report data…</div></div>

<script>
const REPORT_JSON = "results/test262-report.json";
const BENCH_JSON = "results/latest.json";
const HISTORY_JSON = "results/history.json";
const RESULTS_JSONL = "results/test262-results.jsonl";

// Per-file results indexed by category
let filesByCategory = null;
async function loadFileResults() {
  if (filesByCategory) return filesByCategory;
  try {
    const resp = await fetch(RESULTS_JSONL);
    if (!resp.ok) return null;
    const text = await resp.text();
    filesByCategory = new Map();
    for (const line of text.split("\n")) {
      if (!line.trim()) continue;
      const entry = JSON.parse(line);
      const cat = entry.category;
      if (!filesByCategory.has(cat)) filesByCategory.set(cat, []);
      filesByCategory.get(cat).push(entry);
    }
    return filesByCategory;
  } catch { return null; }
}

async function loadJSON(url) {
  try { const r = await fetch(url); return r.ok ? r.json() : null; } catch { return null; }
}

function shortName(cat) {
  return cat
    .replace("built-ins/Math/", "Math.")
    .replace("built-ins/Array/prototype/", "Array.")
    .replace("built-ins/Number/", "Number.")
    .replace("built-ins/Object/", "Object.")
    .replace("built-ins/JSON/", "JSON.")
    .replace("built-ins/", "")
    .replace("language/expressions/", "expr/")
    .replace("language/statements/", "stmt/")
    .replace("language/types/", "types/");
}

function groupName(cat) {
  if (cat.startsWith("built-ins/Math/")) return "Math";
  if (cat.startsWith("built-ins/Array/")) return "Array";
  if (cat.startsWith("built-ins/Number/")) return "Number";
  if (cat.startsWith("built-ins/Object/")) return "Object";
  if (cat.startsWith("built-ins/JSON/")) return "JSON";
  if (cat.startsWith("built-ins/is")) return "Global Functions";
  if (cat.startsWith("language/expressions/")) return "Expressions";
  if (cat.startsWith("language/statements/")) return "Statements";
  if (cat.startsWith("language/types/")) return "Types";
  return "Other";
}

function escapeHtml(str) {
  if (typeof str !== "string") return str;
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// Source file cache and line fetcher
const _srcCache = new Map();
const _srcQueue = [];
let _srcFetching = 0;
const MAX_CONCURRENT_FETCHES = 4;

function fetchSourceLines(filePath, errText, afterEl) {
  const lineMatch = errText.match(/L(\d+):(\d+)\s/);
  if (!lineMatch) return;
  const lineNo = parseInt(lineMatch[1], 10);
  const normalized = filePath.startsWith("test/") ? filePath : "test/" + filePath;
  const base = window.location.pathname.replace(/\/benchmarks\/.*$/, "");
  const url = base + "/test262/" + normalized;

  const cached = _srcCache.get(normalized);
  if (cached !== undefined) { if (cached) renderSrcContext(cached, lineNo, afterEl); return; }
  // Queue the fetch to avoid overwhelming the server
  _srcQueue.push({ normalized, url, lineNo, afterEl });
  _drainSrcQueue();
}

function _drainSrcQueue() {
  while (_srcFetching < MAX_CONCURRENT_FETCHES && _srcQueue.length > 0) {
    const job = _srcQueue.shift();
    // Check cache again (may have been fetched by another job)
    const cached = _srcCache.get(job.normalized);
    if (cached !== undefined) { if (cached) renderSrcContext(cached, job.lineNo, job.afterEl); continue; }
    _srcFetching++;
    fetch(job.url).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.text();
    }).then(t => {
      _srcCache.set(job.normalized, t);
      renderSrcContext(t, job.lineNo, job.afterEl);
    }).catch(() => {
      _srcCache.set(job.normalized, null);
    }).finally(() => {
      _srcFetching--;
      _drainSrcQueue();
    });
  }
}
function renderSrcContext(src, lineNo, afterEl) {
  if (!src || lineNo < 1) return;
  const lines = src.split("\n");
  if (lineNo > lines.length) return;
  // Show the target line + a few surrounding lines for multi-line statements
  const start = Math.max(0, lineNo - 2);
  const end = Math.min(lines.length, lineNo + 3);
  const sd = el("div", { style: { fontFamily: "'SF Mono', SFMono-Regular, Consolas, monospace", fontSize: "0.625rem", paddingLeft: "1.25rem", marginTop: "2px", background: "rgba(0,0,0,0.2)", padding: "4px 8px 4px 1.25rem", borderRadius: "3px", whiteSpace: "pre", overflowX: "auto", maxWidth: "100%", lineHeight: "1.4" } });
  for (let i = start; i < end; i++) {
    const isTarget = i === lineNo - 1;
    const numSpan = el("span", { style: { color: isTarget ? "var(--error)" : "var(--text-muted)", marginRight: "0.75rem", userSelect: "none", display: "inline-block", width: "3ch", textAlign: "right" } }, String(i + 1));
    const lineSpan = el("span", { style: { color: isTarget ? "var(--text)" : "var(--text-muted)" } }, lines[i]);
    const row = el("div", { style: { background: isTarget ? "rgba(248,81,73,0.08)" : "none" } });
    row.appendChild(numSpan);
    row.appendChild(lineSpan);
    sd.appendChild(row);
  }
  afterEl.after(sd);
}

function pct(n, d) { return d > 0 ? Math.round(n / d * 100) : 0; }
function fmt(ms) {
  if (ms < 0.001) return "<0.001ms";
  if (ms < 1) return ms.toFixed(3) + "ms";
  if (ms < 100) return ms.toFixed(1) + "ms";
  return Math.round(ms) + "ms";
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k === "className") e.className = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function makeBar(passW, failW, errW, extraClass) {
  const container = el("div", { className: "bar-container" + (extraClass ? " " + extraClass : "") });
  container.appendChild(el("div", { style: { width: passW + "%", background: "var(--pass)" } }));
  container.appendChild(el("div", { style: { width: failW + "%", background: "var(--fail)" } }));
  container.appendChild(el("div", { style: { width: errW + "%", background: "var(--error)" } }));
  return container;
}

function makeLegend(items) {
  const legend = el("div", { className: "legend" });
  for (const [label, color] of items) {
    const dot = el("div", { className: "legend-dot", style: { background: color } });
    const item = el("div", { className: "legend-item" }, dot, " " + label);
    legend.appendChild(item);
  }
  return legend;
}

function makeCard(label, value, colorVar, subtext) {
  const card = el("div", { className: "card" });
  card.appendChild(el("div", { className: "label" }, label));
  const valEl = el("div", { className: "value", style: { color: colorVar || "inherit" } }, String(value));
  card.appendChild(valEl);
  if (subtext) card.appendChild(el("div", { className: "pct" }, subtext));
  return card;
}

function toggleDetail(row, catName, statusFilter) {
  const existing = row.nextElementSibling;
  if (existing && existing.classList.contains("detail-row")) {
    existing.remove();
    return;
  }
  // Remove any other open detail rows in this table
  row.closest("tbody").querySelectorAll(".detail-row").forEach(r => r.remove());

  const detailRow = el("tr", { className: "detail-row" });
  const detailCell = el("td", { colspan: "7" });
  const content = el("div", { className: "detail-content" }, "Loading…");
  detailCell.appendChild(content);
  detailRow.appendChild(detailCell);
  row.after(detailRow);

  loadFileResults().then(map => {
    if (!map) { content.textContent = "No file-level data available."; return; }
    const files = map.get(catName) || [];
    const filtered = statusFilter ? files.filter(f => f.status === statusFilter) : files;
    if (filtered.length === 0) { content.textContent = "No matching files."; return; }
    content.textContent = "";
    // Sort: compile_error first, then fail, then pass
    const order = { compile_error: 0, fail: 1, pass: 2, skip: 3 };
    filtered.sort((a, b) => (order[a.status] ?? 4) - (order[b.status] ?? 4));
    for (const f of filtered) {
      const fname = f.file.replace("test/", "");
      const safeFname = escapeHtml(fname);
      const safeError = f.error ? escapeHtml(f.error) : "";
      const fileEl = el("div", { className: "detail-file" });
      const statusCls = f.status === "pass" ? "detail-status-pass"
        : f.status === "fail" ? "detail-status-fail" : "detail-status-err";
      const hdr = el("div", { className: "detail-file-header" });
      hdr.appendChild(el("span", { className: statusCls, style: { flexShrink: "0" } },
        f.status === "pass" ? "\u2713" : f.status === "fail" ? "\u2717" : "\u26A0"));
      hdr.appendChild(el("span", { className: "detail-fname" }, safeFname));
      fileEl.appendChild(hdr);
      if (f.error) {
        const errDiv = el("div", { className: "detail-err" }, f.error);
        fileEl.appendChild(errDiv);
        fetchSourceLines(f.file, f.error, errDiv);
      }
      content.appendChild(fileEl);
    }
  });
}

function renderConformance(data, container) {
  const s = data.summary;
  const passRate = pct(s.pass, s.pass + s.fail);

  container.appendChild(el("h2", null, "Test262 Conformance"));

  // --- Summary cards (clickable as status filters) ---
  const summary = el("div", { className: "summary" });

  const totalCard = makeCard("Total Tests", s.total.toLocaleString());
  summary.appendChild(totalCard);

  const statusCards = {
    pass: makeCard("Passed", s.pass, "var(--pass)", passRate + "% of compilable"),
    fail: makeCard("Failed", s.fail, s.fail ? "var(--fail)" : "inherit"),
    compile_error: makeCard("Compile Errors", s.compile_error, "var(--error)"),
    skip: makeCard("Skipped", s.skip.toLocaleString(), "var(--text-muted)", "unsupported features")
  };

  let activeStatusFilter = null;

  function applyFilters() {
    const query = searchInput.value.toLowerCase().trim();
    // Remove any open detail rows
    tbody.querySelectorAll(".detail-row").forEach(r => r.remove());

    for (const [group, { groupRow, catRows }] of rowsByGroup) {
      let groupVisible = false;
      for (const { row, cat } of catRows) {
        const nameMatch = !query || cat.name.toLowerCase().includes(query) || shortName(cat.name).toLowerCase().includes(query);
        let statusMatch = true;
        if (activeStatusFilter) {
          statusMatch = cat[activeStatusFilter] > 0;
        }
        const visible = nameMatch && statusMatch;
        row.style.display = visible ? "" : "none";
        if (visible) groupVisible = true;
      }
      groupRow.style.display = groupVisible ? "" : "none";
    }
  }

  // Detail panel for showing all files matching a status filter
  const detailPanel = el("div", { id: "status-detail-panel", style: { display: "none", marginBottom: "1.5rem" } });

  for (const [status, card] of Object.entries(statusCards)) {
    card.classList.add("filter-card");
    card.addEventListener("click", () => {
      if (activeStatusFilter === status) {
        activeStatusFilter = null;
        card.classList.remove("active");
        detailPanel.style.display = "none";
      } else {
        for (const c of Object.values(statusCards)) c.classList.remove("active");
        activeStatusFilter = status;
        card.classList.add("active");
        showStatusDetail(status);
      }
      applyFilters();
    });
    summary.appendChild(card);
  }

  async function showStatusDetail(status) {
    detailPanel.style.display = "block";
    detailPanel.innerHTML = "";
    const header = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" } });
    const statusLabel = status === "compile_error" ? "Compile Errors" : status === "pass" ? "Passed" : status === "fail" ? "Failed" : "Skipped";
    const statusColor = status === "pass" ? "var(--pass)" : status === "fail" ? "var(--fail)" : status === "compile_error" ? "var(--error)" : "var(--text-muted)";
    header.appendChild(el("h3", { style: { color: statusColor, margin: "0" } }, statusLabel + " — All Files"));
    const closeBtn = el("span", { className: "clickable", style: { color: "var(--text-muted)", fontSize: "0.875rem" } }, "[close]");
    closeBtn.addEventListener("click", () => { activeStatusFilter = null; for (const c of Object.values(statusCards)) c.classList.remove("active"); detailPanel.style.display = "none"; applyFilters(); });
    header.appendChild(closeBtn);
    detailPanel.appendChild(header);

    const searchRow = el("div", { style: { marginBottom: "0.5rem" } });
    const detailSearch = el("input", { className: "search-box", type: "text", placeholder: "Filter files..." , style: { width: "100%" } });
    searchRow.appendChild(detailSearch);
    detailPanel.appendChild(searchRow);

    const content = el("div", { className: "detail-content", style: { maxHeight: "500px" } });
    content.textContent = "Loading file data...";
    detailPanel.appendChild(content);

    const map = await loadFileResults();
    if (!map) { content.textContent = "No file-level data available."; return; }

    const allFiles = [];
    for (const [cat, files] of map) {
      for (const f of files) {
        if (f.status === status) allFiles.push(f);
      }
    }
    allFiles.sort((a, b) => {
      if (a.error && !b.error) return -1;
      if (!a.error && b.error) return 1;
      return (a.file || "").localeCompare(b.file || "");
    });

    function renderFiles(filter) {
      content.textContent = "";
      const q = (filter || "").toLowerCase();
      let shown = 0;
      for (const f of allFiles) {
        const fname = (f.file || "").replace("test/", "");
        const err = f.error || f.reason || "";
        if (q && !fname.toLowerCase().includes(q) && !err.toLowerCase().includes(q)) continue;
        const fileEl = el("div", { className: "detail-file" });
        const statusCls = f.status === "pass" ? "detail-status-pass" : f.status === "fail" ? "detail-status-fail" : "detail-status-err";
        const icon = f.status === "pass" ? "\u2713" : f.status === "fail" ? "\u2717" : f.status === "skip" ? "\u23ED" : "\u26A0";
        const headerRow = el("div", { className: "detail-file-header" });
        headerRow.appendChild(el("span", { className: statusCls, style: { flexShrink: "0" } }, icon));
        headerRow.appendChild(el("span", { className: "detail-fname" }, fname));
        fileEl.appendChild(headerRow);
        if (err) {
          const errDiv = el("div", { className: "detail-err" }, err);
          fileEl.appendChild(errDiv);
          fetchSourceLines(f.file || fname, err, errDiv);
        }
        content.appendChild(fileEl);
        shown++;
        if (shown >= 2000) { content.appendChild(el("div", { style: { color: "var(--text-muted)", padding: "0.5rem 0" } }, "... " + (allFiles.length - shown) + " more files (refine search to see all)")); break; }
      }
      if (shown === 0) content.textContent = "No matching files.";
    }

    renderFiles("");
    detailSearch.addEventListener("input", () => renderFiles(detailSearch.value));
  }

  container.appendChild(summary);
  container.appendChild(detailPanel);

  container.appendChild(makeBar(pct(s.pass, s.total), pct(s.fail, s.total), pct(s.compile_error, s.total), "overall-bar"));

  container.appendChild(makeLegend([
    ["Pass", "var(--pass)"], ["Fail", "var(--fail)"],
    ["Compile Error", "var(--error)"], ["Skip", "var(--bar-bg)"]
  ]));

  // --- Search / filter bar ---
  const filterBar = el("div", { className: "filter-bar" });
  const searchInput = el("input", { className: "search-box", type: "text", placeholder: "Search categories..." });
  searchInput.addEventListener("input", applyFilters);
  filterBar.appendChild(searchInput);
  container.appendChild(filterBar);

  container.appendChild(el("h3", null, "By Category"));

  const table = el("table", { className: "cat-table" });
  const thead = el("thead");
  const headerRow = el("tr");
  for (const [text, cls] of [["Category",""], ["Pass","num"], ["Fail","num"], ["Err","num"], ["Skip","num"], ["Rate","num"], ["Distribution",""]]) {
    headerRow.appendChild(el("th", cls ? { className: cls } : null, text));
  }
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = el("tbody");

  // Group categories
  const groups = new Map();
  for (const cat of data.categories) {
    const g = groupName(cat.name);
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(cat);
  }

  // Track rows for filtering
  const rowsByGroup = new Map();

  for (const [group, cats] of groups) {
    const gPass = cats.reduce((a, c) => a + c.pass, 0);
    const gTotal = cats.reduce((a, c) => a + c.pass + c.fail + c.skip + c.compile_error, 0);

    const groupRow = el("tr", { className: "group-header" });
    groupRow.appendChild(el("td", { colspan: "7" }, group + " (" + gPass + " pass / " + gTotal + " total)"));
    tbody.appendChild(groupRow);

    const catRows = [];

    for (const cat of cats) {
      const total = cat.pass + cat.fail + cat.skip + cat.compile_error;
      const compilable = cat.pass + cat.fail;
      const catPct = pct(cat.pass, compilable);

      const row = el("tr");
      const nameCell = el("td", { className: "cat-name clickable" }, shortName(cat.name));
      nameCell.addEventListener("click", () => toggleDetail(row, cat.name, null));
      row.appendChild(nameCell);

      const passCell = el("td", { className: "num" + (cat.pass ? " clickable" : ""), style: { color: "var(--pass)" } }, String(cat.pass));
      if (cat.pass) passCell.addEventListener("click", (e) => { e.stopPropagation(); toggleDetail(row, cat.name, "pass"); });
      row.appendChild(passCell);

      const failCell = el("td", { className: "num" + (cat.fail ? " clickable" : ""), style: { color: cat.fail ? "var(--fail)" : "var(--text-muted)" } }, String(cat.fail));
      if (cat.fail) failCell.addEventListener("click", (e) => { e.stopPropagation(); toggleDetail(row, cat.name, "fail"); });
      row.appendChild(failCell);

      const errCell = el("td", { className: "num" + (cat.compile_error ? " clickable" : ""), style: { color: cat.compile_error ? "var(--error)" : "var(--text-muted)" } }, String(cat.compile_error));
      if (cat.compile_error) errCell.addEventListener("click", (e) => { e.stopPropagation(); toggleDetail(row, cat.name, "compile_error"); });
      row.appendChild(errCell);

      row.appendChild(el("td", { className: "num", style: { color: "var(--text-muted)" } }, String(cat.skip)));
      row.appendChild(el("td", { className: "num" }, compilable > 0 ? catPct + "%" : "\u2014"));

      const barCell = el("td", { style: { width: "120px" } });
      barCell.appendChild(makeBar(pct(cat.pass, total), pct(cat.fail, total), pct(cat.compile_error, total)));
      row.appendChild(barCell);

      tbody.appendChild(row);
      catRows.push({ row, cat });
    }

    rowsByGroup.set(group, { groupRow, catRows });
  }

  table.appendChild(tbody);
  container.appendChild(table);
}

function renderBenchmarks(data, container) {
  container.appendChild(el("h2", null, "Performance Benchmarks"));
  container.appendChild(makeLegend([
    ["JavaScript", "var(--text-muted)"],
    ["Host-call (wasm)", "var(--accent)"],
    ["GC-native (wasm)", "var(--pass)"]
  ]));

  const byName = new Map();
  for (const b of data) {
    if (!byName.has(b.name)) byName.set(b.name, {});
    byName.get(b.name)[b.strategy] = b;
  }

  const benchGroups = new Map();
  for (const [name, strats] of byName) {
    const group = name.split("/")[0];
    if (!benchGroups.has(group)) benchGroups.set(group, []);
    benchGroups.get(group).push({ name, strats });
  }

  const stratColors = { js: "var(--text-muted)", "host-call": "var(--accent)", "gc-native": "var(--pass)" };

  for (const [group, benchmarks] of benchGroups) {
    container.appendChild(el("h3", null, group.charAt(0).toUpperCase() + group.slice(1)));
    const grid = el("div", { className: "bench-grid" });

    for (const { name, strats } of benchmarks) {
      const card = el("div", { className: "bench-card" });
      const nameEl = el("div", { className: "bench-name" }, name.split("/")[1]);

      // Speedup info
      const js = strats["js"];
      const hc = strats["host-call"];
      const gc = strats["gc-native"];
      if (js && hc) {
        const ratio = js.medianMs / hc.medianMs;
        if (ratio > 1) {
          const sp = el("span", { className: "speedup", style: { color: "var(--pass)" } }, "host " + ratio.toFixed(1) + "\u00d7 faster");
          nameEl.appendChild(sp);
        } else if (ratio < 0.5) {
          const sp = el("span", { className: "speedup", style: { color: "var(--error)" } }, "host " + (1/ratio).toFixed(1) + "\u00d7 slower");
          nameEl.appendChild(sp);
        }
      }
      card.appendChild(nameEl);

      let localMax = 0;
      for (const b of Object.values(strats)) if (b.medianMs > localMax) localMax = b.medianMs;
      if (localMax === 0) localMax = 1;

      for (const strategy of ["js", "host-call", "gc-native"]) {
        const b = strats[strategy];
        if (!b) continue;
        const barW = Math.max(1, (b.medianMs / localMax) * 100);

        const row = el("div", { className: "bench-row" });
        row.appendChild(el("span", { className: "bench-label" }, strategy));

        const barBg = el("div", { className: "bench-bar-bg" });
        barBg.appendChild(el("div", { className: "bench-bar", style: { width: barW + "%", background: stratColors[strategy] } }));
        row.appendChild(barBg);

        row.appendChild(el("span", { className: "bench-time" }, fmt(b.medianMs)));
        card.appendChild(row);
      }

      grid.appendChild(card);
    }
    container.appendChild(grid);
  }
}

const STRAT_COLORS = {
  js: "#8b949e",
  "host-call": "#58a6ff",
  "gc-native": "#3fb950",
  "linear-memory": "#d29922"
};

function renderTrends(history, container) {
  if (!history || history.length < 2) return;

  container.appendChild(el("h2", null, "Performance Trends"));
  container.appendChild(el("div", { className: "subtitle" }, history.length + " benchmark runs"));
  container.appendChild(makeLegend([
    ["JavaScript", STRAT_COLORS.js],
    ["Host-call", STRAT_COLORS["host-call"]],
    ["GC-native", STRAT_COLORS["gc-native"]],
    ["Linear-memory", STRAT_COLORS["linear-memory"]]
  ]));

  // Collect all benchmark names that appear in at least 2 runs
  const allNames = new Set();
  for (const run of history) {
    for (const name of Object.keys(run.benchmarks)) allNames.add(name);
  }

  const benchGroups = new Map();
  for (const name of [...allNames].sort()) {
    const group = name.split("/")[0];
    if (!benchGroups.has(group)) benchGroups.set(group, []);
    benchGroups.get(group).push(name);
  }

  for (const [group, names] of benchGroups) {
    container.appendChild(el("h3", null, group.charAt(0).toUpperCase() + group.slice(1)));
    const grid = el("div", { className: "trend-grid" });

    for (const name of names) {
      // Collect data points per strategy
      const stratData = {};
      for (let i = 0; i < history.length; i++) {
        const b = history[i].benchmarks[name];
        if (!b) continue;
        for (const [strat, ms] of Object.entries(b)) {
          if (!stratData[strat]) stratData[strat] = [];
          stratData[strat].push({ idx: i, ms });
        }
      }

      // Skip if fewer than 2 data points for all strategies
      const hasData = Object.values(stratData).some(d => d.length >= 2);
      if (!hasData) continue;

      const card = el("div", { className: "trend-card" });
      const shortN = name.split("/")[1] || name;
      const nameEl = el("div", { className: "bench-name" }, shortN);
      card.appendChild(nameEl);

      // SVG sparkline chart
      const W = 300, H = 80, PAD = 4;
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", "0 0 " + W + " " + H);
      svg.setAttribute("preserveAspectRatio", "none");
      svg.style.height = H + "px";

      // Find global min/max across all strategies for this benchmark
      let globalMin = Infinity, globalMax = 0;
      for (const pts of Object.values(stratData)) {
        for (const p of pts) {
          if (p.ms < globalMin) globalMin = p.ms;
          if (p.ms > globalMax) globalMax = p.ms;
        }
      }
      if (globalMax === globalMin) globalMax = globalMin + 1;
      // Add 10% padding
      const range = globalMax - globalMin;
      globalMin = Math.max(0, globalMin - range * 0.1);
      globalMax = globalMax + range * 0.1;

      const xScale = (idx) => PAD + (idx / (history.length - 1)) * (W - 2 * PAD);
      const yScale = (ms) => PAD + (1 - (ms - globalMin) / (globalMax - globalMin)) * (H - 2 * PAD);

      // Draw lines for each strategy
      for (const [strat, pts] of Object.entries(stratData)) {
        if (pts.length < 2) continue;
        const color = STRAT_COLORS[strat] || "#888";

        let d = "";
        for (let i = 0; i < pts.length; i++) {
          const x = xScale(pts[i].idx);
          const y = yScale(pts[i].ms);
          d += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
        }

        const path = document.createElementNS(svgNS, "path");
        path.setAttribute("d", d);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", color);
        path.setAttribute("stroke-width", "2");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        svg.appendChild(path);

        // Draw dots at each point
        for (const p of pts) {
          const circle = document.createElementNS(svgNS, "circle");
          circle.setAttribute("cx", xScale(p.idx).toFixed(1));
          circle.setAttribute("cy", yScale(p.ms).toFixed(1));
          circle.setAttribute("r", "3");
          circle.setAttribute("fill", color);
          svg.appendChild(circle);
        }
      }

      card.appendChild(svg);

      // Show delta for the primary strategy (host-call preferred, then gc-native, then js)
      const primaryStrat = stratData["host-call"] ? "host-call"
        : stratData["gc-native"] ? "gc-native" : "js";
      const pts = stratData[primaryStrat];
      if (pts && pts.length >= 2) {
        const first = pts[0].ms;
        const last = pts[pts.length - 1].ms;
        const delta = ((last - first) / first) * 100;
        const meta = el("div", { className: "trend-meta" });

        const firstDate = history[pts[0].idx].timestamp.split("T")[0];
        const lastDate = history[pts[pts.length - 1].idx].timestamp.split("T")[0];
        meta.appendChild(el("span", null, firstDate + " \u2192 " + lastDate));

        const deltaClass = delta < -5 ? "improved" : delta > 5 ? "regressed" : "neutral";
        const deltaText = delta > 0 ? "+" + delta.toFixed(0) + "%" : delta.toFixed(0) + "%";
        meta.appendChild(el("span", { className: "trend-delta " + deltaClass },
          deltaText + " (" + primaryStrat + ")"));

        card.appendChild(meta);
      }

      grid.appendChild(card);
    }
    container.appendChild(grid);
  }
}

async function main() {
  const [conformance, benchmarks, history] = await Promise.all([
    loadJSON(REPORT_JSON), loadJSON(BENCH_JSON), loadJSON(HISTORY_JSON)
  ]);
  const app = document.getElementById("app");
  app.textContent = "";

  if (conformance) {
    renderConformance(conformance, app);
  } else {
    app.appendChild(el("div", { className: "no-data" }, "No test262 report found. Run: npx vitest run tests/test262.test.ts"));
  }

  if (benchmarks) {
    renderBenchmarks(benchmarks, app);
  }

  if (history && history.length >= 2) {
    renderTrends(history, app);
  }

  if (conformance) {
    app.appendChild(el("div", { className: "timestamp" }, "Generated " + new Date(conformance.timestamp).toLocaleString()));
  }
}

main();
</script>
