<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="../frame-nav-sync.js"></script>
    <title>Project JS2</title>
    <style>
      :root {
        --bg: #060a14;
        --surface: rgba(255, 255, 255, 0.05);
        --surface-2: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.46);
        --accent: #6c8aff;
        --accent-dim: #4a5fa0;
        --green: #4ade80;
        --green-dim: rgba(74, 222, 128, 0.1);
        --red: #f87171;
        --red-dim: rgba(248, 113, 113, 0.1);
        --yellow: #fbbf24;
        --yellow-dim: rgba(251, 191, 36, 0.1);
        --orange: #fb923c;
        --purple: #a78bfa;
        --radius: 0;
        --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: "JetBrains Mono", "SF Mono", SFMono-Regular, Consolas, monospace;
        /* nav component variables */
        --fg: #ffffff;
        --fg-soft: rgba(255, 255, 255, 0.68);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(255, 255, 255, 0.22);
        --surface-hover: rgba(255, 255, 255, 0.08);
        --nav: rgba(6, 10, 20, 0.45);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        padding: 88px 48px 48px;
        min-height: 100vh;
        margin: 0;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;

        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 20px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      header .meta {
        font-size: 12px;
        color: var(--text-muted);
        text-align: right;
      }

      header .meta .updated {
        color: var(--text-muted);
      }

      /* Metric cards row — matches landing page .stats-grid */
      .metrics-row {
        display: flex;
        flex: 1;
        justify-content: space-evenly;
        border: none;
        margin: 0;
        flex-wrap: nowrap;
        min-width: 0;
      }

      .metric-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
        border: none;
        background: none;
        white-space: nowrap;
      }

      .metric-card .value {
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.05em;
        color: var(--text);
        margin-bottom: 8px;
        order: -1;
      }

      .metric-card .label {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .metric-card .sub {
        display: none;
      }

      .metric-card .value.green,
      .metric-card .value.red,
      .metric-card .value.yellow,
      .metric-card .value.accent {
        color: #ffffff;
      }

      /* Section layout */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 32px;
      }

      @media (max-width: 1100px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: none;
        border: none;

        padding: 20px 0;
        overflow: visible;
      }

      .panel h2 {
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.46);
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }

      .panel-head h2 {
        margin: 0;
        padding: 0;
        border: 0;
      }

      .panel-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .panel-actions a {
        color: var(--accent);
        text-decoration: none;
        font-size: 12px;
      }

      .panel-actions a:hover {
        text-decoration: underline;
      }

      .sprint-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sprint-controls label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
      }

      .sprint-controls input,
      .sprint-controls select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 8px;
        font-family: var(--font);
        font-size: 12px;
      }

      .sprint-controls input {
        width: 84px;
      }

      .sprint-nav-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        cursor: pointer;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        font-size: 14px;
        padding: 0;
        line-height: 1;
      }

      .sprint-nav-btn:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.28);
      }

      #issue-search {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 10px;
        font-family: var(--font);
        font-size: 12px;
        width: 160px;
        outline: none;
      }

      #issue-search::placeholder {
        color: var(--text-muted);
      }

      #issue-search:focus {
        border-color: rgba(255, 255, 255, 0.28);
      }

      #refresh-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0 4px;
        font-size: 22px;
        line-height: 1;
        display: flex;
        align-items: center;
        opacity: 0.55;
      }

      #refresh-btn:hover {
        opacity: 1;
      }

      /* Kanban board */
      .kanban {
        margin-bottom: 24px;
      }

      .kanban-board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
      }

      #overview,
      #kanban,
      #dependencies {
        scroll-margin-top: 72px;
      }

      @media (max-width: 900px) {
        .kanban-board {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .kanban-board {
          grid-template-columns: 1fr;
        }
      }

      .kanban-col {
        background: var(--bg);
        border-radius: var(--radius);
        padding: 10px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .kanban-col-body {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
        padding-top: 28px;
        mask-image: linear-gradient(to bottom, transparent 0%, black 28px, black calc(100% - 28px), transparent 100%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 28px,
          black calc(100% - 28px),
          transparent 100%
        );
      }

      .kanban-col-header {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .kanban-col-header .count {
        background: var(--surface-2);
        border-radius: 10px;
        padding: 1px 8px;
        font-size: 10px;
        color: var(--text-muted);
      }

      .kanban-card {
        padding: 18px 18px 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.025);
        margin-bottom: 8px;
        cursor: default;
        transition:
          background 0.18s ease,
          border-color 0.18s ease;
      }

      .kanban-card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.22);
      }

      .kanban-card .title {
        display: block;
        font-size: 16px;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 8px;
      }

      .kanban-card .card-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .kanban-card .issue-num {
        color: rgba(255, 255, 255, 0.46);
        font-size: 12px;
      }

      .kanban-card .card-meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .tag {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 500;
      }

      .tag.high {
        background: var(--red-dim);
        color: var(--red);
      }
      .tag.medium {
        background: var(--yellow-dim);
        color: var(--yellow);
      }
      .tag.low {
        background: rgba(107, 138, 255, 0.15);
        color: var(--accent);
      }
      .tag.wont-fix {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-muted);
      }

      /* Sprint table */
      .sprint-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .sprint-table th {
        text-align: left;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
      }

      .sprint-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      .sprint-table tr:last-child td {
        border-bottom: none;
      }
      .sprint-table tr:hover td {
        background: var(--surface-2);
      }

      /* Loading state */
      .loading {
        color: var(--text-muted);
        font-size: 13px;
        text-align: center;
        padding: 40px;
      }

      .loading::after {
        content: "";
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .kanban-col-body::-webkit-scrollbar {
        width: 4px;
      }
      .kanban-col-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      #sprint-timeline {
        scrollbar-width: none;
      }
      #sprint-timeline:hover {
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      #sprint-timeline::-webkit-scrollbar {
        height: 0;
      }
      #sprint-timeline:hover::-webkit-scrollbar {
        height: 4px;
      }
      #sprint-timeline::-webkit-scrollbar-track {
        background: transparent;
      }
      #sprint-timeline::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <site-nav
      base="../"
      links='[{"label":"Overview","href":"#overview"},{"label":"Sprint","href":"#kanban"},{"label":"Issues","href":"#dependencies"}]'
    ></site-nav>
    <header
      id="overview"
      style="display: flex; align-items: baseline; gap: 8px; border-bottom: none; padding-bottom: 0; flex-wrap: wrap"
    >
      <div class="metrics-row" id="metrics-row">
        <div class="metric-card">
          <span class="value" id="m-passrate">—</span>
          <span class="label">pass</span>

        <div class="metric-card">

        <div class="metric-card">

    <!-- Kanban -->
    <div id="kanban" class="panel kanban" style="border-top: none">
      <div class="panel-head">
        <div style="display: flex; align-items: center; gap: 12px">
          <h2>Issue Board</h2>
          <input type="search" id="issue-search" placeholder="Filter issues…" autocomplete="off" />
        </div>
        <div class="panel-actions">
          <div class="sprint-controls">

            <select id="sprint-select"></select>

          </div>
          <button id="refresh-btn" onclick="refreshData()" title="Refresh">↺</button>
          <a href="../issues-graph.html">dependency graph</a>
        </div>
      </div>
      <div class="kanban-board" id="kanban-board">
        <div class="kanban-col">
          <div class="kanban-col-header">
            Ready
            <span class="count" id="col-ready-count">0</span>
          </div>
          <div class="kanban-col-body" id="col-ready"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-header">
            In Progress
            <span class="count" id="col-inprogress-count">0</span>

          <div class="kanban-col-body" id="col-inprogress"></div>
        </div>
        <div class="kanban-col">

            <span class="count" id="col-done-count">0</span>

    <div id="dependencies" class="panel">
      <div class="panel-head">
        <h2>Dependency graph</h2>
        <div class="panel-actions">
          <a href="../issues-graph.html">open full page</a>
        </div>
      </div>
      <p style="color: var(--text-muted); max-width: 720px; margin-bottom: 16px">
        Interactive view of issue dependencies. Hover a node to inspect it, click to highlight prerequisite and
        dependent chains.

    <script type="module" src="../components/site-nav.js"></script>
    <script src="../components/dep-graph.js"></script>
    <script src="data.js" onerror=""></script>
    <script>
      // ── Data loading ──────────────────────────────────────────────
      // The dashboard works in two modes:
      // 1. Served via HTTP (npx serve) — fetches JSON/files via relative paths
      // 2. Opened as file:// — uses embedded data (generated by build-data.sh)
      //
      // For mode 1, we try fetch first. For mode 2, we fall back to EMBEDDED_DATA.

      const EMBEDDED_DATA = window.__DASHBOARD_DATA__ || null;

      async function loadJSON(path) {
        try {
          const res = await fetch(path);
          if (!res.ok) throw new Error(res.status);
          return await res.json();
        } catch {
          return null;
        }
      }

      async function loadText(path) {
        try {
          const res = await fetch(path);
          if (!res.ok) throw new Error(res.status);
          return await res.text();
        } catch {
          return null;
        }
      }

      // ── Frontmatter parser ───────────────────────────────────────
      function parseFrontmatter(text) {
        const m = text.match(/^---\n([\s\S]*?)\n---/);
        if (!m) return {};
        const obj = {};
        for (const line of m[1].split("\n")) {
          const idx = line.indexOf(":");
          if (idx < 0) continue;
          const key = line.slice(0, idx).trim();
          let val = line.slice(idx + 1).trim();
          // Strip quotes
          if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'")))
            val = val.slice(1, -1);
          // Parse arrays like [481, 482]
          if (val.startsWith("[") && val.endsWith("]")) {
            val = val
              .slice(1, -1)
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean);
          }
          obj[key] = val;
        }
        return obj;
      }

      function extractTitle(text) {
        const m = text.match(/^#\s+.*?—\s*(.+)$/m) || text.match(/^#\s+(.+)$/m);
        return m ? m[1].trim() : "Untitled";
      }

      function extractStatus(text) {
        const m = text.match(/status:\s*(\S+)/i);
        return m ? m[1] : null;
      }

      // ── Kanban card ──────────────────────────────────────────────
      function makeCard(id, title, fm) {
        const priority = fm.priority || "medium";
        const feasibility = fm.feasibility || "";
        const prioTips = {
          critical: "Blocks other work or causes regressions",
          high: "Important for sprint goals",
          medium: "Standard priority",
          low: "Nice to have",
        };
        const feasTips = {
          easy: "Quick fix, well-understood",
          medium: "Moderate complexity",
          hard: "Requires deep analysis or architectural changes",
        };
        let meta = "";
        if (fm.status === "wont-fix") meta += `<span class="tag wont-fix">wont-fix</span>`;
        if (priority !== "medium")
          meta += `<span class="tag ${priority}" title="${prioTips[priority] || ""}">${priority}</span>`;
        if (feasibility && feasibility !== "medium")
          meta += `<span class="tag ${feasibility === "hard" ? "high" : "low"}" title="${feasTips[feasibility] || ""}">${feasibility}</span>`;
        return `<div class="kanban-card">
        <div class="title">${title}</div>
        <div class="card-footer">
          <div class="issue-num">#${id}</div>
          <div class="card-meta">${meta}</div>
        </div>
      </div>`;
      }

      function getLatestSprint(sprints) {
        return (
          [...sprints]
            .filter((s) => Number.isFinite(s.sprintNumber))
            .filter((s) => !/planning/i.test(s.name || ""))
            .filter((s) => /^\d{4}-\d{2}-\d{2}$/.test((s.date || "").trim()))
            .sort((a, b) => a.sprintNumber - b.sprintNumber)
            .at(-1) || null
        );
      }

      function getLatestActiveSprint(sprints) {
        return (
          [...sprints]
            .filter((s) => Number.isFinite(s.sprintNumber))
            .filter((s) => !s.isClosed && !s.isPlanning)
            .sort((a, b) => a.sprintNumber - b.sprintNumber)
            .at(-1) || null
        );
      }

      const PRIORITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };
      function prioritySort(a, b) {
        const pa = PRIORITY_ORDER[a.priority] ?? 99;
        const pb = PRIORITY_ORDER[b.priority] ?? 99;
        return pa !== pb ? pa - pb : String(b.id).localeCompare(String(a.id), undefined, { numeric: true });
      }

      function buildSprintOptions(sprints) {
        const byNumber = new Map();
        for (const sprint of sprints) {
          if (!Number.isFinite(sprint.sprintNumber)) continue;
          const existing = byNumber.get(sprint.sprintNumber);
          if (!existing) {
            byNumber.set(sprint.sprintNumber, sprint);
            continue;
          }
          const currentScore =
            (/planning/i.test(existing.name || "") ? 0 : 1) +
            (/^\d{4}-\d{2}-\d{2}$/.test((existing.date || "").trim()) ? 1 : 0);
          const nextScore =
            (/planning/i.test(sprint.name || "") ? 0 : 1) +
            (/^\d{4}-\d{2}-\d{2}$/.test((sprint.date || "").trim()) ? 1 : 0);
          if (nextScore >= currentScore) byNumber.set(sprint.sprintNumber, sprint);
        }
        return [...byNumber.values()].sort((a, b) => a.sprintNumber - b.sprintNumber);
      }

      function sprintHasUnfinishedIssueIds(sprint) {
        if (!sprint || !Array.isArray(sprint.issueIds) || sprint.issueIds.length === 0) return false;
        const completed = new Set((sprint.completedIssueIds || []).map(String));
        return sprint.issueIds.some((id) => !completed.has(String(id)));
      }

      function filterIssuesForSprint(issues, sprint) {
        if (!sprint) return issues;
        if (sprint.isClosed) {
          const completed = new Set((sprint.completedIssueIds || []).map(String));
          return {
            blocked: [],
            ready: [],
            inprogress: [],
            review: [],
            done: (issues.done || []).filter((iss) => completed.has(String(iss.id))),
          };
        }
        if (!Array.isArray(sprint.issueIds) || sprint.issueIds.length === 0) return issues;
        const allowed = new Set(sprint.issueIds.map(String));
        return {
          blocked: (issues.blocked || []).filter((iss) => allowed.has(String(iss.id))),
          ready: (issues.ready || []).filter((iss) => allowed.has(String(iss.id))),
          inprogress: (issues.inprogress || []).filter((iss) => allowed.has(String(iss.id))),
          review: (issues.review || []).filter((iss) => allowed.has(String(iss.id))),
          done: (issues.done || []).filter((iss) => allowed.has(String(iss.id))),
        };
      }

      function sprintHasUndoneWork(issues, sprint) {
        if (!sprint) return false;
        if (sprintHasUnfinishedIssueIds(sprint)) return true;
        const scopedIssues = filterIssuesForSprint(issues, sprint);
        return (
          (scopedIssues.blocked || []).length > 0 ||
          (scopedIssues.ready || []).length > 0 ||
          (scopedIssues.inprogress || []).length > 0 ||
          (scopedIssues.review || []).length > 0
        );
      }

      function getCurrentUnfinishedSprintStart(issues, sprintOptions) {
        const numeric = sprintOptions
          .filter((s) => Number.isFinite(s.sprintNumber))
          .sort((a, b) => a.sprintNumber - b.sprintNumber);
        if (numeric.length === 0) return null;
        let idx = numeric.length - 1;
        while (idx >= 0 && !sprintHasUndoneWork(issues, numeric[idx])) idx--;
        if (idx < 0) return null;
        while (idx > 0 && sprintHasUndoneWork(issues, numeric[idx - 1])) idx--;
        return numeric[idx];
      }

      let searchQuery = "";

      function renderIssueBoard(issues) {
        const q = searchQuery.toLowerCase().trim();
        const cols = {
          ready: { el: document.getElementById("col-ready"), count: document.getElementById("col-ready-count") },
          inprogress: {
            el: document.getElementById("col-inprogress"),
            count: document.getElementById("col-inprogress-count"),
          },
          review: { el: document.getElementById("col-review"), count: document.getElementById("col-review-count") },
          done: { el: document.getElementById("col-done"), count: document.getElementById("col-done-count") },
        };

        for (const [status, col] of Object.entries(cols)) {
          let list = issues[status] || [];
          if (q) {
            list = list.filter((iss) => String(iss.id).includes(q) || (iss.title || "").toLowerCase().includes(q));
          }
          col.count.textContent = list.length;
          const display = status === "done" ? [...list].reverse() : [...list].sort(prioritySort);
          col.el.innerHTML = display.map((iss) => makeCard(iss.id, iss.title || `Issue #${iss.id}`, iss)).join("");
        }
      }

      // ── Main ─────────────────────────────────────────────────────
      async function main() {
        // Load test262 run data
        let runs = null;
        runs = await loadJSON("../benchmarks/results/runs/index.json");
        if (!runs) runs = await loadJSON("data/runs.json");
        if (!runs && EMBEDDED_DATA) runs = EMBEDDED_DATA.runs;
        if (!runs) runs = [];

        // Load issue lists from embedded data or show static counts
        // Since file:// can't list directories, we embed issue data via build script
        // For now, we parse from what we can fetch or use embedded data
        let issues = { ready: [], inprogress: [], review: [], done: [] };

        // Prefer generated JSON over embedded data so the board reflects the latest sprint files.
        const issueIndex = await loadJSON("./data/issues.json");
        if (issueIndex) {
          issues = issueIndex;
        } else if (EMBEDDED_DATA && EMBEDDED_DATA.issues) {
          issues = EMBEDDED_DATA.issues;
        }

        // Load sprint data
        let sprints = [];
        const sprintIndex = await loadJSON("./data/sprints.json");
        if (sprintIndex) sprints = sprintIndex;
        else if (EMBEDDED_DATA && EMBEDDED_DATA.sprints) sprints = EMBEDDED_DATA.sprints;
        sprints = sprints
          .map((s) => ({ ...s, sprintNumber: Number(s.sprintNumber ?? String(s.name).match(/(\d+)/)?.[1] ?? NaN) }))
          .sort((a, b) => (a.sprintNumber || 0) - (b.sprintNumber || 0));

        // ── Update timestamp ──
        const updEl = document.getElementById("last-updated");
        if (updEl) updEl.textContent = "Updated: " + new Date().toLocaleString();

        // ── Metrics ──
        if (runs.length > 0) {
          const latest = runs[runs.length - 1];
          // Use the full pass rate to match the landing page donut chart.
          const passRate = ((latest.pass / latest.total) * 100).toFixed(1);
          document.getElementById("m-passrate").textContent = passRate + "%";
        }

        // ── Baseline age badge ──
        try {
          const reportData = await loadJSON("../benchmarks/results/test262-current.json");
          if (reportData && reportData.baseline_generated_at) {
            const genTime = new Date(reportData.baseline_generated_at).getTime();
            const ageMs = Date.now() - genTime;
            const ageHours = ageMs / (1000 * 60 * 60);
            const card = document.getElementById("baseline-age-card");
            const ageEl = document.getElementById("m-baseline-age");
            if (card && ageEl) {
              let ageText;
              if (ageHours < 1) ageText = Math.round(ageHours * 60) + "m";
              else if (ageHours < 48) ageText = ageHours.toFixed(1) + "h";
              else ageText = (ageHours / 24).toFixed(1) + "d";
              if (reportData.baseline_sha) ageText += " (" + reportData.baseline_sha.slice(0, 7) + ")";
              ageEl.textContent = ageText;
              if (ageHours > 24) ageEl.style.color = "var(--red)";
              else if (ageHours > 6) ageEl.style.color = "var(--orange)";
              card.style.display = "";
            }
          }
        } catch {}

        // Current sprint number (latest tag)
        try {
          const tagResp = await fetch("data/sprint-stats.json");
          if (tagResp.ok) {
            const stats = await tagResp.json();
            const arr = stats.sprints || stats;
            const last = arr[arr.length - 1];
            if (last) document.getElementById("m-sprint").textContent = last.sprint;
          }
        } catch {}

        // Issue counts
        document.getElementById("m-done").textContent = issues.done.length.toLocaleString();
        document.getElementById("m-ready").textContent = issues.ready.length.toLocaleString();
        // Project duration in weeks from sprint-stats repoStart
        try {
          const statsResp = await fetch("data/sprint-stats.json");
          if (statsResp.ok) {
            const sd = await statsResp.json();
            if (sd.repoStart) {
              const weeks = (Date.now() / 1000 - sd.repoStart) / (7 * 24 * 3600);
              document.getElementById("m-duration").textContent = weeks.toFixed(1) + "w";
            }
          }
        } catch {}

        // ── Kanban board ──
        const sprintLabel = document.getElementById("sprint-label");
        const sprintSelect = document.getElementById("sprint-select");
        const sprintOptions = buildSprintOptions(sprints);
        const latestSprint = getLatestSprint(sprintOptions);
        const latestActiveSprint = getLatestActiveSprint(sprintOptions);
        // Prefer the latest active sprint. Fall back to the current unfinished block, then latest closed sprint.
        const firstCurrentIncomplete = getCurrentUnfinishedSprintStart(issues, sprintOptions);
        let selectedSprint = latestActiveSprint || firstCurrentIncomplete || latestSprint;

        sprintSelect.innerHTML = sprintOptions
          .filter((s) => Number.isFinite(s.sprintNumber))
          .map((s) => `<option value="${s.sprintNumber}">${s.sprintNumber}</option>`)
          .join("");

        function syncSprintControls(numberValue) {
          sprintSelect.value = numberValue ? String(numberValue) : "";
        }

        function renderSprintBoard() {
          const scopedIssues = filterIssuesForSprint(issues, selectedSprint);
          renderIssueBoard(scopedIssues);
          if (sprintLabel)
            sprintLabel.textContent = selectedSprint
              ? `Board: Sprint ${selectedSprint.sprintNumber}`
              : "Board: All issues";
          syncSprintControls(selectedSprint?.sprintNumber ?? "");
        }

        function setSprintByNumber(numberValue) {
          const sprintNumber = Number(numberValue);
          const found = sprintOptions.find((s) => s.sprintNumber === sprintNumber) || null;
          if (!found) return;
          selectedSprint = found;
          renderSprintBoard();
        }

        if (selectedSprint) {
          renderSprintBoard();
        } else {
          renderIssueBoard(issues);
          if (sprintLabel) sprintLabel.textContent = "Board: All issues";
        }

        sprintSelect.addEventListener("change", () => setSprintByNumber(sprintSelect.value));

        // ── Sprint ±1 navigation ──
        const sortedSprintNums = sprintOptions
          .filter((s) => Number.isFinite(s.sprintNumber))
          .map((s) => s.sprintNumber)
          .sort((a, b) => a - b);

        document.getElementById("sprint-prev")?.addEventListener("click", () => {
          const cur = selectedSprint?.sprintNumber ?? NaN;
          const idx = sortedSprintNums.indexOf(cur);
          if (idx > 0) setSprintByNumber(sortedSprintNums[idx - 1]);
        });

        document.getElementById("sprint-next")?.addEventListener("click", () => {
          const cur = selectedSprint?.sprintNumber ?? NaN;
          const idx = sortedSprintNums.indexOf(cur);
          if (idx >= 0 && idx < sortedSprintNums.length - 1) setSprintByNumber(sortedSprintNums[idx + 1]);
        });

        // ── Issue search ──
        document.getElementById("issue-search")?.addEventListener("input", (e) => {
          searchQuery = e.target.value;
          renderSprintBoard();
        });

        // ── Sprint timeline in header ──
        if (sprints.length > 0) {
          let sprintStats = null;
          try {
            const resp = await fetch("data/sprint-stats.json");
            if (resp.ok) sprintStats = await resp.json();
          } catch {}

          const timelineEl = document.getElementById("sprint-timeline");
          if (timelineEl && sprintStats && (sprintStats.sprints || sprintStats).length > 1) {
            const rawStats = sprintStats.sprints || sprintStats;
            const ss = rawStats.filter((s) => s.sprint > 0 && s.epoch);
            const minEpoch = sprintStats.repoStart || ss[0]?.epoch;
            const maxEpoch = sprintStats.repoEnd || ss[ss.length - 1]?.epoch;

            if (ss.length > 1 && minEpoch && maxEpoch) {
              const range = maxEpoch - minEpoch || 1;
              const ONE_WEEK = 7 * 24 * 3600;
              const VIEWPORT_W = 1000;
              const pxPerSec = VIEWPORT_W / ONE_WEEK;
              const H = 100;
              const PAD = { top: 40, bottom: 30, left: 30, right: 30 };
              const plotW = range * pxPerSec;
              const W = plotW + PAD.left + PAD.right;
              const lineY = PAD.top;

              const xPos = (epoch) => PAD.left + (epoch - minEpoch) * pxPerSec;

              let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block;overflow:visible">`;
              svg += `<line x1="${PAD.left}" y1="${lineY}" x2="${PAD.left + plotW}" y2="${lineY}" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>`;

              const commitEpochs = sprintStats.commitEpochs || [];
              for (const ce of commitEpochs) {
                if (ce < minEpoch || ce > maxEpoch) continue;
                const cx = xPos(ce);
                svg += `<circle cx="${cx}" cy="${lineY}" r="2.5" fill="rgba(248,113,113,0.35)"/>`;
              }

              const startDay = new Date(minEpoch * 1000);
              startDay.setHours(0, 0, 0, 0);
              const endDay = new Date(maxEpoch * 1000);
              endDay.setHours(23, 59, 59, 999);
              for (let d = new Date(startDay); d <= endDay; d.setDate(d.getDate() + 1)) {
                const dayEpoch = d.getTime() / 1000;
                if (dayEpoch < minEpoch || dayEpoch > maxEpoch) continue;
                const dx = xPos(dayEpoch);
                svg += `<line x1="${dx}" y1="${lineY - 10}" x2="${dx}" y2="${lineY + 10}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                const label = d.getDate() === 1 ? months[d.getMonth()] : String(d.getDate());
                const size = d.getDate() === 1 ? 14 : 12;
                const opacity = d.getDate() === 1 ? 0.5 : 0.3;
                svg += `<text x="${dx}" y="${lineY + 28}" text-anchor="middle" fill="rgba(255,255,255,${opacity})" font-size="${size}" font-family="monospace">${label}</text>`;
              }

              svg += `<line id="tl-playhead" x1="0" y1="${lineY - 16}" x2="0" y2="${lineY + 16}" stroke="#fbbf24" stroke-width="2" opacity="0"/>`;

              const MIN_LABEL_GAP = 25;
              let lastLabelX = -Infinity;
              for (let i = ss.length - 1; i >= 0; i--) {
                const s = ss[i];
                const cx = xPos(s.epoch);
                svg += `<rect x="${cx - 14}" y="${lineY - 22}" width="28" height="55" fill="transparent" data-sprint="${s.sprint}" style="cursor:pointer"/>`;
                svg += `<circle cx="${cx}" cy="${lineY}" r="5" fill="#fff" data-sprint="${s.sprint}" style="cursor:pointer"/>`;
                if (lastLabelX - cx >= MIN_LABEL_GAP || lastLabelX === -Infinity) {
                  svg += `<text x="${cx}" y="${lineY - 14}" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" data-sprint="${s.sprint}" style="cursor:pointer">${s.sprint}</text>`;
                  lastLabelX = cx;
                }
              }

              svg += `</svg>`;
              timelineEl.innerHTML = svg;
              timelineEl.scrollLeft = timelineEl.scrollWidth;

              const sprintPos = {};
              for (const s of ss) sprintPos[s.sprint] = xPos(s.epoch);

              timelineEl.addEventListener("click", (e) => {
                const t = e.target.closest("[data-sprint]");
                if (!t) return;
                const n = t.dataset.sprint;
                const ph = timelineEl.querySelector("#tl-playhead");
                if (ph && sprintPos[n] != null) {
                  ph.setAttribute("x1", sprintPos[n]);
                  ph.setAttribute("x2", sprintPos[n]);
                  ph.setAttribute("opacity", "1");
                }
                timelineEl
                  .querySelectorAll("circle[data-sprint]")
                  .forEach((c) => c.setAttribute("fill", c.dataset.sprint === n ? "#fbbf24" : "#fff"));
                if (typeof setSprintByNumber === "function") setSprintByNumber(n);
              });
            }
          }
        }
      }

      // ── Refresh ──
      function refreshData() {
        main().catch((err) => console.error("Dashboard error:", err));
      }

      function resizeKanban() {
        const board = document.getElementById("kanban-board");
        if (!board) return;
        const top = board.getBoundingClientRect().top;
        board.style.height = Math.max(200, window.innerHeight - top - 12) + "px";
      }

      // Push updates via Vite dev server WebSocket — no polling needed
      if (location.protocol !== "file:") {
        (function connectWS() {
          const proto = location.protocol === "https:" ? "wss:" : "ws:";
          const ws = new WebSocket(`${proto}//${location.host}/dashboard-ws`);
          ws.onmessage = (e) => {
            try {
              const { type } = JSON.parse(e.data);
              if (type === "refresh") main().then(resizeKanban).catch(console.error);
            } catch {}
          };
          ws.onclose = () => setTimeout(connectWS, 3_000);
          ws.onerror = () => ws.close();
        })();
      }

      // ── Run on load ──
      main()
        .then(resizeKanban)
        .catch((err) => console.error("Dashboard error:", err));

      // ── Resize handler for charts + kanban ──
      let resizeTimer;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          main().then(resizeKanban);
        }, 200);
      });
    </script>
  </body>
</html>
