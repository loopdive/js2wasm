<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ts2wasm Issue &amp; Goal Dependency Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
#controls { position: fixed; top: 12px; left: 12px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; max-width: 70vw; }
#controls label { font-size: 12px; cursor: pointer; padding: 4px 10px; border-radius: 12px; border: 1px solid #30363d; background: #161b22; transition: all 0.15s; white-space: nowrap; }
#controls label:hover { border-color: #58a6ff; }
#controls label.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
#controls input[type=checkbox] { display: none; }
#controls .sep { color: #8b949e; font-size: 12px; margin: 0 2px; }
#info { position: fixed; top: 12px; right: 12px; z-index: 10; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; max-width: 360px; font-size: 13px; display: none; max-height: 80vh; overflow-y: auto; }
#info h3 { margin-bottom: 6px; color: #58a6ff; }
#info .goal-title { color: #f0883e; }
#info .meta { color: #8b949e; margin-bottom: 4px; }
#info .deps { margin-top: 6px; }
#info .dep-link { color: #58a6ff; cursor: pointer; text-decoration: underline; }
#info .goal-link { color: #f0883e; cursor: pointer; text-decoration: underline; }
#legend { position: fixed; bottom: 12px; left: 12px; z-index: 10; font-size: 11px; display: flex; gap: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; flex-wrap: wrap; max-width: 80vw; }
#legend span { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
#legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#legend .pill { width: 20px; height: 12px; display: inline-block; border-radius: 6px; background: transparent !important; }
#stats { position: fixed; bottom: 12px; right: 12px; z-index: 10; font-size: 11px; color: #8b949e; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; }
svg { width: 100vw; height: 100vh; }
.link { stroke-opacity: 0.3; fill: none; }
.link.highlighted { stroke-opacity: 1; stroke-width: 2.5; }
.link.dimmed { stroke-opacity: 0.04; }
.goal-link-line { stroke: rgba(240, 136, 62, 0.4); stroke-width: 1.5; stroke-opacity: 0.6; fill: none; }
.goal-link-line.highlighted { stroke-opacity: 1; stroke-width: 2; }
.goal-link-line.dimmed { stroke-opacity: 0.04; }
.goal-issue-link { stroke: rgba(200, 200, 210, 0.25); stroke-width: 1; fill: none; }
.goal-issue-link.highlighted { stroke: rgba(240, 136, 62, 0.6); stroke-opacity: 1; stroke-width: 1.5; }
.goal-issue-link.dimmed { stroke-opacity: 0.03; }
.node text { font-size: 10px; fill: #c9d1d9; pointer-events: none; }
.node rect { stroke-width: 1.5; cursor: pointer; }
.node rect:hover { filter: brightness(1.3); }
.node.dimmed rect { opacity: 0.1; }
.node.dimmed text { opacity: 0.1; }
.goal-node { cursor: pointer; }
.goal-node text { font-size: 12px; font-weight: 600; fill: #c9d1d9; pointer-events: none; }
.goal-node .sublabel { font-size: 10px; font-weight: 400; fill: #8b949e; }
.goal-node:hover rect { filter: brightness(1.3); }
.goal-node.dimmed rect { opacity: 0.1; }
.goal-node.dimmed text { opacity: 0.1; }
</style>
</head>
<body>
<div id="controls">
  <label class="active"><input type="checkbox" value="ready" checked> Ready</label>
  <label class="active"><input type="checkbox" value="blocked" checked> Blocked</label>
  <label><input type="checkbox" value="done"> Done</label>
  <label><input type="checkbox" value="backlog"> Backlog</label>
  <span class="sep">|</span>
  <label class="active"><input type="checkbox" value="p-critical" checked> Critical</label>
  <label class="active"><input type="checkbox" value="p-high" checked> High</label>
  <label class="active"><input type="checkbox" value="p-medium" checked> Medium</label>
  <label class="active"><input type="checkbox" value="p-low" checked> Low</label>
  <span class="sep">|</span>
  <label class="active"><input type="checkbox" value="show-goals" checked> Goals</label>
</div>
<div id="info">
  <h3 id="info-title"></h3>
  <div class="meta" id="info-meta"></div>
  <div class="deps" id="info-deps"></div>
</div>
<div id="legend">
  <span><span class="pill" style="border:1.5px solid #f0883e"></span> Goal (active)</span>
  <span><span class="pill" style="border:1.5px solid #1f6feb"></span> Goal (activatable)</span>
  <span><span class="pill" style="border:1.5px solid #484f58"></span> Goal (blocked)</span>
  <span>|</span>
  <span>Issue impact:</span>
  <span><span class="dot" style="background:rgba(255,255,0,0.9)"></span> High</span>
  <span><span class="dot" style="background:rgba(157,159,34,0.65)"></span> Med</span>
  <span><span class="dot" style="background:rgba(60,63,68,0.5)"></span> None</span>
  <span>|</span>
  <span style="border-bottom:1px dashed rgba(255,0,0,0.4);padding-bottom:1px">Blocked</span>
</div>
<div id="stats"></div>
<svg></svg>
<script>
const BAR_W = { critical: 160, high: 130, medium: 100, low: 60 };
const BAR_H = 18;

const GOAL_STATUS_COLOR = {
  active: '#f0883e',
  activatable: '#1f6feb',
  blocked: '#484f58',
  done: '#3fb950',
};

const GOAL_W = 160, GOAL_H = 36;

function ceColor(d) {
  const impact = (d.compiler_errors || 0) + (d.test262_skip || 0) + (d.test262_fail || 0) + (d.test262_ce || 0);
  if (!impact) return 'rgba(60,63,68,0.5)';
  const t = Math.min(1, Math.log(impact + 1) / Math.log(4000));
  const r = Math.round(60 + t * (255 - 60));
  const g = Math.round(63 + t * (255 - 63));
  const b = Math.round(68 + t * (0 - 68));
  return `rgba(${r},${g},${b},${0.4 + t * 0.5})`;
}

async function init() {
  let data;
  try {
    const resp = await fetch('graph-data.json');
    data = await resp.json();
  } catch {
    document.body.innerHTML = '<div style="padding:40px;color:#f85149">Could not load graph-data.json. Run: npx tsx plan/generate-graph.ts</div>';
    return;
  }

  const { nodes, links, goals, goalIssueLinks, goalDepLinks } = data;
  const goalDepLinksArr = goalDepLinks || [];
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  const goalMap = new Map(goals.map(g => [g.id, g]));

  // Assign issue-to-goal for quick lookup
  const issueGoalMap = new Map();
  goalIssueLinks.forEach(l => issueGoalMap.set(l.issue, l.goal));

  // Stats
  const ready = nodes.filter(n => n.status === 'ready').length;
  const blocked = nodes.filter(n => n.status === 'blocked').length;
  const activeGoals = goals.filter(g => g.status === 'active' || g.status === 'activatable').length;
  document.getElementById('stats').innerHTML =
    `${nodes.length} issues | ${ready} ready | ${blocked} blocked | ${goals.length} goals (${activeGoals} active) | Generated: ${new Date(data.generated).toLocaleDateString()}`;

  const width = window.innerWidth, height = window.innerHeight;
  const svg = d3.select('svg').attr('viewBox', [0, 0, width, height]);
  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.15, 5]).on('zoom', e => g.attr('transform', e.transform)));

  // Arrow markers — small triangles flush at line endpoint
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrow').attr('viewBox', '0 -3 6 6').attr('refX', 6).attr('refY', 0)
    .attr('markerWidth', 4).attr('markerHeight', 4).attr('orient', 'auto')
    .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', '#8b949e');
  defs.append('marker')
    .attr('id', 'goal-arrow').attr('viewBox', '0 -3 6 6').attr('refX', 6).attr('refY', 0)
    .attr('markerWidth', 4).attr('markerHeight', 4).attr('orient', 'auto')
    .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', '#f0883e');
  defs.append('marker')
    .attr('id', 'member-arrow').attr('viewBox', '0 -3 6 6').attr('refX', 6).attr('refY', 0)
    .attr('markerWidth', 4).attr('markerHeight', 4).attr('orient', 'auto')
    .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', 'rgba(200,200,210,0.5)');

  // ── Layout goals in a DAG using BFS depth ──
  const goalDepth = new Map();
  const goalQueue = [];
  goals.forEach(gg => {
    const deps = gg.depends_on.filter(id => goalMap.has(id));
    if (deps.length === 0) { goalDepth.set(gg.id, 0); goalQueue.push(gg.id); }
  });
  let gqi = 0;
  while (gqi < goalQueue.length) {
    const id = goalQueue[gqi++];
    const d = goalDepth.get(id);
    goals.forEach(gg => {
      if (gg.depends_on.includes(id)) {
        const nd = d + 1;
        if (!goalDepth.has(gg.id) || goalDepth.get(gg.id) < nd) {
          goalDepth.set(gg.id, nd);
          goalQueue.push(gg.id);
        }
      }
    });
  }
  goals.forEach(gg => { if (!goalDepth.has(gg.id)) goalDepth.set(gg.id, 0); });

  const maxGoalDepth = d3.max(goals, gg => goalDepth.get(gg.id)) || 0;

  // Separate conformance goals from parallel tracks
  const conformanceGoals = goals.filter(gg => !gg.track);
  const parallelGoals = goals.filter(gg => gg.track);

  // Position goals: conformance goals in a vertical DAG
  const goalMargin = { top: 80, right: 60 };
  // Spacing: issue bar (max ~160) + gap + goal pill (160) + gap
  const maxBarWidth = Math.max(...Object.values(BAR_W));
  const issueGoalGap = 30; // gap between issue right edge and goal left edge
  const goalColSpacing = maxBarWidth + issueGoalGap + GOAL_W + issueGoalGap;
  const goalRowSpacing = 120;

  // Build columns by depth for conformance goals
  const goalColumns = [];
  for (let i = 0; i <= maxGoalDepth; i++) {
    goalColumns.push(conformanceGoals.filter(gg => goalDepth.get(gg.id) === i));
  }

  // X position: goals spread from right to left (deepest at right)
  // Y position: centered within each column
  const goalAreaLeft = maxBarWidth + issueGoalGap + GOAL_W / 2 + 40;
  const goalAreaTop = goalMargin.top;

  goalColumns.forEach((col, ci) => {
    const x = goalAreaLeft + ci * goalColSpacing;
    const totalH = col.length * (GOAL_H + goalRowSpacing) - goalRowSpacing;
    const startY = goalAreaTop + Math.max(0, (height * 0.4 - totalH) / 2);
    col.forEach((gg, ri) => {
      gg.x = x;
      gg.y = startY + ri * (GOAL_H + goalRowSpacing);
    });
  });

  // Parallel track goals: placed below the conformance DAG
  const parallelY = height * 0.5 + 60;
  parallelGoals.forEach((gg, i) => {
    const depth = goalDepth.get(gg.id) || 0;
    gg.x = goalAreaLeft + depth * goalColSpacing;
    gg.y = parallelY + i * (GOAL_H + 30);
  });

  // ── Position issues relative to their goal ──
  // Issues without a goal get placed to the far right
  const PRIO_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };

  // Group issues by goal
  const issuesByGoal = new Map();
  goals.forEach(gg => issuesByGoal.set(gg.id, []));
  issuesByGoal.set('__none__', []);
  nodes.forEach(n => {
    const gid = issueGoalMap.get(n.id) || '__none__';
    if (issuesByGoal.has(gid)) issuesByGoal.get(gid).push(n);
    else issuesByGoal.get('__none__').push(n);
  });

  // Position issues fanning out to the LEFT of their goal (they feed into it)
  for (const [goalId, issues] of issuesByGoal) {
    if (goalId === '__none__') continue;
    const gg = goalMap.get(goalId);
    if (!gg) continue;
    issues.sort((a, b) => (PRIO_ORDER[a.priority] || 3) - (PRIO_ORDER[b.priority] || 3));
    const groupMaxBarW = Math.max(...issues.map(n => BAR_W[n.priority] || 60));
    const startY = gg.y - (issues.length - 1) * (BAR_H + 6) / 2;
    issues.forEach((n, i) => {
      const barW = BAR_W[n.priority] || 60;
      // Right-align issues so their right edges line up, with gap to goal left edge
      n.x = gg.x - GOAL_W / 2 - issueGoalGap - barW;
      n.fx = n.x;
      n.y = startY + i * (BAR_H + 6);
    });
  }

  // Unassigned issues: stack on the far right (after all goal columns)
  const unassigned = issuesByGoal.get('__none__') || [];
  unassigned.sort((a, b) => (PRIO_ORDER[a.priority] || 3) - (PRIO_ORDER[b.priority] || 3));
  const unassignedX = goalAreaLeft + (maxGoalDepth + 1) * goalColSpacing + 60;
  unassigned.forEach((n, i) => {
    n.x = unassignedX;
    n.fx = n.x;
    n.y = goalMargin.top + i * (BAR_H + 6);
  });

  // ── Render layers (back to front) ──

  // Layer 1: Member links (issue → goal: issues are dependencies of goal)
  const goalIssueLinkEl = g.append('g').selectAll('path')
    .data(goalIssueLinks.filter(l => nodeMap.has(l.issue) && goalMap.has(l.goal)))
    .join('path')
    .attr('class', 'goal-issue-link')
    .attr('marker-end', 'url(#member-arrow)');

  // Layer 2: Goal-dep lines (prerequisite goal → issues of dependent goals)
  const goalDepLinkEl = g.append('g').selectAll('path')
    .data(goalDepLinksArr.filter(l => goalMap.has(l.goal) && nodeMap.has(l.issue)))
    .join('path')
    .attr('class', 'goal-link-line')
    .attr('marker-end', 'url(#goal-arrow)');

  // Layer 3: Issue-to-issue dependency curves
  // Resolve links
  links.forEach(l => {
    if (typeof l.source !== 'object') l.source = nodeMap.get(l.source);
    if (typeof l.target !== 'object') l.target = nodeMap.get(l.target);
  });

  const linkEl = g.append('g').selectAll('path')
    .data(links.filter(l => l.source && l.target))
    .join('path')
    .attr('class', 'link')
    .attr('stroke', l => {
      const t = typeof l.target === 'object' ? l.target : nodeMap.get(l.target);
      return t ? ceColor(t) : '#30363d';
    })
    .attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrow)');

  // Layer 4: Goal nodes
  const goalEl = g.append('g').selectAll('g')
    .data(goals)
    .join('g')
    .attr('class', 'goal-node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .call(d3.drag()
      .on('start', (e, d) => { d._dragging = true; })
      .on('drag', (e, d) => {
        d.x = e.x; d.y = e.y;
        d3.select(e.sourceEvent.target.closest('.goal-node')).attr('transform', `translate(${d.x},${d.y})`);
        updatePositions();
      })
      .on('end', (e, d) => { d._dragging = false; })
    );

  goalEl.append('rect')
    .attr('x', -GOAL_W / 2).attr('y', -GOAL_H / 2)
    .attr('width', GOAL_W).attr('height', GOAL_H)
    .attr('rx', GOAL_H / 2).attr('ry', GOAL_H / 2)
    .attr('fill', 'transparent')
    .attr('stroke', d => GOAL_STATUS_COLOR[d.status] || '#484f58')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.7);

  goalEl.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', -2)
    .text(d => d.id);

  goalEl.append('text')
    .attr('class', 'sublabel')
    .attr('text-anchor', 'middle')
    .attr('dy', 12)
    .text(d => {
      const target = d.target.match(/~?\d+%/)?.[0] || '';
      return target || d.status;
    });

  goalEl.on('mouseover', (e, d) => highlightGoal(d))
    .on('mouseout', () => unhighlight())
    .on('click', (e, d) => showGoalInfo(d));

  // Layer 5: Issue nodes
  const nodeEl = g.append('g').selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { d._dragging = true; })
      .on('drag', (e, d) => {
        d.x = e.x; d.fx = e.x; d.y = e.y;
        d3.select(e.sourceEvent.target.closest('.node')).attr('transform', `translate(${d.x},${d.y})`);
        updatePositions();
      })
      .on('end', (e, d) => { d._dragging = false; })
    );

  nodeEl.append('rect')
    .attr('x', 0).attr('y', -BAR_H / 2)
    .attr('width', d => BAR_W[d.priority] || 60)
    .attr('height', BAR_H)
    .attr('rx', 3).attr('ry', 3)
    .attr('fill', d => ceColor(d))
    .attr('stroke', d => d.status === 'blocked' ? 'rgba(255,0,0,0.3)' : (d.goal ? 'rgba(240,136,62,0.2)' : 'none'))
    .attr('stroke-dasharray', d => d.status === 'blocked' ? '3,2' : 'none');

  nodeEl.append('text')
    .attr('dx', 4).attr('dy', 4)
    .attr('text-anchor', 'start')
    .text(d => `#${d.id}`);

  nodeEl.on('mouseover', (e, d) => highlightIssue(d))
    .on('mouseout', () => unhighlight())
    .on('click', (e, d) => showIssueInfo(d));

  // ── Position update (called on drag and init) ──
  function updatePositions() {
    nodeEl.attr('transform', d => `translate(${d.x},${d.y})`);
    goalEl.attr('transform', d => `translate(${d.x},${d.y})`);

    linkEl.attr('d', l => {
      const s = l.source, t = l.target;
      if (!s || !t) return '';
      const sx = s.x + (BAR_W[s.priority] || 60), tx = t.x;
      const dx = tx - sx;
      return `M${sx},${s.y}C${sx + dx * 0.4},${s.y},${tx - dx * 0.4},${t.y},${tx},${t.y}`;
    });

    // Member issue → goal links: issue (right edge) → goal (left edge)
    goalIssueLinkEl.attr('d', l => {
      const n = nodeMap.get(l.issue);
      const gg = goalMap.get(l.goal);
      if (!n || !gg) return '';
      const sx = n.x + (BAR_W[n.priority] || 60), sy = n.y;
      const tx = gg.x - GOAL_W / 2, ty = gg.y;
      const dx = tx - sx;
      return `M${sx},${sy}C${sx + dx * 0.4},${sy},${tx - dx * 0.4},${ty},${tx},${ty}`;
    });

    // Goal-dep links: prerequisite goal (right edge) → dependent issue (left edge)
    goalDepLinkEl.attr('d', l => {
      const gg = goalMap.get(l.goal);
      const n = nodeMap.get(l.issue);
      if (!gg || !n) return '';
      const sx = gg.x + GOAL_W / 2, sy = gg.y;
      const tx = n.x, ty = n.y;
      const dx = tx - sx;
      return `M${sx},${sy}C${sx + dx * 0.4},${sy},${tx - dx * 0.4},${ty},${tx},${ty}`;
    });
  }

  updatePositions();

  // ── Highlight functions ──

  function highlightGoal(d) {
    // Connected = this goal's member issues + issues that depend on this goal + prerequisite goals
    const connGoals = new Set([d.id]);
    const connIssues = new Set(d.issues);
    // Issues from dependent goals that this goal feeds into
    goalDepLinksArr.forEach(l => {
      if (l.goal === d.id) connIssues.add(l.issue);
    });
    // Prerequisite goals that feed into this goal's issues
    goalDepLinksArr.forEach(l => {
      if (d.issues.includes(l.issue)) connGoals.add(l.goal);
    });
    // Goals that this goal feeds into (via dep links)
    goals.forEach(gg => {
      if (gg.depends_on.includes(d.id)) connGoals.add(gg.id);
    });

    goalEl.classed('dimmed', gg => !connGoals.has(gg.id));
    nodeEl.classed('dimmed', n => !connIssues.has(n.id));
    linkEl.classed('dimmed', true);
    goalDepLinkEl.classed('dimmed', l => l.goal !== d.id && !d.issues.includes(l.issue));
    goalDepLinkEl.classed('highlighted', l => l.goal === d.id || d.issues.includes(l.issue));
    goalIssueLinkEl.classed('dimmed', l => l.goal !== d.id);
    goalIssueLinkEl.classed('highlighted', l => l.goal === d.id);
  }

  function highlightIssue(d) {
    const connected = new Set([d.id]);
    links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (s === d.id) connected.add(t);
      if (t === d.id) connected.add(s);
    });
    const myGoal = issueGoalMap.get(d.id);

    nodeEl.classed('dimmed', n => !connected.has(n.id));
    linkEl.classed('dimmed', l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s !== d.id && t !== d.id;
    });
    linkEl.classed('highlighted', l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s === d.id || t === d.id;
    });
    // Also show goals connected via dep links
    const connGoals = new Set();
    if (myGoal) connGoals.add(myGoal);
    goalDepLinksArr.forEach(l => {
      if (l.issue === d.id) connGoals.add(l.goal);
    });
    goalEl.classed('dimmed', gg => !connGoals.has(gg.id));
    goalDepLinkEl.classed('dimmed', l => l.issue !== d.id);
    goalDepLinkEl.classed('highlighted', l => l.issue === d.id);
    goalIssueLinkEl.classed('dimmed', l => l.issue !== d.id);
    goalIssueLinkEl.classed('highlighted', l => l.issue === d.id);
  }

  function unhighlight() {
    nodeEl.classed('dimmed', false);
    linkEl.classed('dimmed', false).classed('highlighted', false);
    goalEl.classed('dimmed', false);
    goalDepLinkEl.classed('dimmed', false).classed('highlighted', false);
    goalIssueLinkEl.classed('dimmed', false).classed('highlighted', false);
  }

  // ── Info panels ──

  function showGoalInfo(d) {
    const info = document.getElementById('info');
    info.style.display = 'block';
    document.getElementById('info-title').innerHTML = `<span class="goal-title">${d.id}</span>: ${d.title}`;
    let meta = `<b>Status:</b> ${d.status} | <b>Issues:</b> ${d.issues.length}`;
    if (d.target) meta += `<br><b>Target:</b> ${d.target}`;
    document.getElementById('info-meta').innerHTML = meta;

    let html = '';
    if (d.depends_on.length) {
      html += `<div><b>Depends on:</b> ${d.depends_on.map(id => `<span class="goal-link" onclick="focusGoal('${id}')">${id}</span>`).join(', ')}</div>`;
    }
    const dependers = goals.filter(gg => gg.depends_on.includes(d.id));
    if (dependers.length) {
      html += `<div><b>Unblocks:</b> ${dependers.map(gg => `<span class="goal-link" onclick="focusGoal('${gg.id}')">${gg.id}</span>`).join(', ')}</div>`;
    }
    if (d.issues.length) {
      html += '<div style="margin-top:8px"><b>Issues:</b><br>';
      const sorted = d.issues.slice().sort((a, b) => {
        const na = nodeMap.get(a), nb = nodeMap.get(b);
        if (!na || !nb) return 0;
        return (PRIO_ORDER[na.priority] || 3) - (PRIO_ORDER[nb.priority] || 3);
      });
      for (const id of sorted) {
        const n = nodeMap.get(id);
        if (n) {
          const pColor = { critical: '#f85149', high: '#f0883e', medium: '#8b949e', low: '#484f58' }[n.priority] || '#8b949e';
          html += `<span class="dep-link" onclick="focusNode(${id})" style="display:inline-block;margin:2px 4px 2px 0;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);border-left:3px solid ${pColor};font-size:11px">#${id}</span>`;
        }
      }
      html += '</div>';
    }
    document.getElementById('info-deps').innerHTML = html;
  }

  function showIssueInfo(d) {
    const info = document.getElementById('info');
    info.style.display = 'block';
    document.getElementById('info-title').textContent = `#${d.id}: ${d.title}`;
    let meta = `<b>Priority:</b> ${d.priority} | <b>Status:</b> ${d.status}`;
    if (d.cluster && d.cluster !== 'Unclustered') meta += ` | <b>Cluster:</b> ${d.cluster}`;
    if (d.goal) meta += ` | <b>Goal:</b> <span class="goal-link" onclick="focusGoal('${d.goal}')">${d.goal}</span>`;
    if (d.compiler_errors) meta += ` | <b>CE:</b> ${d.compiler_errors}`;
    if (d.test262_skip) meta += ` | <b>Skip:</b> ${d.test262_skip}`;
    if (d.test262_fail) meta += ` | <b>Fail:</b> ${d.test262_fail}`;
    document.getElementById('info-meta').innerHTML = meta;

    const deps = d.depends_on || [];
    const dependers = nodes.filter(n => n.depends_on && n.depends_on.includes(d.id));
    let html = '';
    if (deps.length) {
      html += `<div><b>Depends on:</b> ${deps.map(id => `<span class="dep-link" onclick="focusNode(${id})">#${id}</span>`).join(', ')}</div>`;
    }
    if (dependers.length) {
      html += `<div><b>Unblocks:</b> ${dependers.map(n => `<span class="dep-link" onclick="focusNode(${n.id})">#${n.id}</span>`).join(', ')}</div>`;
    }
    const files = d.files;
    if (files && (Array.isArray(files) ? files.length : Object.keys(files).length)) {
      html += '<div style="margin-top:6px"><b>Files:</b>';
      if (Array.isArray(files)) {
        html += '<br>' + files.map(f => `<code style="font-size:11px;color:#7ee787">${f}</code>`).join('<br>');
      } else {
        for (const [file, info] of Object.entries(files)) {
          html += `<div style="margin-top:4px"><code style="font-size:11px;color:#7ee787">${file}</code>`;
          if (info.new && info.new.length) html += `<br><span style="color:#3fb950;font-size:10px">+ ${info.new.join('<br>+ ')}</span>`;
          if (info.breaking && info.breaking.length) html += `<br><span style="color:#f85149;font-size:10px">! ${info.breaking.join('<br>! ')}</span>`;
          html += '</div>';
        }
      }
      html += '</div>';
    }
    document.getElementById('info-deps').innerHTML = html;
  }

  window.focusNode = function(id) {
    const n = nodes.find(n => n.id === id);
    if (n) { highlightIssue(n); showIssueInfo(n); }
  };

  window.focusGoal = function(id) {
    const gg = goals.find(g => g.id === id);
    if (gg) { highlightGoal(gg); showGoalInfo(gg); }
  };

  // ── Filter controls ──
  document.querySelectorAll('#controls input').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.parentElement.classList.toggle('active', cb.checked);
      applyFilters();
    });
  });

  function applyFilters() {
    const statuses = new Set();
    const priorities = new Set();
    let showGoals = false;
    document.querySelectorAll('#controls input:checked').forEach(cb => {
      const v = cb.value;
      if (v === 'show-goals') showGoals = true;
      else if (v.startsWith('p-')) priorities.add(v.slice(2));
      else statuses.add(v);
    });
    nodeEl.style('display', d => (statuses.has(d.status) && priorities.has(d.priority)) ? null : 'none');
    linkEl.style('display', l => {
      const s = l.source, t = l.target;
      return (s && t && statuses.has(s.status) && priorities.has(s.priority) && statuses.has(t.status) && priorities.has(t.priority)) ? null : 'none';
    });
    goalEl.style('display', showGoals ? null : 'none');
    goalDepLinkEl.style('display', showGoals ? null : 'none');
    goalIssueLinkEl.style('display', showGoals ? null : 'none');
  }
  applyFilters();
}

init();
</script>
</body>
</html>
