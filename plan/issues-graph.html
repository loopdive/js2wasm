<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ts2wasm Issue &amp; Goal Dependency Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
#controls { position: fixed; top: 12px; left: 12px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; max-width: 70vw; }
#controls label { font-size: 12px; cursor: pointer; padding: 4px 10px; border-radius: 12px; border: 1px solid #30363d; background: #161b22; transition: all 0.15s; white-space: nowrap; }
#controls label:hover { border-color: #58a6ff; }
#controls label.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
#controls input[type=checkbox] { display: none; }
#controls .sep { color: #8b949e; font-size: 12px; margin: 0 2px; }
#info { position: fixed; top: 12px; right: 12px; z-index: 10; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; max-width: 360px; font-size: 13px; display: none; max-height: 80vh; overflow-y: auto; }
#info h3 { margin-bottom: 6px; color: #58a6ff; }
#info .goal-title { color: #f0883e; }
#info .meta { color: #8b949e; margin-bottom: 4px; }
#info .deps { margin-top: 6px; }
#info .dep-link { color: #58a6ff; cursor: pointer; text-decoration: underline; }
#info .goal-link { color: #f0883e; cursor: pointer; text-decoration: underline; }
#legend { position: fixed; bottom: 12px; left: 12px; z-index: 10; font-size: 11px; display: flex; gap: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; flex-wrap: wrap; max-width: 80vw; }
#legend span { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
#legend .swatch { display: inline-block; border-radius: 2px; }
#stats { position: fixed; bottom: 12px; right: 12px; z-index: 10; font-size: 11px; color: #8b949e; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; }
svg { width: 100vw; height: 100vh; }
.ribbon { pointer-events: none; }
.ribbon.dimmed { opacity: 0.02; }
.ribbon.highlighted { opacity: 0.7; }
.issue-col { cursor: pointer; }
.issue-col:hover rect { filter: brightness(1.5); }
.issue-col.dimmed { opacity: 0.06; }
.goal-band { cursor: pointer; }
.goal-band.dimmed { opacity: 0.06; }
.issue-link { fill: none; stroke-opacity: 0.12; pointer-events: none; }
.issue-link.dimmed { stroke-opacity: 0.02; }
.issue-link.highlighted { stroke-opacity: 0.7; stroke-width: 1.5; }
</style>
</head>
<body>
<div id="controls">
  <label class="active"><input type="checkbox" value="ready" checked> Ready</label>
  <label class="active"><input type="checkbox" value="blocked" checked> Blocked</label>
  <label><input type="checkbox" value="done"> Done</label>
  <label><input type="checkbox" value="backlog"> Backlog</label>
  <span class="sep">|</span>
  <label class="active"><input type="checkbox" value="p-critical" checked> Critical</label>
  <label class="active"><input type="checkbox" value="p-high" checked> High</label>
  <label class="active"><input type="checkbox" value="p-medium" checked> Medium</label>
  <label class="active"><input type="checkbox" value="p-low" checked> Low</label>
  <span class="sep">|</span>
  <label class="active"><input type="checkbox" value="show-goals" checked> Goals</label>
</div>
<div id="info">
  <h3 id="info-title"></h3>
  <div class="meta" id="info-meta"></div>
  <div class="deps" id="info-deps"></div>
</div>
<div id="legend">
  <span>Priority:</span>
  <span><span class="swatch" style="width:20px;height:8px;background:rgba(180,80,80,0.7)"></span> Critical</span>
  <span><span class="swatch" style="width:14px;height:8px;background:rgba(160,120,60,0.6)"></span> High</span>
  <span><span class="swatch" style="width:9px;height:8px;background:rgba(90,100,110,0.5)"></span> Medium</span>
  <span><span class="swatch" style="width:5px;height:8px;background:rgba(60,63,68,0.4)"></span> Low</span>
  <span>|</span>
  <span>Goal:</span>
  <span><span class="swatch" style="width:16px;height:3px;background:#f0883e"></span> Active</span>
  <span><span class="swatch" style="width:16px;height:3px;background:#1f6feb"></span> Activatable</span>
  <span><span class="swatch" style="width:16px;height:3px;background:#484f58"></span> Blocked</span>
  <span><span class="swatch" style="width:16px;height:3px;background:#3fb950"></span> Done</span>
  <span>|</span>
  <span style="border-top:2px solid rgba(255,0,0,0.4);padding-top:1px;font-size:10px">Blocked issue</span>
</div>
<div id="stats"></div>
<svg></svg>
<script>
const ISSUE_W = { critical: 40, high: 28, medium: 18, low: 10 };
const ISSUE_H = 80;
const ISSUE_GAP = 2;
const GOAL_LINE_H = 3;
const TIER_GAP = 120;
const GOAL_HORIZ_GAP = 60;
const PRIO_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };

const GOAL_STATUS_COLOR = {
  active: '#f0883e',
  activatable: '#1f6feb',
  blocked: '#484f58',
  done: '#3fb950',
};

function ceColor(d) {
  const impact = (d.compiler_errors || 0) + (d.test262_skip || 0) + (d.test262_fail || 0) + (d.test262_ce || 0);
  if (!impact) return 'rgba(60,63,68,0.45)';
  const t = Math.min(1, Math.log(impact + 1) / Math.log(4000));
  const r = Math.round(60 + t * (255 - 60));
  const g = Math.round(63 + t * (255 - 63));
  const b = Math.round(68 + t * (0 - 68));
  return `rgba(${r},${g},${b},${0.4 + t * 0.5})`;
}

function ribbonPath(x0s, x1s, ys, x0t, x1t, yt) {
  const cy1 = ys + (yt - ys) * 0.42;
  const cy2 = ys + (yt - ys) * 0.58;
  return `M${x0s},${ys}C${x0s},${cy1} ${x0t},${cy2} ${x0t},${yt}` +
         `L${x1t},${yt}C${x1t},${cy2} ${x1s},${cy1} ${x1s},${ys}Z`;
}

async function init() {
  let data;
  try {
    const resp = await fetch('graph-data.json');
    data = await resp.json();
  } catch {
    document.body.innerHTML = '<div style="padding:40px;color:#f85149">Could not load graph-data.json. Run: npx tsx plan/generate-graph.ts</div>';
    return;
  }

  const { nodes, links, goals, goalIssueLinks, goalDepLinks } = data;
  const goalDepLinksArr = goalDepLinks || [];
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  const goalMap = new Map(goals.map(g => [g.id, g]));

  const issueGoalMap = new Map();
  goalIssueLinks.forEach(l => issueGoalMap.set(l.issue, l.goal));

  // Stats
  const ready = nodes.filter(n => n.status === 'ready').length;
  const blocked = nodes.filter(n => n.status === 'blocked').length;
  const activeGoals = goals.filter(g => g.status === 'active' || g.status === 'activatable').length;
  document.getElementById('stats').innerHTML =
    `${nodes.length} issues | ${ready} ready | ${blocked} blocked | ${goals.length} goals (${activeGoals} active)`;

  // ── Goal depths (BFS) ──
  const goalDepth = new Map();
  const gQueue = [];
  goals.forEach(gg => {
    if (gg.depends_on.filter(id => goalMap.has(id)).length === 0) {
      goalDepth.set(gg.id, 0); gQueue.push(gg.id);
    }
  });
  let qi = 0;
  while (qi < gQueue.length) {
    const id = gQueue[qi++];
    const d = goalDepth.get(id);
    goals.forEach(gg => {
      if (gg.depends_on.includes(id)) {
        const nd = d + 1;
        if (!goalDepth.has(gg.id) || goalDepth.get(gg.id) < nd) {
          goalDepth.set(gg.id, nd);
          gQueue.push(gg.id);
        }
      }
    });
  }
  goals.forEach(gg => { if (!goalDepth.has(gg.id)) goalDepth.set(gg.id, 0); });

  // ── Group issues by goal ──
  const issuesByGoal = new Map();
  goals.forEach(g => issuesByGoal.set(g.id, []));
  issuesByGoal.set('__none__', []);
  nodes.forEach(n => {
    const gid = issueGoalMap.get(n.id) || '__none__';
    if (issuesByGoal.has(gid)) issuesByGoal.get(gid).push(n);
    else issuesByGoal.get('__none__').push(n);
  });
  for (const [, issues] of issuesByGoal) {
    issues.sort((a, b) => (PRIO_ORDER[a.priority] || 3) - (PRIO_ORDER[b.priority] || 3));
  }

  // ── Compute goal widths from member issues ──
  goals.forEach(g => {
    const issues = issuesByGoal.get(g.id) || [];
    const w = issues.reduce((sum, n) => sum + (ISSUE_W[n.priority] || 10), 0)
              + Math.max(0, issues.length - 1) * ISSUE_GAP;
    g.w = Math.max(w, 40);
  });

  // ── Build tiers by depth ──
  const maxDepth = d3.max(goals, g => goalDepth.get(g.id)) || 0;
  const tiers = [];
  for (let d = 0; d <= maxDepth; d++) {
    tiers.push(goals.filter(g => goalDepth.get(g.id) === d));
  }

  // ── Position tiers (top to bottom: depth 0 at top) ──
  const BAND_H = GOAL_LINE_H + ISSUE_H;
  const margin = { left: 80, top: 80 };

  // Compute total width per tier for centering
  const tierWidths = tiers.map(tier =>
    tier.reduce((sum, g) => sum + g.w, 0) + Math.max(0, tier.length - 1) * GOAL_HORIZ_GAP
  );
  const maxTierWidth = Math.max(...tierWidths, 200);

  tiers.forEach((tier, ti) => {
    const tierY = margin.top + ti * (BAND_H + TIER_GAP);
    const tierW = tierWidths[ti];
    // Center tier horizontally relative to widest tier
    let x = margin.left + (maxTierWidth - tierW) / 2;

    tier.forEach(g => {
      g.x = x;
      g.y = tierY;
      g.tierIndex = ti;

      // Position issues as columns within this goal
      const issues = issuesByGoal.get(g.id) || [];
      let ix = x;
      issues.forEach(n => {
        const iw = ISSUE_W[n.priority] || 10;
        n.x = ix;
        n.y = tierY + GOAL_LINE_H;
        n.w = iw;
        n.h = ISSUE_H;
        ix += iw + ISSUE_GAP;
      });

      x += g.w + GOAL_HORIZ_GAP;
    });
  });

  // Unassigned issues below all tiers
  const unassigned = issuesByGoal.get('__none__') || [];
  if (unassigned.length > 0) {
    const uY = margin.top + (maxDepth + 1) * (BAND_H + TIER_GAP);
    let ux = margin.left;
    unassigned.forEach(n => {
      const iw = ISSUE_W[n.priority] || 10;
      n.x = ux;
      n.y = uY;
      n.w = iw;
      n.h = ISSUE_H;
      ux += iw + ISSUE_GAP;
    });
  }

  // ── Compute Sankey ribbons for goal-to-goal dependencies ──
  goals.forEach(g => { g._bottomUsed = 0; g._topUsed = 0; });

  // Build dependency edge list: B depends on A → ribbon from A (source) to B (target)
  const goalDeps = [];
  goals.forEach(g => {
    g.depends_on.forEach(depId => {
      if (goalMap.has(depId)) {
        goalDeps.push({ source: depId, target: g.id });
      }
    });
  });

  // Compute outgoing/incoming totals for proportional allocation
  const outTotals = new Map();
  const inTotals = new Map();
  goals.forEach(g => { outTotals.set(g.id, 0); inTotals.set(g.id, 0); });
  goalDeps.forEach(dep => {
    const tgt = goalMap.get(dep.target);
    const src = goalMap.get(dep.source);
    outTotals.set(dep.source, outTotals.get(dep.source) + tgt.w);
    inTotals.set(dep.target, inTotals.get(dep.target) + src.w);
  });

  const ribbons = [];
  goalDeps.forEach(dep => {
    const src = goalMap.get(dep.source);
    const tgt = goalMap.get(dep.target);

    const srcOutTotal = outTotals.get(dep.source) || 1;
    const tgtInTotal = inTotals.get(dep.target) || 1;
    const srcRibbonW = src.w * (tgt.w / srcOutTotal);
    const tgtRibbonW = tgt.w * (src.w / tgtInTotal);

    ribbons.push({
      srcX0: src.x + src._bottomUsed,
      srcX1: src.x + src._bottomUsed + srcRibbonW,
      srcY: src.y + BAND_H,
      tgtX0: tgt.x + tgt._topUsed,
      tgtX1: tgt.x + tgt._topUsed + tgtRibbonW,
      tgtY: tgt.y,
      source: src, target: tgt
    });

    src._bottomUsed += srcRibbonW;
    tgt._topUsed += tgtRibbonW;
  });

  // ── Resolve issue-to-issue links ──
  links.forEach(l => {
    if (typeof l.source !== 'object') l.source = nodeMap.get(l.source);
    if (typeof l.target !== 'object') l.target = nodeMap.get(l.target);
  });

  // ── Render ──
  const width = window.innerWidth, height = window.innerHeight;
  const svg = d3.select('svg').attr('viewBox', [0, 0, width, height]);
  const gRoot = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.08, 5]).on('zoom', e => gRoot.attr('transform', e.transform)));

  // Layer 1: Sankey ribbons (goal-to-goal)
  const ribbonEl = gRoot.append('g').selectAll('path')
    .data(ribbons)
    .join('path')
    .attr('class', 'ribbon')
    .attr('d', r => ribbonPath(r.srcX0, r.srcX1, r.srcY, r.tgtX0, r.tgtX1, r.tgtY))
    .attr('fill', r => GOAL_STATUS_COLOR[r.source.status] || '#484f58')
    .attr('fill-opacity', 0.10)
    .attr('stroke', r => GOAL_STATUS_COLOR[r.source.status] || '#484f58')
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.15);

  // Layer 2: Issue-to-issue dependency curves
  const issueLinkEl = gRoot.append('g').selectAll('path')
    .data(links.filter(l => l.source && l.target))
    .join('path')
    .attr('class', 'issue-link')
    .attr('d', l => {
      const s = l.source, t = l.target;
      if (!s || !t || s.x == null || t.x == null) return '';
      // Connect from center-bottom of source to center-top of target
      const sx = s.x + (s.w || 10) / 2, sy = s.y + (s.h || ISSUE_H);
      const tx = t.x + (t.w || 10) / 2, ty = t.y;
      // If same tier, use a horizontal arc
      if (Math.abs(sy - ty) < 5) {
        const midY = sy + 30;
        return `M${sx},${sy}Q${sx},${midY} ${(sx+tx)/2},${midY}Q${tx},${midY} ${tx},${ty}`;
      }
      const cy1 = sy + (ty - sy) * 0.42;
      const cy2 = sy + (ty - sy) * 0.58;
      return `M${sx},${sy}C${sx},${cy1} ${tx},${cy2} ${tx},${ty}`;
    })
    .attr('stroke', l => ceColor(l.target))
    .attr('stroke-width', 1);

  // Layer 3: Goal bands
  const goalEl = gRoot.append('g').selectAll('g')
    .data(goals)
    .join('g')
    .attr('class', 'goal-band');

  // Thin colored bar at top of band
  goalEl.append('rect')
    .attr('x', d => d.x)
    .attr('y', d => d.y)
    .attr('width', d => d.w)
    .attr('height', GOAL_LINE_H)
    .attr('fill', d => GOAL_STATUS_COLOR[d.status] || '#484f58')
    .attr('fill-opacity', 0.7)
    .attr('rx', 1);

  // Subtle transparent overlay for hover target
  goalEl.append('rect')
    .attr('x', d => d.x - 1)
    .attr('y', d => d.y - 1)
    .attr('width', d => d.w + 2)
    .attr('height', BAND_H + 2)
    .attr('fill', 'transparent')
    .attr('stroke', d => GOAL_STATUS_COLOR[d.status] || '#484f58')
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.12)
    .attr('rx', 2);

  // Goal label to the right
  goalEl.append('text')
    .attr('x', d => d.x + d.w + 10)
    .attr('y', d => d.y + BAND_H / 2)
    .attr('fill', d => GOAL_STATUS_COLOR[d.status] || '#8b949e')
    .attr('font-size', '11px')
    .attr('font-weight', 600)
    .attr('dominant-baseline', 'central')
    .attr('opacity', 0.75)
    .text(d => d.id);

  // Sub-label (target percentage)
  goalEl.append('text')
    .attr('x', d => d.x + d.w + 10)
    .attr('y', d => d.y + BAND_H / 2 + 14)
    .attr('fill', '#8b949e')
    .attr('font-size', '9px')
    .attr('dominant-baseline', 'central')
    .attr('opacity', 0.5)
    .text(d => {
      const issues = issuesByGoal.get(d.id) || [];
      const target = d.target.match(/~?\d+%/)?.[0] || '';
      return `${issues.length} issues${target ? ' | ' + target : ''}`;
    });

  goalEl.on('mouseover', (e, d) => highlightGoal(d))
    .on('mouseout', () => unhighlight())
    .on('click', (e, d) => showGoalInfo(d));

  // Layer 4: Issue columns
  const allIssues = nodes.filter(n => n.x != null);
  const issueEl = gRoot.append('g').selectAll('g')
    .data(allIssues)
    .join('g')
    .attr('class', 'issue-col');

  // Issue rectangle (vertical column)
  issueEl.append('rect')
    .attr('x', d => d.x)
    .attr('y', d => d.y)
    .attr('width', d => d.w || 10)
    .attr('height', d => d.h || ISSUE_H)
    .attr('fill', d => ceColor(d))
    .attr('rx', 1);

  // Blocked indicator: red top line
  issueEl.filter(d => d.status === 'blocked')
    .append('rect')
    .attr('x', d => d.x)
    .attr('y', d => d.y)
    .attr('width', d => d.w || 10)
    .attr('height', 2)
    .attr('fill', 'rgba(255,60,60,0.6)');

  // Issue label (rotated text inside column)
  issueEl.append('text')
    .attr('transform', d => {
      const cx = d.x + (d.w || 10) / 2;
      const cy = d.y + (d.h || ISSUE_H) / 2;
      return `translate(${cx},${cy}) rotate(-90)`;
    })
    .attr('fill', '#c9d1d9')
    .attr('font-size', '8px')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'central')
    .attr('pointer-events', 'none')
    .text(d => `#${d.id}`);

  issueEl.on('mouseover', (e, d) => highlightIssue(d))
    .on('mouseout', () => unhighlight())
    .on('click', (e, d) => showIssueInfo(d));

  // ── Highlight ──

  function highlightGoal(d) {
    const connGoals = new Set([d.id]);
    const connIssues = new Set(d.issues);
    goals.forEach(gg => {
      if (gg.depends_on.includes(d.id)) connGoals.add(gg.id);
    });
    d.depends_on.forEach(id => { if (goalMap.has(id)) connGoals.add(id); });

    goalEl.classed('dimmed', gg => !connGoals.has(gg.id));
    issueEl.classed('dimmed', n => !connIssues.has(n.id));
    ribbonEl.classed('dimmed', r => r.source.id !== d.id && r.target.id !== d.id);
    ribbonEl.classed('highlighted', r => r.source.id === d.id || r.target.id === d.id);
    issueLinkEl.classed('dimmed', true);
  }

  function highlightIssue(d) {
    const connected = new Set([d.id]);
    links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (s === d.id) connected.add(t);
      if (t === d.id) connected.add(s);
    });
    const myGoal = issueGoalMap.get(d.id);

    issueEl.classed('dimmed', n => !connected.has(n.id));
    issueLinkEl.classed('dimmed', l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s !== d.id && t !== d.id;
    });
    issueLinkEl.classed('highlighted', l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s === d.id || t === d.id;
    });
    const connGoals = new Set();
    if (myGoal) connGoals.add(myGoal);
    goalEl.classed('dimmed', gg => !connGoals.has(gg.id));
    ribbonEl.classed('dimmed', true);
  }

  function unhighlight() {
    issueEl.classed('dimmed', false);
    goalEl.classed('dimmed', false);
    issueLinkEl.classed('dimmed', false).classed('highlighted', false);
    ribbonEl.classed('dimmed', false).classed('highlighted', false);
  }

  // ── Info panels ──

  function showGoalInfo(d) {
    const info = document.getElementById('info');
    info.style.display = 'block';
    document.getElementById('info-title').innerHTML = `<span class="goal-title">${d.id}</span>: ${d.title}`;
    let meta = `<b>Status:</b> ${d.status} | <b>Issues:</b> ${d.issues.length}`;
    if (d.target) meta += `<br><b>Target:</b> ${d.target}`;
    document.getElementById('info-meta').innerHTML = meta;

    let html = '';
    if (d.depends_on.length) {
      html += `<div><b>Depends on:</b> ${d.depends_on.map(id => `<span class="goal-link" onclick="focusGoal('${id}')">${id}</span>`).join(', ')}</div>`;
    }
    const dependers = goals.filter(gg => gg.depends_on.includes(d.id));
    if (dependers.length) {
      html += `<div><b>Unblocks:</b> ${dependers.map(gg => `<span class="goal-link" onclick="focusGoal('${gg.id}')">${gg.id}</span>`).join(', ')}</div>`;
    }
    if (d.issues.length) {
      html += '<div style="margin-top:8px"><b>Issues:</b><br>';
      const sorted = d.issues.slice().sort((a, b) => {
        const na = nodeMap.get(a), nb = nodeMap.get(b);
        if (!na || !nb) return 0;
        return (PRIO_ORDER[na.priority] || 3) - (PRIO_ORDER[nb.priority] || 3);
      });
      for (const id of sorted) {
        const n = nodeMap.get(id);
        if (n) {
          const pColor = { critical: '#f85149', high: '#f0883e', medium: '#8b949e', low: '#484f58' }[n.priority] || '#8b949e';
          html += `<span class="dep-link" onclick="focusNode(${id})" style="display:inline-block;margin:2px 4px 2px 0;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);border-left:3px solid ${pColor};font-size:11px">#${id}</span>`;
        }
      }
      html += '</div>';
    }
    document.getElementById('info-deps').innerHTML = html;
  }

  function showIssueInfo(d) {
    const info = document.getElementById('info');
    info.style.display = 'block';
    document.getElementById('info-title').textContent = `#${d.id}: ${d.title}`;
    let meta = `<b>Priority:</b> ${d.priority} | <b>Status:</b> ${d.status}`;
    if (d.cluster && d.cluster !== 'Unclustered') meta += ` | <b>Cluster:</b> ${d.cluster}`;
    if (d.goal) meta += ` | <b>Goal:</b> <span class="goal-link" onclick="focusGoal('${d.goal}')">${d.goal}</span>`;
    if (d.compiler_errors) meta += ` | <b>CE:</b> ${d.compiler_errors}`;
    if (d.test262_skip) meta += ` | <b>Skip:</b> ${d.test262_skip}`;
    if (d.test262_fail) meta += ` | <b>Fail:</b> ${d.test262_fail}`;
    document.getElementById('info-meta').innerHTML = meta;

    const deps = d.depends_on || [];
    const dependers = nodes.filter(n => n.depends_on && n.depends_on.includes(d.id));
    let html = '';
    if (deps.length) {
      html += `<div><b>Depends on:</b> ${deps.map(id => `<span class="dep-link" onclick="focusNode(${id})">#${id}</span>`).join(', ')}</div>`;
    }
    if (dependers.length) {
      html += `<div><b>Unblocks:</b> ${dependers.map(n => `<span class="dep-link" onclick="focusNode(${n.id})">#${n.id}</span>`).join(', ')}</div>`;
    }
    const files = d.files;
    if (files && (Array.isArray(files) ? files.length : Object.keys(files).length)) {
      html += '<div style="margin-top:6px"><b>Files:</b>';
      if (Array.isArray(files)) {
        html += '<br>' + files.map(f => `<code style="font-size:11px;color:#7ee787">${f}</code>`).join('<br>');
      } else {
        for (const [file, finfo] of Object.entries(files)) {
          html += `<div style="margin-top:4px"><code style="font-size:11px;color:#7ee787">${file}</code>`;
          if (finfo.new && finfo.new.length) html += `<br><span style="color:#3fb950;font-size:10px">+ ${finfo.new.join('<br>+ ')}</span>`;
          if (finfo.breaking && finfo.breaking.length) html += `<br><span style="color:#f85149;font-size:10px">! ${finfo.breaking.join('<br>! ')}</span>`;
          html += '</div>';
        }
      }
      html += '</div>';
    }
    document.getElementById('info-deps').innerHTML = html;
  }

  window.focusNode = function(id) {
    const n = nodes.find(n => n.id === id);
    if (n) { highlightIssue(n); showIssueInfo(n); }
  };

  window.focusGoal = function(id) {
    const gg = goals.find(g => g.id === id);
    if (gg) { highlightGoal(gg); showGoalInfo(gg); }
  };

  // ── Filter controls ──
  document.querySelectorAll('#controls input').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.parentElement.classList.toggle('active', cb.checked);
      applyFilters();
    });
  });

  function applyFilters() {
    const statuses = new Set();
    const priorities = new Set();
    let showGoals = false;
    document.querySelectorAll('#controls input:checked').forEach(cb => {
      const v = cb.value;
      if (v === 'show-goals') showGoals = true;
      else if (v.startsWith('p-')) priorities.add(v.slice(2));
      else statuses.add(v);
    });
    issueEl.style('display', d => (statuses.has(d.status) && priorities.has(d.priority)) ? null : 'none');
    issueLinkEl.style('display', l => {
      const s = l.source, t = l.target;
      return (s && t && statuses.has(s.status) && priorities.has(s.priority) && statuses.has(t.status) && priorities.has(t.priority)) ? null : 'none';
    });
    goalEl.style('display', showGoals ? null : 'none');
    ribbonEl.style('display', showGoals ? null : 'none');
  }
  applyFilters();
}

init();
</script>
</body>
</html>
