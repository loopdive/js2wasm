name: Test262 baseline validate

# Spot-check 50 random `pass` entries from the LIVE baseline in
# `loopdive/js2wasm-baselines` against current PR HEAD on every PR.
#
# Why: the committed JSONL lags behind main during rapid-merge windows
# (refresh-committed-baseline.yml needs a full ~20 min sharded run to
# complete). Using the baselines repo directly eliminates false-positive
# failures caused by stale committed data (#1218 follow-up).
#
# The baselines repo is updated by `promote-baseline` in test262-sharded.yml
# after every successful push-to-main run — always at most one sharded-run
# behind main, never behind a PR's own changes.
#
# Cost: ~1 minute per run (50 tests × ~1s). See #1218.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/validate-test262-baseline.ts"
      - ".github/workflows/test262-baseline-validate.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  baseline-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (with test262 submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - run: pnpm install --frozen-lockfile

      - name: Fetch fresh baseline from baselines repo
        run: |
          git clone --depth=1 https://github.com/loopdive/js2wasm-baselines.git /tmp/js2wasm-baselines 2>/dev/null || true
          if [ -f /tmp/js2wasm-baselines/test262-current.jsonl ]; then
            cp /tmp/js2wasm-baselines/test262-current.jsonl benchmarks/results/test262-current.jsonl
            echo "Baseline fetched from js2wasm-baselines ($(wc -l < benchmarks/results/test262-current.jsonl) entries)."
          else
            echo "Warning: baselines repo unavailable — falling back to committed JSONL."
          fi

      - name: Validate baseline
        env:
          # Deterministic seed derived from the PR number — same PR re-runs
          # always sample the same 50 tests.
          PR_NUMBER: ${{ github.event.pull_request.number || github.run_number }}
        run: npx tsx scripts/validate-test262-baseline.ts
