name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Regenerate planning artifacts
        run: pnpm run build:planning-artifacts

      - name: Check planning artifacts are committed
        run: |
          git diff --exit-code -- \
            plan/goals \
            plan/issues/sprints \
            dashboard/data.js \
            dashboard/data \
            public/graph-data.json
