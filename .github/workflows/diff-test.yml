name: Differential test

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/diff-test.ts"
      - "scripts/diff-test-gate.ts"
      - "scripts/diff-triage.ts"
      - "tests/differential/**"
      - "benchmarks/results/diff-test-baseline.json"
      - ".github/workflows/diff-test.yml"
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  diff-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - run: pnpm install --frozen-lockfile

      - name: Run differential harness
        run: npx tsx scripts/diff-test.ts
        # Harness exits non-zero on any non-match; that's expected on a
        # corpus that finds real bugs. The merge gate runs separately.
        continue-on-error: true

      - name: Upload diff-test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diff-test-report
          path: benchmarks/results/diff-test.json
          if-no-files-found: error

      - name: Run triage (informational)
        if: always()
        run: npx tsx scripts/diff-triage.ts > diff-triage.md || true

      - name: Upload triage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-triage-report
          path: diff-triage.md
          if-no-files-found: warn

      # Delta-gate ON PRs ONLY — block merge if a previously-matching program
      # now mismatches. On `push: main` the baseline is refreshed below.
      - name: Delta gate (PR only)
        if: github.event_name == 'pull_request'
        run: npx tsx scripts/diff-test-gate.ts

      # On merge to main, refresh the committed baseline so the next PR
      # compares against the latest known-good state.
      - name: Refresh baseline on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp benchmarks/results/diff-test.json benchmarks/results/diff-test-baseline.json
          if ! git diff --quiet benchmarks/results/diff-test-baseline.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add benchmarks/results/diff-test-baseline.json
            git commit -m "chore(diff-test): refresh baseline [skip ci]"
            git push
          fi
