name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run pack/publish as dry-run (no uploads)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write   # for npm provenance + JSR OIDC

jobs:
  publish-npm:
    name: npm publish (@loopdive/js2 + js2wasm proxy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Pack @loopdive/js2 (dry-run preview)
        run: npm pack --dry-run

      - name: Publish @loopdive/js2
        if: github.event_name == 'push' || inputs.dry-run == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish js2wasm proxy
        if: github.event_name == 'push' || inputs.dry-run == 'false'
        working-directory: packages/js2wasm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-jsr:
    name: JSR publish (@loopdive/js2)
    runs-on: ubuntu-latest
    needs: publish-npm
    if: github.event_name == 'push' || inputs.dry-run == 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to JSR
        run: npx jsr publish --allow-dirty
