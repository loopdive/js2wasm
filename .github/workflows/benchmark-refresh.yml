name: Refresh Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      allow_performance_regressions:
        description: "Allow performance regressions and continue anyway"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: benchmark-refresh-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  refresh-benchmarks:
    if: github.repository == 'loopdive/js2wasm' && (github.event_name != 'push' || github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Snapshot current performance baseline
        run: |
          # Canonical committed location is `benchmarks/results/`
          # (see scripts/generate-playground-benchmark-sidebar.mjs RESULTS_PATH).
          # The `public/` and `playground/public/` copies are derived artifacts —
          # they were LFS-tracked until commit 616a7a528 (#1170 LFS migration,
          # 2026-04-25), which untracked all `public/benchmarks/results/*.json`.
          # Prefer the committed location; fall back to derived copies in case
          # someone has them locally (no functional difference — same payload).
          mkdir -p benchmark-baseline
          if [ -f benchmarks/results/playground-benchmark-sidebar.json ]; then
            cp benchmarks/results/playground-benchmark-sidebar.json benchmark-baseline/playground-benchmark-sidebar.json
          elif [ -f public/benchmarks/results/playground-benchmark-sidebar.json ]; then
            cp public/benchmarks/results/playground-benchmark-sidebar.json benchmark-baseline/playground-benchmark-sidebar.json
          elif [ -f playground/public/benchmarks/results/playground-benchmark-sidebar.json ]; then
            cp playground/public/benchmarks/results/playground-benchmark-sidebar.json benchmark-baseline/playground-benchmark-sidebar.json
          else
            echo "Missing committed playground benchmark baseline."
            exit 2
          fi

      - name: Refresh benchmark artifacts
        run: pnpm run refresh:benchmarks

      - name: Compare landing-page benchmark performance
        id: benchmark_diff
        run: |
          mkdir -p benchmark-reports
          set +e
          node scripts/diff-playground-benchmarks.mjs \
            --baseline benchmark-baseline/playground-benchmark-sidebar.json \
            --candidate public/benchmarks/results/playground-benchmark-sidebar.json \
            --max-relative-regression 0.50 \
            --max-wasm-slowdown 0.40 \
            > benchmark-reports/performance-regressions.txt
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 1 ]; then
            echo "Unexpected benchmark diff exit code $exit_code"
            exit "$exit_code"
          fi
          if [ "$exit_code" -eq 1 ]; then
            echo "regressions=true" >> "$GITHUB_OUTPUT"
          else
            echo "regressions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Print performance regressions (informational on PR/push, gating on workflow_dispatch)
        if: steps.benchmark_diff.outputs.regressions == 'true'
        run: |
          echo "Landing-page benchmark regressions detected relative to benchmarks/results/playground-benchmark-sidebar.json:"
          cat benchmark-reports/performance-regressions.txt
          echo
          echo "Note (#1214): on pull_request and push events, this step does NOT fail the workflow."
          echo "  The committed baseline is generated locally, but CI runs on shared GitHub Actions"
          echo "  runners (slower, noisier scheduling). Both wasm AND js measurements are affected,"
          echo "  but wasm is more sensitive to cache/scheduling variance — so the wasm:js ratio"
          echo "  drifts in a way that is NOT a real compiler regression."
          echo "  To enforce regression gating manually: trigger via workflow_dispatch with"
          echo "  allow_performance_regressions=false."
          echo "  Architectural follow-up: regenerate baseline on push-to-main and commit it back"
          echo "  (see #1214 option A) — this would make the gate meaningful again on PRs."

      - name: Fail on performance regressions (workflow_dispatch only)
        if: steps.benchmark_diff.outputs.regressions == 'true' && github.event_name == 'workflow_dispatch' && !inputs.allow_performance_regressions
        run: |
          echo "Failing workflow due to performance regressions (workflow_dispatch enforcement)."
          exit 1

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: benchmark-refresh-report
          path: |
            benchmark-reports/**
            benchmarks/results/latest.json
            benchmarks/results/latest.md
            benchmarks/results/history.json
            benchmarks/results/playground-benchmark-sidebar.json
            benchmarks/results/size-benchmarks.json
            public/benchmarks/results/latest.json
            public/benchmarks/results/history.json
            public/benchmarks/results/playground-benchmark-sidebar.json
            public/benchmarks/results/size-benchmarks.json
            playground/public/benchmarks/results/playground-benchmark-sidebar.json
          if-no-files-found: warn

      # #1216: auto-commit a freshly-generated playground benchmark baseline
      # back to main on push events. This is the architectural follow-up to
      # #1214 — by promoting the CI-derived baseline, future PR comparisons
      # will run against numbers that reflect CI runner characteristics
      # (slower CPUs, noisier scheduling) instead of a local dev machine.
      # That makes the regression-detection step meaningful again on PRs.
      #
      # Guards:
      #   - Only on `push: main` (not pull_request, not workflow_dispatch).
      #     The actor check excludes the bot itself to avoid commit loops.
      #   - Skip if the benchmark diff reported regressions — promoting
      #     "regressed" numbers would mask real perf regressions instead
      #     of catching them.
      #   - Skip if the file is byte-identical to what's committed (no-op).
      #   - `[skip ci]` in the commit message prevents this commit from
      #     retriggering the workflow.
      #
      # Pattern follows `refresh-committed-baseline.yml` (test262 JSONL sync).
      - name: Auto-commit refreshed baseline (#1216)
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          github.actor != 'github-actions[bot]' &&
          steps.benchmark_diff.outputs.regressions != 'true'
        run: |
          set -euo pipefail
          # Configure bot identity for the commit. Same identity as
          # refresh-committed-baseline.yml so the commit-back loop is
          # consistently attributable.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only the canonical committed location (per #1170 LFS
          # migration: the public/ copies are gitignored downstream artifacts;
          # they get regenerated by build-pages.js at deploy time).
          git add -f benchmarks/results/playground-benchmark-sidebar.json
          if git diff --cached --quiet; then
            echo "Baseline byte-identical to committed copy — nothing to commit."
            exit 0
          fi
          # [skip ci] keeps this commit from retriggering the Refresh
          # Benchmarks workflow (or any other workflow on main pushes).
          git commit -m "chore(ci #1216): refresh playground benchmark baseline [skip ci]"
          # Race handling: another [skip ci] commit may have landed while
          # we were running. Try fast-forward; on conflict, reset to
          # origin/main and reapply the regenerated file. Mirrors the
          # refresh-committed-baseline.yml pattern.
          if ! git pull --rebase --autostash origin main; then
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            git add -f benchmarks/results/playground-benchmark-sidebar.json
            git diff --cached --quiet && exit 0
            git commit -m "chore(ci #1216): refresh playground benchmark baseline [skip ci]"
          fi
          git push

      # Note (#1216): even after auto-commit lands, the regression-detection
      # step is still informational on PR/push events (gating only on
      # workflow_dispatch). Re-enabling PR-event gating is a separate
      # follow-up that requires verifying the new CI-derived baseline is
      # stable across runner-pool changes. Until then this auto-commit
      # at least keeps the baseline from drifting indefinitely.
