# Prefix von Ctrl+B auf Ctrl+A ändern (ergonomischer)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Maus aktivieren (scrollen, panes klicken)
set -g mouse on

# Scroll 1 row at a time (default is 5)
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode    WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N 1 scroll-down

# Reduce escape-time for faster key response
set -sg escape-time 10

# Fenster-Index bei 1 starten (statt 0)
set -g base-index 1
set -g pane-base-index 1

# Larger scrollback buffer
set -g history-limit 50000

# True Color für Cursor/Neovim
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Split-Shortcuts intuitiver
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane-Navigation mit Alt+Pfeiltasten
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Config neu laden
bind r source-file ~/.tmux.conf \; display "Reloaded!"