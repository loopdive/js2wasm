<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>js2wasm Test262 Conformance Trend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #58a6ff; margin-bottom: 8px; font-size: 24px; }
    .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 14px; }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px 24px;
      min-width: 140px;
    }
    .stat-card .label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 28px; font-weight: bold; margin-top: 4px; }
    .stat-card .value.pass { color: #3fb950; }
    .stat-card .value.fail { color: #f85149; }
    .stat-card .value.ce { color: #d29922; }
    .stat-card .value.skip { color: #8b949e; }
    .stat-card .value.rate { color: #58a6ff; }
    .chart-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .chart-container h2 { color: #c9d1d9; font-size: 16px; margin-bottom: 16px; }
    svg { width: 100%; height: auto; }
    .legend {
      display: flex;
      gap: 24px;
      margin-top: 12px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #8b949e;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .table-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 24px;
    }
    .table-container h2 { color: #c9d1d9; font-size: 16px; margin-bottom: 16px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #21262d;
    }
    th { color: #8b949e; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    tr:hover { background: #1c2128; }
    .delta { font-size: 11px; margin-left: 4px; }
    .delta.up { color: #3fb950; }
    .delta.down { color: #f85149; }
    #loading { color: #8b949e; text-align: center; padding: 48px; }
    .tooltip {
      position: absolute;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>js2wasm Test262 Conformance</h1>
  <p class="subtitle">Historical trend of test262 pass/fail/compile-error counts</p>
  <p class="subtitle" id="run-timestamp" style="display:none"></p>

  <div id="skip-reasons-container" class="table-container" style="display:none;margin-bottom:24px">
    <h2>Unsupported Features (Skipped Tests)</h2>
    <table>
      <thead><tr><th>Feature / Reason</th><th class="num">Tests Skipped</th></tr></thead>
      <tbody id="skip-reasons-body"></tbody>
    </table>
  </div>

  <div id="loading">Loading data...</div>
  <div id="content" style="display:none">
    <div class="stats-row" id="stats-row"></div>

    <div class="chart-container">
      <h2>Conformance Trend</h2>
      <div id="chart"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div> Pass</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div> Fail</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d29922"></div> Compile Error</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div> Skip</div>
        <div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div> Pass Rate %</div>
      </div>
    </div>
    <div class="table-container">
      <h2>Run History</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Git Hash</th>
            <th class="num">Total</th>
            <th class="num">Pass</th>
            <th class="num">Fail</th>
            <th class="num">CE</th>
            <th class="num">Skip</th>
            <th class="num">Pass Rate</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const COLORS = {
      pass: '#3fb950',
      fail: '#f85149',
      ce: '#d29922',
      skip: '#8b949e',
      rate: '#58a6ff',
    };

    async function loadData() {
      for (const url of ['runs/index.json', '/benchmarks/results/runs/index.json']) {
        try {
          const res = await fetch(url);
          if (res.ok) return await res.json();
        } catch {}
      }
      document.getElementById('loading').textContent = 'Error loading runs/index.json. Serve this directory with a local HTTP server.';
      return null;
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
        ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function renderStats(data) {
      const latest = data[data.length - 1];
      const prev = data.length > 1 ? data[data.length - 2] : null;
      const passRate = latest.total > 0 ? ((latest.pass / latest.total) * 100).toFixed(1) : '0.0';

      function delta(curr, old) {
        if (!old) return '';
        const d = curr - old;
        if (d === 0) return '';
        const cls = d > 0 ? 'up' : 'down';
        return `<span class="delta ${cls}">${d > 0 ? '+' : ''}${d}</span>`;
      }

      const row = document.getElementById('stats-row');
      row.innerHTML = `
        <div class="stat-card"><div class="label">Pass</div><div class="value pass">${latest.pass.toLocaleString()}${delta(latest.pass, prev?.pass)}</div></div>
        <div class="stat-card"><div class="label">Fail</div><div class="value fail">${latest.fail.toLocaleString()}${delta(latest.fail, prev?.fail)}</div></div>
        <div class="stat-card"><div class="label">Compile Error</div><div class="value ce">${latest.ce.toLocaleString()}${delta(latest.ce, prev?.ce)}</div></div>
        <div class="stat-card"><div class="label">Skip</div><div class="value skip">${latest.skip.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">Pass Rate</div><div class="value rate">${passRate}%</div></div>
      `;
    }

    function renderChart(data) {
      if (data.length < 2) {
        document.getElementById('chart').innerHTML = '<p style="color:#8b949e;text-align:center;padding:24px">Need at least 2 data points for a chart.</p>';
        return;
      }

      const W = 1100, H = 400;
      const PAD = { top: 20, right: 60, bottom: 60, left: 70 };
      const plotW = W - PAD.left - PAD.right;
      const plotH = H - PAD.top - PAD.bottom;

      // Compute scales
      const maxCount = Math.max(...data.map(d => Math.max(d.pass + d.fail + d.ce + d.skip, d.total)));
      const yMax = Math.ceil(maxCount / 5000) * 5000;

      function x(i) { return PAD.left + (i / (data.length - 1)) * plotW; }
      function y(val) { return PAD.top + plotH - (val / yMax) * plotH; }
      function yPct(pct) { return PAD.top + plotH - (pct / 100) * plotH; }

      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

      // Grid lines
      const gridSteps = 5;
      for (let i = 0; i <= gridSteps; i++) {
        const val = (yMax / gridSteps) * i;
        const yPos = y(val);
        svg += `<line x1="${PAD.left}" y1="${yPos}" x2="${W - PAD.right}" y2="${yPos}" stroke="#21262d" stroke-width="1"/>`;
        svg += `<text x="${PAD.left - 8}" y="${yPos + 4}" text-anchor="end" fill="#484f58" font-size="11">${(val / 1000).toFixed(0)}k</text>`;
        // Right axis: percentage
        const pct = (i / gridSteps) * 100;
        svg += `<text x="${W - PAD.right + 8}" y="${yPos + 4}" text-anchor="start" fill="#484f58" font-size="11">${pct.toFixed(0)}%</text>`;
      }

      // X-axis labels (show up to 8)
      const step = Math.max(1, Math.floor(data.length / 8));
      for (let i = 0; i < data.length; i += step) {
        const xPos = x(i);
        const d = new Date(data[i].timestamp);
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        svg += `<text x="${xPos}" y="${H - PAD.bottom + 20}" text-anchor="middle" fill="#484f58" font-size="11">${label}</text>`;
        const time = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        svg += `<text x="${xPos}" y="${H - PAD.bottom + 34}" text-anchor="middle" fill="#484f58" font-size="10">${time}</text>`;
      }

      // Stacked area: skip (bottom) + ce + fail + pass (top)
      // Draw as layered areas
      function areaPath(valueFn, baseFn) {
        let path = `M ${x(0)} ${valueFn(0)}`;
        for (let i = 1; i < data.length; i++) path += ` L ${x(i)} ${valueFn(i)}`;
        for (let i = data.length - 1; i >= 0; i--) path += ` L ${x(i)} ${baseFn(i)}`;
        path += ' Z';
        return path;
      }

      // Cumulative values for stacking
      const cumSkip = data.map(d => d.skip);
      const cumCe = data.map((d, i) => cumSkip[i] + d.ce);
      const cumFail = data.map((d, i) => cumCe[i] + d.fail);
      const cumPass = data.map((d, i) => cumFail[i] + d.pass);

      // Areas (bottom to top)
      svg += `<path d="${areaPath(i => y(cumSkip[i]), () => y(0))}" fill="${COLORS.skip}" opacity="0.15"/>`;
      svg += `<path d="${areaPath(i => y(cumCe[i]), i => y(cumSkip[i]))}" fill="${COLORS.ce}" opacity="0.2"/>`;
      svg += `<path d="${areaPath(i => y(cumFail[i]), i => y(cumCe[i]))}" fill="${COLORS.fail}" opacity="0.2"/>`;
      svg += `<path d="${areaPath(i => y(cumPass[i]), i => y(cumFail[i]))}" fill="${COLORS.pass}" opacity="0.2"/>`;

      // Lines
      function linePath(valueFn) {
        let path = `M ${x(0)} ${valueFn(0)}`;
        for (let i = 1; i < data.length; i++) path += ` L ${x(i)} ${valueFn(i)}`;
        return path;
      }

      svg += `<path d="${linePath(i => y(data[i].pass))}" fill="none" stroke="${COLORS.pass}" stroke-width="2.5"/>`;
      svg += `<path d="${linePath(i => y(data[i].fail))}" fill="none" stroke="${COLORS.fail}" stroke-width="2"/>`;
      svg += `<path d="${linePath(i => y(data[i].ce))}" fill="none" stroke="${COLORS.ce}" stroke-width="2"/>`;

      // Pass rate line (right axis)
      const rates = data.map(d => d.total > 0 ? (d.pass / d.total) * 100 : 0);
      svg += `<path d="${linePath(i => yPct(rates[i]))}" fill="none" stroke="${COLORS.rate}" stroke-width="2" stroke-dasharray="6,3"/>`;

      // Data points (interactive)
      for (let i = 0; i < data.length; i++) {
        const d = data[i];
        const rate = d.total > 0 ? ((d.pass / d.total) * 100).toFixed(1) : '0.0';
        svg += `<circle cx="${x(i)}" cy="${y(d.pass)}" r="4" fill="${COLORS.pass}" class="data-point" data-idx="${i}"/>`;
        // Invisible wider hit area for tooltip
        svg += `<rect x="${x(i) - 15}" y="${PAD.top}" width="30" height="${plotH}" fill="transparent" class="hover-zone" data-idx="${i}"/>`;
      }

      // Axis labels
      svg += `<text x="${PAD.left - 45}" y="${PAD.top + plotH / 2}" text-anchor="middle" fill="#484f58" font-size="12" transform="rotate(-90 ${PAD.left - 45} ${PAD.top + plotH / 2})">Test Count</text>`;
      svg += `<text x="${W - PAD.right + 45}" y="${PAD.top + plotH / 2}" text-anchor="middle" fill="#484f58" font-size="12" transform="rotate(90 ${W - PAD.right + 45} ${PAD.top + plotH / 2})">Pass Rate</text>`;

      svg += '</svg>';
      document.getElementById('chart').innerHTML = svg;

      // Tooltip interactivity
      const tooltip = document.getElementById('tooltip');
      document.querySelectorAll('.hover-zone').forEach(zone => {
        zone.addEventListener('mouseenter', (e) => {
          const idx = parseInt(zone.getAttribute('data-idx'));
          const d = data[idx];
          const rate = d.total > 0 ? ((d.pass / d.total) * 100).toFixed(1) : '0.0';
          tooltip.innerHTML = `<strong>${formatDate(d.timestamp)}</strong><br>` +
            `Pass: <span style="color:${COLORS.pass}">${d.pass.toLocaleString()}</span> | ` +
            `Fail: <span style="color:${COLORS.fail}">${d.fail.toLocaleString()}</span> | ` +
            `CE: <span style="color:${COLORS.ce}">${d.ce.toLocaleString()}</span><br>` +
            `Rate: <span style="color:${COLORS.rate}">${rate}%</span> | ` +
            `Git: <code>${d.gitHash}</code>`;
          tooltip.style.display = 'block';
        });
        zone.addEventListener('mousemove', (e) => {
          tooltip.style.left = (e.pageX + 12) + 'px';
          tooltip.style.top = (e.pageY - 10) + 'px';
        });
        zone.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
        });
      });
    }

    function renderHistory(data) {
      const tbody = document.getElementById('history-body');
      // Show newest first
      const reversed = [...data].reverse();
      tbody.innerHTML = reversed.map((d, ri) => {
        const prev = ri < reversed.length - 1 ? reversed[ri + 1] : null;
        const rate = d.total > 0 ? ((d.pass / d.total) * 100).toFixed(1) : '0.0';
        function delta(curr, old, invert) {
          if (!old) return '';
          const diff = curr - old;
          if (diff === 0) return '';
          const good = invert ? diff < 0 : diff > 0;
          return `<span class="delta ${good ? 'up' : 'down'}">${diff > 0 ? '+' : ''}${diff}</span>`;
        }
        return `<tr>
          <td>${formatDate(d.timestamp)}</td>
          <td><code>${d.gitHash}</code></td>
          <td class="num">${d.total.toLocaleString()}</td>
          <td class="num">${d.pass.toLocaleString()}${delta(d.pass, prev?.pass, false)}</td>
          <td class="num">${d.fail.toLocaleString()}${delta(d.fail, prev?.fail, true)}</td>
          <td class="num">${d.ce.toLocaleString()}${delta(d.ce, prev?.ce, true)}</td>
          <td class="num">${d.skip.toLocaleString()}</td>
          <td class="num" style="color:${COLORS.rate}">${rate}%</td>
        </tr>`;
      }).join('');
    }

    async function loadReport() {
      // Try relative path first (works when built into pages-dist),
      // then try absolute path from repo root (works in local dev)
      for (const url of ['test262-report.json', '/benchmarks/results/test262-report.json']) {
        try {
          const res = await fetch(url);
          if (res.ok) return await res.json();
        } catch {}
      }
      return null;
    }

    function renderTimestamp(report) {
      if (!report?.timestamp) return;
      const el = document.getElementById('run-timestamp');
      const d = new Date(report.timestamp);
      el.textContent = 'Last run: ' + d.toLocaleString();
      el.style.display = 'block';
    }

    function renderSkipReasons(report) {
      if (!report?.skip_reasons) return;
      const entries = Object.entries(report.skip_reasons).sort((a, b) => b[1] - a[1]);
      if (entries.length === 0) return;
      const container = document.getElementById('skip-reasons-container');
      const tbody = document.getElementById('skip-reasons-body');
      tbody.innerHTML = entries.map(([reason, count]) =>
        `<tr><td>${reason}</td><td class="num">${count.toLocaleString()}</td></tr>`
      ).join('');
      container.style.display = 'block';
    }

    (async () => {
      const [data, report] = await Promise.all([loadData(), loadReport()]);

      if (report) {
        renderTimestamp(report);
        renderSkipReasons(report);
      }

      document.getElementById('loading').style.display = 'none';

      if (data && data.length > 0) {
        document.getElementById('content').style.display = 'block';
        renderStats(data);
        renderChart(data);
        renderHistory(data);
      }
    })();
  </script>
</body>
</html>
