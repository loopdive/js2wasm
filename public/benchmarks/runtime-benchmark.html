<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Runtime Benchmarks</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 20px;
        background: #060a14;
        color: rgba(255, 255, 255, 0.88);
        font:
          13px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
      }

      #status {
        margin: 0 0 12px;
        color: rgba(255, 255, 255, 0.68);
      }

      #result {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #sandbox-root {
        position: fixed;
        inset: auto auto 0 0;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <h1>Browser Runtime Benchmarks</h1>
    <div id="status">Idle.</div>
    <pre id="result"></pre>
    <div id="sandbox-root" aria-hidden="true"></div>
    <script type="module" src="./runtime-benchmark.js"></script>
  </body>
</html>
