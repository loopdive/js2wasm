<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Competitive Benchmark Programs</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070910;
        --fg: #f4f6fb;
        --muted: #9ba0ad;
        --line: rgba(255, 255, 255, 0.14);
      }
      body {
        margin: 0;
        padding: 48px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        max-width: 840px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
        line-height: 1.1;
      }
      p {
        margin: 0 0 28px;
        color: var(--muted);
        line-height: 1.6;
      }
      ul {
        display: grid;
        gap: 10px;
        padding: 0;
        list-style: none;
      }
      a {
        display: block;
        padding: 14px 16px;
        border: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      a:hover {
        border-color: rgba(255, 255, 255, 0.34);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Competitive benchmark programs</h1>
      <p>
        These are the JavaScript source programs used for the standalone WebAssembly comparison on the landing page.
      </p>
      <ul>
        <li><a href="./array-sum.js">array-sum.js</a></li>
        <li><a href="./fib.js">fib.js</a></li>
        <li><a href="./fib-recursive.js">fib-recursive.js</a></li>
        <li><a href="./object-ops.js">object-ops.js</a></li>
        <li><a href="./string-hash.js">string-hash.js</a></li>
      </ul>
    </main>
  </body>
</html>
