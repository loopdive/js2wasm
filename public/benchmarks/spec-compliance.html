<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script defer src="../frame-nav-sync.js"></script>
    <title>ECMAScript 2026 Compliance — js2wasm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060a14;
        --bg-soft: #0c1220;
        --surface: rgba(255, 255, 255, 0.05);
        --surface-hover: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.46);
        --pass: #3fb950;
        --fail: #f85149;
        --warn: #d29922;
        --skip: rgba(255, 255, 255, 0.4);
        --accent: rgba(255, 255, 255, 0.75);
        --bar-bg: rgba(255, 255, 255, 0.1);
        --mono: "JetBrains Mono", "SF Mono", SFMono-Regular, Consolas, monospace;
        --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --conforming: #3fb950;
        --partial: #d29922;
        --not_implemented: #f85149;
        --na: rgba(255, 255, 255, 0.35);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 2rem;
        padding-top: 88px;
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .sub {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 1.75rem;
        margin-top: 0.25rem;
      }
      a {
        color: #6db3ff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* Summary pills */
      .summary {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.75rem;
        flex-wrap: wrap;
      }
      .pill {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 14px;
        font-size: 0.8125rem;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .pill .n {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .pill.c {
        color: var(--conforming);
        border-color: rgba(63, 185, 80, 0.3);
      }
      .pill.p {
        color: var(--partial);
        border-color: rgba(210, 153, 34, 0.3);
      }
      .pill.ni {
        color: var(--not_implemented);
        border-color: rgba(248, 81, 73, 0.3);
      }
      .pill.x {
        color: var(--na);
      }
      .pill.total {
        background: rgba(31, 111, 235, 0.18);
        border-color: rgba(31, 111, 235, 0.4);
        color: #6db3ff;
      }

      /* Filter bar */
      .filter {
        margin-bottom: 1rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .filter button {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 5px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.8125rem;
        font-family: var(--font);
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
      }
      .filter button:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }
      .filter button.active {
        background: rgba(31, 111, 235, 0.18);
        border-color: #6db3ff;
        color: #6db3ff;
      }

      /* Table */
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        font-size: 0.8125rem;
      }
      th {
        text-align: left;
        padding: 0.5rem 0.875rem;
        border-bottom: 2px solid var(--border);
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.6875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      td {
        padding: 0.5rem 0.875rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--surface-hover);
      }
      tr.row-c td:first-child {
        border-left: 3px solid var(--conforming);
      }
      tr.row-p td:first-child {
        border-left: 3px solid var(--partial);
      }
      tr.row-n td:first-child {
        border-left: 3px solid var(--not_implemented);
      }
      tr.row-x td:first-child {
        border-left: 3px solid var(--na);
      }

      .id {
        font-family: var(--mono);
        font-size: 0.6875rem;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .status {
        white-space: nowrap;
        font-size: 0.75rem;
        font-weight: 500;
        font-family: var(--mono);
      }
      .status.c {
        color: var(--conforming);
      }
      .status.p {
        color: var(--partial);
      }
      .status.n {
        color: var(--not_implemented);
      }
      .status.x {
        color: var(--na);
      }

      /* Coverage bar */
      .bar-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }
      .bar {
        display: inline-block;
        width: 90px;
        height: 6px;
        background: var(--bar-bg);
        border-radius: 3px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .bar > span {
        display: block;
        height: 100%;
        border-radius: 3px;
      }
      .row-c .bar > span {
        background: var(--conforming);
      }
      .row-p .bar > span {
        background: var(--partial);
      }
      .row-n .bar > span {
        background: var(--not_implemented);
      }
      .bar-pct {
        font-family: var(--mono);
        font-size: 0.6875rem;
        color: var(--text-muted);
      }

      /* Issues column */
      .issues {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .issues a {
        background: rgba(109, 179, 255, 0.1);
        border: 1px solid rgba(109, 179, 255, 0.25);
        border-radius: 4px;
        padding: 1px 7px;
        font-size: 0.6875rem;
        font-family: var(--mono);
        color: #6db3ff;
        white-space: nowrap;
      }
      .issues a:hover {
        background: rgba(109, 179, 255, 0.2);
        text-decoration: none;
      }
      .muted {
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .footer {
        margin-top: 1.5rem;
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .footer a {
        color: var(--text-muted);
        text-decoration: underline dotted;
      }
      .footer a:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <site-nav base="../"></site-nav>

    <h1>ECMAScript 2026 Compliance</h1>
    <p class="sub" id="meta">Loading…</p>

    <div class="summary" id="summary"></div>

    <div class="filter">
      <button data-f="all" class="active">All</button>
      <button data-f="conforming">Conforming</button>
      <button data-f="partial">Partial</button>
      <button data-f="not_implemented">Not implemented</button>
      <button data-f="na">N/A</button>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 90px">Section</th>
          <th>Title</th>
          <th style="width: 130px">Status</th>
          <th style="width: 220px">Coverage</th>
          <th style="width: 190px">Issues</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <p class="footer">
      Source:
      <a href="https://github.com/loopdive/js2wasm/blob/main/spec-compliance/summary.json">
        spec-compliance/summary.json
      </a>
      ·
      <a href="https://github.com/loopdive/js2wasm/tree/main/spec-compliance">per-section detail</a>
    </p>

    <script src="../components/site-nav.js"></script>
    <script>
      const STATUS_LABEL = {
        conforming: "conforming",
        partial: "partial",
        not_implemented: "not implemented",
        na: "n/a",
      };
      const STATUS_CLASS = { conforming: "c", partial: "p", not_implemented: "n", na: "x" };
      const STATUS_ICON = { conforming: "✓", partial: "~", not_implemented: "✗", na: "—" };

      async function load() {
        let data;
        const attempts = ["../../spec-compliance/summary.json", "/spec-compliance/summary.json"];
        for (const url of attempts) {
          try {
            const r = await fetch(url);
            if (!r.ok) continue;
            data = await r.json();
            break;
          } catch {}
        }
        if (!data) {
          document.getElementById("rows").innerHTML =
            '<tr><td colspan="5" style="color:var(--text-muted);padding:2rem;text-align:center">Could not load summary.json — open this page from the dashboard server.</td></tr>';
          document.getElementById("meta").textContent = "";
          return;
        }
        render(data);
      }

      function pill(label, n, cls) {
        const d = document.createElement("div");
        d.className = "pill " + cls;
        const span = document.createElement("span");
        span.className = "n";
        span.textContent = n;
        d.appendChild(span);
        d.appendChild(document.createTextNode(label));
        return d;
      }

      function render(data) {
        const totalPct = data.totalTests ? ((data.totalPass / data.totalTests) * 100).toFixed(1) : "0";
        document.getElementById("meta").textContent =
          "Generated " +
          data.generated +
          " · Test262 coverage " +
          data.totalPass.toLocaleString() +
          " / " +
          data.totalTests.toLocaleString() +
          " (" +
          totalPct +
          "%)";

        const sumEl = document.getElementById("summary");
        sumEl.appendChild(pill(" conforming", data.conforming, "c"));
        sumEl.appendChild(pill(" partial", data.partial, "p"));
        sumEl.appendChild(pill(" not implemented", data.not_implemented, "ni"));
        sumEl.appendChild(pill(" n/a", data.not_applicable, "x"));
        const totalSections = data.conforming + data.partial + data.not_implemented + data.not_applicable;
        sumEl.appendChild(pill(" sections audited", totalSections, "total"));

        const rows = document.getElementById("rows");
        for (const s of data.sections) {
          const cls = STATUS_CLASS[s.status];
          const tr = document.createElement("tr");
          tr.className = "row-" + cls;
          tr.dataset.status = s.status;

          // Section id
          const idTd = document.createElement("td");
          idTd.className = "id";
          idTd.textContent = s.id;
          tr.appendChild(idTd);

          // Title
          const titleTd = document.createElement("td");
          const a = document.createElement("a");
          a.href = "https://github.com/loopdive/js2wasm/blob/main/" + s.file;
          a.textContent = s.title;
          titleTd.appendChild(a);
          tr.appendChild(titleTd);

          // Status
          const statusTd = document.createElement("td");
          statusTd.className = "status " + cls;
          statusTd.textContent = STATUS_ICON[s.status] + " " + STATUS_LABEL[s.status];
          tr.appendChild(statusTd);

          // Coverage bar
          const covTd = document.createElement("td");
          if (s.total > 0) {
            const pct = (s.pass / s.total) * 100;
            const wrap = document.createElement("div");
            wrap.className = "bar-wrap";
            const bar = document.createElement("span");
            bar.className = "bar";
            const fill = document.createElement("span");
            fill.style.width = pct.toFixed(1) + "%";
            bar.appendChild(fill);
            wrap.appendChild(bar);
            const label = document.createElement("span");
            label.className = "bar-pct";
            label.textContent = s.pass + " / " + s.total + " (" + pct.toFixed(1) + "%)";
            wrap.appendChild(label);
            covTd.appendChild(wrap);
          } else {
            covTd.innerHTML = '<span class="muted">—</span>';
          }
          tr.appendChild(covTd);

          // Issues
          const issuesTd = document.createElement("td");
          if (s.issues && s.issues.length) {
            const wrap = document.createElement("div");
            wrap.className = "issues";
            for (const id of s.issues) {
              const il = document.createElement("a");
              il.href = "https://github.com/loopdive/js2wasm/issues/" + id;
              il.textContent = "#" + id;
              wrap.appendChild(il);
            }
            issuesTd.appendChild(wrap);
          } else {
            issuesTd.innerHTML = '<span class="muted">—</span>';
          }
          tr.appendChild(issuesTd);

          rows.appendChild(tr);
        }

        // Filter buttons
        document.querySelectorAll(".filter button").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".filter button").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            const f = btn.dataset.f;
            for (const tr of document.querySelectorAll("#rows tr")) {
              tr.style.display = f === "all" || tr.dataset.status === f ? "" : "none";
            }
          });
        });
      }

      load();
    </script>
  </body>
</html>
