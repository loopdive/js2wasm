<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>js2wasm — ECMAScript conformance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060a14;
        --bg-soft: #0c1220;
        --surface: rgba(255, 255, 255, 0.05);
        --surface-hover: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.46);
        --pass: #3fb950;
        --fail: #f85149;
        --skip: rgba(255, 255, 255, 0.4);
        --error: #d29922;
        --accent: rgba(255, 255, 255, 0.75);
        --bar-bg: rgba(255, 255, 255, 0.1);
        --mono: "JetBrains Mono", "SF Mono", SFMono-Regular, Consolas, monospace;
        --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 2rem;
        padding-top: 88px;
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        font-size: 2.625rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .brand {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
      }
      h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 2rem 0 1rem;
        color: var(--text);
      }
      h3 {
        font-size: 1rem;
        font-weight: 600;
        margin: 1.5rem 0 0.5rem;
        color: var(--text-muted);
      }
      .timestamp {
        color: var(--text-muted);
        font-size: 0.875rem;
        font-variant-numeric: tabular-nums;
      }
      .summary {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 2rem;
        position: relative;
      }
      .summary-meta {
        position: absolute;
        right: 0;
        bottom: -1.5rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1rem 1.25rem;
      }
      .card .label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .card .value {
        font-size: 1.75rem;
        font-weight: 700;
        margin-top: 0.25rem;
      }
      .card .pct {
        font-size: 0.875rem;
        color: var(--text-muted);
      }
      /* Donut chart handled by <t262-donut> web component */
      .edition-timeline-section {
        margin: -0.35rem 0 2rem;
      }
      .edition-bar-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 1rem;
        margin: 0 0 1.5rem;
      }
      .edition-bar-grid h3 {
        margin-top: 0;
        margin-bottom: 1rem;
      }
      .edition-track {
        position: relative;
        height: 92px;
      }
      .edition-timeline {
        position: absolute;
        left: 0;
        right: 0;
        top: 31px;
        display: flex;
        height: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .edition-segment {
        position: relative;
        min-width: 10px;
        background: rgba(248, 81, 73, 0.12);
      }
      .edition-segment + .edition-segment::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 1px;
        background: rgba(255, 255, 255, 0.06);
      }
      .edition-segment::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--segment-fill);
        background: var(--pass);
      }
      .edition-scale {
        position: absolute;
        inset: 0 1px;
      }
      .edition-scale-label {
        position: relative;
        font-size: 0.68rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .edition-scale-marker {
        position: absolute;
        transform: translateX(-50%);
        pointer-events: none;
      }
      .edition-scale-line {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        height: 10px;
        background: rgba(255, 255, 255, 0.18);
      }
      .edition-scale-marker.above {
        top: 0;
      }
      .edition-scale-marker.above .edition-scale-line {
        top: 21px;
      }
      .edition-scale-marker.below {
        top: 0;
      }
      .edition-scale-marker.below .edition-scale-line {
        top: 45px;
      }
      .edition-scale-marker.above .edition-scale-label {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
      }
      .edition-scale-marker.below .edition-scale-label {
        position: absolute;
        top: 58px;
        left: 50%;
        transform: translateX(-50%);
      }
      .edition-scale-label::before {
        content: "";
        display: none;
      }
      .edition-legend-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.7rem 1rem;
        margin-top: 0.8rem;
      }
      .edition-legend-item {
        display: grid;
        gap: 0.12rem;
        min-width: 0;
      }
      .edition-legend-name {
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .edition-legend-rate {
        color: var(--pass);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        text-align: left;
      }
      .edition-legend-ratio {
        color: var(--text);
        font-size: 0.8rem;
        font-variant-numeric: tabular-nums;
      }
      .cat-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
        font-variant-numeric: tabular-nums;
      }
      .cat-table th {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 2px solid var(--border);
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.6875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .cat-table th.num {
        text-align: right;
      }
      .cat-table td {
        padding: 0.375rem 0.75rem;
        border-bottom: 1px solid var(--border);
      }
      .cat-table td.num {
        text-align: right;
        font-family: var(--mono);
        font-size: 0.75rem;
      }
      .cat-table tr:hover {
        background: var(--surface-hover);
      }
      .cat-table .group-header td {
        padding-top: 1rem;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent);
        border-bottom: 1px solid var(--accent);
      }
      .bar-container {
        width: 100%;
        height: 8px;
        background: var(--bar-bg);
        border-radius: 4px;
        overflow: hidden;
        display: flex;
      }
      .overall-bar {
        height: 24px;
        border-radius: 6px;
        margin-bottom: 2rem;
      }
      .legend {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 1rem;
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .bench-section {
        width: calc(100vw - 4rem);
        margin-left: calc(50% - 50vw + 2rem);
        margin-right: calc(50% - 50vw + 2rem);
      }
      .bench-snippet-grid {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 1rem;
        margin-top: 1rem;
      }
      .bench-snippet-card {
        display: inline-block;
        flex: 1 1 560px;
        min-width: 320px;
        max-width: 100%;
        overflow: visible;
      }
      .bench-snippet-head {
        padding: 0 0 0.75rem;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .bench-example-chart {
        margin: 0 0 1rem;
        min-width: 0;
        max-width: calc(40ch + 76px);
      }
      .bench-snippet-card pre {
        margin: 0;
        overflow-x: auto;
      }
      .report-code-block {
        display: inline-block;
        min-width: 0;
        width: max-content;
        max-width: calc(40ch + 76px);
        overflow-x: auto;
        padding: 34px 38px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0c1220;
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.72);
        margin: 0;
      }
      .bench-name {
        font-weight: 600;
        font-size: 0.875rem;
        margin-bottom: 0.75rem;
      }
      .timestamp {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 2rem;
        text-align: center;
      }
      .clickable {
        cursor: pointer;
        text-decoration: underline;
        text-decoration-style: dotted;
        text-underline-offset: 2px;
      }
      .clickable:hover {
        text-decoration-style: solid;
      }
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .search-box {
        flex: 1;
        min-width: 200px;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.8125rem;
        outline: none;
      }
      .search-box::placeholder {
        color: var(--text-muted);
      }
      .search-box:focus {
        border-color: var(--accent);
      }
      .filter-toggles {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        width: 100%;
        justify-content: flex-end;
      }
      .filter-toggle {
        display: flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.375rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 0.75rem;
        cursor: pointer;
        user-select: none;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .filter-toggle:hover {
        border-color: var(--text-muted);
      }
      .filter-toggle.active {
        border-color: var(--accent);
        background: var(--surface-hover);
        color: var(--text);
      }
      .filter-toggle .dot {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .card.filter-card {
        cursor: pointer;
        user-select: none;
        transition: border-color 0.15s;
      }
      .card.filter-card:hover {
        border-color: var(--text-muted);
      }
      .card.filter-card.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .detail-row td {
        padding: 0 !important;
        border-bottom: 1px solid var(--border);
      }
      .detail-content {
        max-height: 300px;
        overflow-y: auto;
        padding: 0.5rem 0.75rem;
        background: rgba(0, 0, 0, 0.2);
        font-size: 0.6875rem;
        font-family: var(--mono);
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
      }
      .detail-content::-webkit-scrollbar {
        width: 6px;
      }
      .detail-content::-webkit-scrollbar-track {
        background: transparent;
      }
      .detail-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
      }
      .detail-file {
        padding: 4px 0;
        border-bottom: 1px solid var(--border);
      }
      .detail-file:last-child {
        border-bottom: none;
      }
      .detail-file-header {
        display: flex;
        align-items: baseline;
        gap: 0.375rem;
      }
      .detail-fname {
        color: var(--accent);
        word-break: break-all;
      }
      .detail-err {
        color: var(--error);
        word-break: break-word;
        white-space: pre-wrap;
        padding-left: 1.25rem;
        font-size: 0.625rem;
        margin-top: 2px;
      }
      .detail-status-pass {
        color: var(--pass);
      }
      .detail-status-fail {
        color: var(--fail);
      }
      .detail-status-err {
        color: var(--error);
      }
      .no-data {
        color: var(--text-muted);
        font-style: italic;
        padding: 2rem;
        text-align: center;
      }
      .trend-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 1rem;
      }
      .trend-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1rem;
      }
      .trend-card .bench-name {
        margin-bottom: 0.5rem;
      }
      .trend-card svg {
        display: block;
        width: 100%;
      }
      .trend-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.6875rem;
        color: var(--text-muted);
        margin-top: 0.375rem;
        font-family: var(--mono);
      }
      .trend-delta {
        font-weight: 600;
      }
      .trend-delta.improved {
        color: var(--pass);
      }
      .trend-delta.regressed {
        color: var(--fail);
      }
      .trend-delta.neutral {
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <site-nav base="../"></site-nav>
    <h1 class="brand">ECMAScript conformance</h1>
    <div id="app"><div class="no-data">Loading report data…</div></div>

    <script>
      const REPORT_JSON = "results/test262-report.json";
      const RESULTS_JSONL = "results/test262-results.jsonl";
      const BENCH_SUITE_FILES = [
        "benchmarks/suites/strings.ts",
        "benchmarks/suites/arrays.ts",
        "benchmarks/suites/dom.ts",
        "benchmarks/suites/mixed.ts",
      ];
      const BASE_PATH = window.location.pathname.replace(/\/benchmarks\/.*$/, "");

      function assetPath(path) {
        if (!BASE_PATH) return `/${path}`;
        return `${BASE_PATH}/${path}`;
      }

      // If the report.json is empty/corrupt, rebuild it from the JSONL on the fly
      async function loadReportWithFallback() {
        const report = await loadJSON(REPORT_JSON);
        if (report && report.summary && report.summary.total > 0) return report;
        // Fallback: build report from JSONL
        console.warn("Report JSON empty/corrupt, rebuilding from JSONL...");
        try {
          const resp = await fetch(RESULTS_JSONL);
          if (!resp.ok) return null;
          const text = await resp.text();
          const counts = { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0 };
          const officialCounts = { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0 };
          const scopeSummaries = {
            standard: { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0, total: 0 },
            annex_b: { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0, total: 0 },
            proposal: { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0, total: 0 },
          };
          const cats = {};
          const skipReasons = {};
          const buildSummary = (counter) => ({
            total: counter.pass + counter.fail + counter.compile_error + counter.skip,
            pass: counter.pass,
            fail: counter.fail,
            compile_error: counter.compile_error,
            compile_timeout: counter.compile_timeout || 0,
            skip: counter.skip,
            compilable: counter.pass + counter.fail,
            stale: 0,
          });
          for (const line of text.split("\n")) {
            if (!line.trim()) continue;
            try {
              const r = JSON.parse(line);
              const s = r.status;
              if (s in counts) {
                counts[s]++;
                const scope = r.scope || "standard";
                if (!scopeSummaries[scope]) {
                  scopeSummaries[scope] = { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0, total: 0 };
                }
                scopeSummaries[scope][s]++;
                scopeSummaries[scope].total++;
                if (r.scope_official !== false && scope !== "proposal") {
                  officialCounts[s]++;
                } else if (r.scope_official === true) {
                  officialCounts[s]++;
                }
                const cat = r.category || "unknown";
                if (!cats[cat])
                  cats[cat] = {
                    name: cat,
                    pass: 0,
                    fail: 0,
                    compile_error: 0,
                    compile_timeout: 0,
                    skip: 0,
                    total: 0,
                  };
                cats[cat][s]++;
                cats[cat].total++;
                if (s === "skip" && r.error) {
                  skipReasons[r.error] = (skipReasons[r.error] || 0) + 1;
                }
              }
            } catch {}
          }
          const total = Object.values(counts).reduce((a, b) => a + b, 0);
          if (total === 0) return null;
          return {
            timestamp: new Date().toISOString(),
            summary: buildSummary(officialCounts),
            official_summary: buildSummary(officialCounts),
            full_summary: buildSummary(counts),
            scope_summaries: Object.fromEntries(
              Object.entries(scopeSummaries).map(([name, counter]) => [name, buildSummary(counter)]),
            ),
            categories: Object.values(cats).sort((a, b) => a.name.localeCompare(b.name)),
            skip_reasons: skipReasons,
          };
        } catch {
          return null;
        }
      }

      // Per-file results indexed by category
      let filesByCategory = null;
      async function loadFileResults() {
        if (filesByCategory) return filesByCategory;
        try {
          const resp = await fetch(RESULTS_JSONL);
          if (!resp.ok) return null;
          const text = await resp.text();
          filesByCategory = new Map();
          for (const line of text.split("\n")) {
            if (!line.trim()) continue;
            const entry = JSON.parse(line);
            const cat = entry.category;
            if (!filesByCategory.has(cat)) filesByCategory.set(cat, []);
            filesByCategory.get(cat).push(entry);
          }
          return filesByCategory;
        } catch {
          return null;
        }
      }

      function makeCounts() {
        return { pass: 0, fail: 0, compile_error: 0, compile_timeout: 0, skip: 0, total: 0 };
      }

      function classifyEdition(file, scope) {
        if (!file || scope === "proposal") return null;
        if (scope === "annex_b" || file.includes("/annexB/")) return "LEGACY";

        const rules = [
          [
            "ES2024",
            [
              "Object/groupBy",
              "Map/groupBy",
              "Promise/withResolvers",
              "ArrayBuffer/prototype/transfer",
              "ArrayBuffer/prototype/resizable",
              "ArrayBuffer/prototype/resize",
              "resizable-buffer",
              "growable-sharedarraybuffer",
            ],
          ],
          [
            "ES2023",
            ["/toSorted/", "/toReversed/", "/toSpliced/", "/findLast/", "/findLastIndex/", "/with/", "/hashbang/"],
          ],
          [
            "ES2022",
            [
              "/at/",
              "/Object/hasOwn/",
              "/static-init",
              "/static-block",
              "/private-",
              "/class-fields/",
              "/Error/cause/",
              "/match-indices/",
            ],
          ],
          [
            "ES2021",
            [
              "WeakRef",
              "FinalizationRegistry",
              "/Promise/any/",
              "/replaceAll/",
              "logical-assignment",
              "numeric-separator-literal",
            ],
          ],
          [
            "ES2020",
            [
              "optional-chaining",
              "/coalesce/",
              "dynamic-import",
              "import.meta",
              "BigInt",
              "globalThis",
              "/matchAll/",
              "/allSettled/",
            ],
          ],
          [
            "ES2019",
            [
              "optional-catch-binding",
              "/flat/",
              "/flatMap/",
              "/fromEntries/",
              "/trimStart/",
              "/trimEnd/",
              "Symbol/prototype/description",
              "json-superset",
            ],
          ],
          [
            "ES2018",
            [
              "async-generator",
              "for-await-of",
              "async-iteration",
              "regexp-dotall",
              "lookbehind",
              "named-groups",
              "/Promise/prototype/finally/",
              "object-rest",
              "object-spread",
            ],
          ],
          [
            "ES2017",
            [
              "async-function",
              "SharedArrayBuffer",
              "/Atomics/",
              "/Object/values/",
              "/Object/entries/",
              "/padStart/",
              "/padEnd/",
            ],
          ],
          ["ES2016", ["/includes/", "exponentiation"]],
          [
            "ES2015",
            [
              "block-scope",
              "computed-property-names",
              "rest-parameters",
              "/module-code/",
              "/import/",
              "/export/",
              "/class/",
              "template-literal",
              "for-of",
              "destructuring",
              "Map/",
              "Set/",
              "WeakMap/",
              "WeakSet/",
              "Promise/",
              "Proxy/",
              "Reflect/",
              "Symbol/",
              "TypedArray",
              "ArrayBuffer",
              "DataView",
              "Generator",
              "arrow-function",
              "new.target",
              "/super/",
            ],
          ],
          [
            "ES5",
            [
              "/strict-mode/",
              "/JSON/",
              "/Object/keys/",
              "/Object/create/",
              "/Object/defineProperty/",
              "/Object/getOwnPropertyDescriptor/",
              "/Object/preventExtensions/",
              "/Object/seal/",
              "/Object/freeze/",
              "/Array/isArray/",
              "/String/prototype/trim/",
              "/Date/prototype/toISOString/",
              "/Function/prototype/bind/",
              "getter",
              "reserved-words",
              "property-definitions",
            ],
          ],
        ];

        for (const [edition, patterns] of rules) {
          if (patterns.some((pattern) => file.includes(pattern))) return edition;
        }

        return "ES3";
      }

      async function loadEditionSummaries() {
        try {
          const resp = await fetch(RESULTS_JSONL);
          if (!resp.ok) return null;
          const text = await resp.text();
          const byEdition = new Map();
          for (const line of text.split("\n")) {
            if (!line.trim()) continue;
            const entry = JSON.parse(line);
            if (entry.scope_official === false || entry.scope === "proposal") continue;
            const edition = classifyEdition(entry.file, entry.scope);
            if (!edition) continue;
            if (!byEdition.has(edition)) byEdition.set(edition, makeCounts());
            const counts = byEdition.get(edition);
            counts.total++;
            counts[entry.status] = (counts[entry.status] || 0) + 1;
          }
          const order = [
            "LEGACY",
            "ES3",
            "ES5",
            "ES2015",
            "ES2016",
            "ES2017",
            "ES2018",
            "ES2019",
            "ES2020",
            "ES2021",
            "ES2022",
            "ES2023",
            "ES2024",
          ];
          return order
            .filter((edition) => byEdition.has(edition))
            .map((edition) => ({
              edition,
              ...byEdition.get(edition),
              rate: pct(byEdition.get(edition).pass, byEdition.get(edition).total),
            }));
        } catch {
          return null;
        }
      }

      async function loadJSON(url) {
        try {
          const r = await fetch(url);
          return r.ok ? r.json() : null;
        } catch {
          return null;
        }
      }

      let prettierBundlePromise = null;
      async function formatBenchmarkSnippet(source) {
        try {
          prettierBundlePromise ||= Promise.all([
            import("https://esm.sh/prettier@3.8.1/standalone"),
            import("https://esm.sh/prettier@3.8.1/plugins/typescript"),
            import("https://esm.sh/prettier@3.8.1/plugins/estree"),
          ]);
          const [{ format }, tsPlugin, estreePlugin] = await prettierBundlePromise;
          return await format(source, {
            parser: "typescript",
            plugins: [tsPlugin.default ?? tsPlugin, estreePlugin.default ?? estreePlugin],
            printWidth: 40,
            semi: true,
          });
        } catch {
          return source;
        }
      }

      async function loadBenchmarkSnippets() {
        const snippets = new Map();
        await Promise.all(
          BENCH_SUITE_FILES.map(async (path) => {
            try {
              const resp = await fetch(assetPath(path));
              if (!resp.ok) return;
              const source = await resp.text();
              const pattern = /name:\s*"([^"]+)"[\s\S]*?source:\s*`([\s\S]*?)`,/g;
              for (const match of source.matchAll(pattern)) {
                const name = match[1];
                const rawSnippet = match[2].replace(/^\n+|\n+$/g, "");
                const snippet = await formatBenchmarkSnippet(rawSnippet);
                if (name && snippet) snippets.set(name, snippet);
              }
            } catch {
              // Keep the benchmark cards visible even if snippet files are unavailable.
            }
          }),
        );
        return snippets;
      }

      function shortName(cat) {
        return cat
          .replace("built-ins/Math/", "Math.")
          .replace("built-ins/Array/prototype/", "Array.")
          .replace("built-ins/Number/", "Number.")
          .replace("built-ins/Object/", "Object.")
          .replace("built-ins/JSON/", "JSON.")
          .replace("built-ins/", "")
          .replace("language/expressions/", "expr/")
          .replace("language/statements/", "stmt/")
          .replace("language/types/", "types/");
      }

      function groupName(cat) {
        // Language categories
        if (cat.startsWith("language/expressions")) return "Expressions";
        if (cat.startsWith("language/statements")) return "Statements";
        if (cat.startsWith("language/types")) return "Types";
        if (cat.startsWith("language/literals")) return "Literals";
        if (cat.startsWith("language/arguments-object")) return "Arguments";
        if (cat.startsWith("language/destructuring")) return "Destructuring";
        if (cat.startsWith("language/block-scope")) return "Block Scope";
        if (cat.startsWith("language/rest-parameters")) return "Rest Params";
        if (cat.startsWith("language/computed-property")) return "Computed Props";
        if (cat.startsWith("language/module-code")) return "Modules";
        if (cat.startsWith("language/eval-code")) return "Eval";
        if (cat.startsWith("language/function-code")) return "Functions";
        if (cat.startsWith("language/global-code")) return "Global Code";
        if (cat.startsWith("language/identifier")) return "Identifiers";
        if (cat.startsWith("language/")) return "Language (other)";
        // Built-in categories — use the top-level name
        if (cat.startsWith("built-ins/")) {
          const name = cat.replace("built-ins/", "").split("/")[0];
          return name;
        }
        if (cat.startsWith("annexB/")) return "Annex B";
        return cat;
      }

      function isProposalSkipReason(reason) {
        if (!reason) return false;
        const normalized = String(reason).toLowerCase();
        return (
          normalized.includes("proposal") ||
          normalized.includes("temporal") ||
          normalized.includes("import defer") ||
          normalized.includes("source phase imports") ||
          normalized.includes("set methods") ||
          normalized.includes("map/weakmap upsert") ||
          normalized.includes("staging")
        );
      }

      function escapeHtml(str) {
        if (typeof str !== "string") return str;
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // Source file cache and line fetcher
      const _srcCache = new Map();
      const _srcQueue = [];
      let _srcFetching = 0;
      const MAX_CONCURRENT_FETCHES = 6;

      // Returns a placeholder div that will be filled with source context when ready
      function fetchSourceLines(filePath, errText) {
        const placeholder = el("div", { className: "src-placeholder" });
        // Extract line number from various error formats
        const lineMatch =
          errText.match(/L(\d+):(\d+)\s/) || // L27:22 (compiler errors)
          errText.match(/at L(\d+):/) || // [in fn() at L10: code] or [at L10: code]
          errText.match(/at L(\d+)[^:]/) || // [at wrapped L430]
          errText.match(/assert #\d+ at L(\d+):/); // assert #1 at L10: code
        // Extract assert text for source search (fallback when no line number)
        const assertMatch =
          !lineMatch &&
          (errText.match(/assert #\d+ at L\d+:\s*(.+)/) ||
            errText.match(/assert #\d+:\s*(.+)/) ||
            errText.match(/first assert:\s*(.+)/));
        const searchText = assertMatch ? assertMatch[1].trim().substring(0, 60) : null;
        // Line numbers from errors refer to the WRAPPED source (preamble + test body).
        // The preamble is ~25-35 lines, so subtract an estimate to get the original line.
        const rawLineNo = lineMatch ? parseInt(lineMatch[1], 10) : 0;
        const normalized = filePath.startsWith("test/") ? filePath : "test/" + filePath;

        if (!rawLineNo && !searchText) return placeholder;

        const cached = _srcCache.get(normalized);
        if (cached !== undefined) {
          if (cached) {
            const ln = findBestLine(cached, rawLineNo, errText, searchText);
            if (ln) renderSrcContext(cached, ln, placeholder);
          }
          return placeholder;
        }

        const base = window.location.pathname.replace(/\/benchmarks\/.*$/, "");
        const url = base + "/test262/" + normalized;
        _srcQueue.push({
          normalized,
          url,
          rawLineNo,
          errText,
          searchText,
          placeholder,
        });
        _drainSrcQueue();
        return placeholder;
      }

      function findBestLine(src, rawLineNo, errText, searchText) {
        const lines = src.split("\n");
        // Strategy 1: search for assert text from error message
        if (searchText) {
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes(searchText)) return i + 1;
          }
        }
        // Line numbers are now adjusted at the runner level (bodyLineOffset subtracted).
        // Use them directly.
        if (rawLineNo > 0 && rawLineNo <= lines.length) return rawLineNo;
        return 0;
      }

      function _drainSrcQueue() {
        while (_srcFetching < MAX_CONCURRENT_FETCHES && _srcQueue.length > 0) {
          const job = _srcQueue.shift();
          const cached = _srcCache.get(job.normalized);
          if (cached !== undefined) {
            if (cached) {
              const ln = findBestLine(cached, job.rawLineNo, job.errText, job.searchText);
              if (ln) renderSrcContext(cached, ln, job.placeholder);
            }
            continue;
          }
          _srcFetching++;
          fetch(job.url)
            .then((r) => {
              if (!r.ok) throw new Error(r.status);
              return r.text();
            })
            .then((t) => {
              _srcCache.set(job.normalized, t);
              const ln = findBestLine(t, job.rawLineNo, job.errText, job.searchText);
              if (ln) renderSrcContext(t, ln, job.placeholder);
            })
            .catch(() => {
              _srcCache.set(job.normalized, null);
            })
            .finally(() => {
              _srcFetching--;
              _drainSrcQueue();
            });
        }
      }
      function renderSrcContext(src, lineNo, container) {
        if (!src || lineNo < 1) return;
        const lines = src.split("\n");
        if (lineNo > lines.length) return;
        const start = Math.max(0, lineNo - 2);
        const end = Math.min(lines.length, lineNo + 3);
        container.style.cssText =
          "font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 0.625rem; padding: 4px 8px 4px 1.25rem; margin-top: 2px; background: rgba(0,0,0,0.2); border-radius: 3px; white-space: pre; overflow-x: auto; max-width: 100%; line-height: 1.4;";
        container.textContent = "";
        for (let i = start; i < end; i++) {
          const isTarget = i === lineNo - 1;
          const row = el("div", {
            style: { background: isTarget ? "rgba(248,81,73,0.08)" : "none" },
          });
          row.appendChild(
            el(
              "span",
              {
                style: {
                  color: isTarget ? "var(--error)" : "var(--text-muted)",
                  marginRight: "0.75rem",
                  userSelect: "none",
                  display: "inline-block",
                  width: "3ch",
                  textAlign: "right",
                },
              },
              String(i + 1),
            ),
          );
          row.appendChild(
            el(
              "span",
              {
                style: {
                  color: isTarget ? "var(--text)" : "var(--text-muted)",
                },
              },
              lines[i],
            ),
          );
          container.appendChild(row);
        }
      }

      function pct(n, d) {
        return d > 0 ? Math.round((n / d) * 1000) / 10 : 0;
      }
      function fmt(ms) {
        if (ms < 0.001) return "<0.001ms";
        if (ms < 1) return ms.toFixed(3) + "ms";
        if (ms < 100) return ms.toFixed(1) + "ms";
        return Math.round(ms) + "ms";
      }

      function el(tag, attrs, ...children) {
        const e = document.createElement(tag);
        if (attrs)
          for (const [k, v] of Object.entries(attrs)) {
            if (k === "style" && typeof v === "object") Object.assign(e.style, v);
            else if (k === "className") e.className = v;
            else e.setAttribute(k, v);
          }
        for (const c of children) {
          if (typeof c === "string") e.appendChild(document.createTextNode(c));
          else if (c) e.appendChild(c);
        }
        return e;
      }

      function makeBar(passW, failW, errW, extraClass) {
        const container = el("div", {
          className: "bar-container" + (extraClass ? " " + extraClass : ""),
        });
        container.appendChild(
          el("div", {
            style: { width: passW + "%", background: "var(--pass)" },
          }),
        );
        container.appendChild(
          el("div", {
            style: { width: failW + "%", background: "var(--fail)" },
          }),
        );
        container.appendChild(
          el("div", {
            style: { width: errW + "%", background: "var(--error)" },
          }),
        );
        return container;
      }

      function makeLegend(items) {
        const legend = el("div", { className: "legend" });
        for (const [label, color] of items) {
          const dot = el("div", {
            className: "legend-dot",
            style: { background: color },
          });
          const item = el("div", { className: "legend-item" }, dot, " " + label);
          legend.appendChild(item);
        }
        return legend;
      }

      function makeCard(label, value, colorVar, subtext) {
        const card = el("div", { className: "card" });
        card.appendChild(el("div", { className: "label" }, label));
        const valEl = el("div", { className: "value", style: { color: colorVar || "inherit" } }, String(value));
        card.appendChild(valEl);
        if (subtext) card.appendChild(el("div", { className: "pct" }, subtext));
        return card;
      }

      // Gauge card replaced by <t262-donut> web component

      function makeScopeSummary(...parts) {
        const summary = {
          pass: 0,
          fail: 0,
          compile_error: 0,
          compile_timeout: 0,
          skip: 0,
          total: 0,
          compilable: 0,
          stale: 0,
        };
        for (const part of parts) {
          if (!part) continue;
          summary.pass += part.pass || 0;
          summary.fail += part.fail || 0;
          summary.compile_error += part.compile_error || 0;
          summary.compile_timeout += part.compile_timeout || 0;
          summary.skip += part.skip || 0;
          summary.total += part.total || 0;
          summary.compilable += part.compilable || 0;
          summary.stale += part.stale || 0;
        }
        return summary;
      }

      function scopeLabel(includeLegacy, includeProposals) {
        const parts = ["Standard"];
        if (includeLegacy) parts.push("Annex B");
        if (includeProposals) parts.push("Proposals");
        return parts.join(" + ");
      }

      function toggleDetail(row, catName, statusFilter) {
        const existing = row.nextElementSibling;
        if (existing && existing.classList.contains("detail-row")) {
          existing.remove();
          return;
        }
        // Remove any other open detail rows in this table
        row
          .closest("tbody")
          .querySelectorAll(".detail-row")
          .forEach((r) => r.remove());

        const detailRow = el("tr", { className: "detail-row" });
        const detailCell = el("td", { colspan: "7" });
        const content = el("div", { className: "detail-content" }, "Loading…");
        detailCell.appendChild(content);
        detailRow.appendChild(detailCell);
        row.after(detailRow);

        loadFileResults().then((map) => {
          if (!map) {
            content.textContent = "No file-level data available.";
            return;
          }
          const files = map.get(catName) || [];
          const filtered = statusFilter ? files.filter((f) => f.status === statusFilter) : files;
          if (filtered.length === 0) {
            content.textContent = "No matching files.";
            return;
          }
          content.textContent = "";
          // Sort: compile_error first, then fail, then pass
          const order = { compile_error: 0, fail: 1, pass: 2, skip: 3 };
          filtered.sort((a, b) => (order[a.status] ?? 4) - (order[b.status] ?? 4));
          for (const f of filtered) {
            const fname = f.file.replace("test/", "");
            const safeFname = escapeHtml(fname);
            const safeError = f.error ? escapeHtml(f.error) : "";
            const fileEl = el("div", { className: "detail-file" });
            const statusCls =
              f.status === "pass"
                ? "detail-status-pass"
                : f.status === "fail"
                  ? "detail-status-fail"
                  : "detail-status-err";
            const hdr = el("div", { className: "detail-file-header" });
            hdr.appendChild(
              el(
                "span",
                { className: statusCls, style: { flexShrink: "0" } },
                f.status === "pass" ? "\u2713" : f.status === "fail" ? "\u2717" : "\u26A0",
              ),
            );
            hdr.appendChild(el("span", { className: "detail-fname" }, safeFname));
            fileEl.appendChild(hdr);
            if (f.error) {
              const errDiv = el("div", { className: "detail-err" }, f.error);
              fileEl.appendChild(errDiv);
              fileEl.appendChild(fetchSourceLines(f.file, f.error));
            }
            content.appendChild(fileEl);
          }
        });
      }

      function renderConformance(data, container) {
        const scopeSummaries = data.scope_summaries || {};
        const standardSummary = scopeSummaries.standard || data.summary;
        const legacySummary = scopeSummaries.annex_b || null;
        const proposalSummary = scopeSummaries.proposal || null;
        const scoreState = {
          includeLegacy: true,
          includeProposals: false,
        };

        let summaryStamp = null;
        if (data.timestamp) {
          const dt = new Date(data.timestamp);
          const stamp = `${dt.toLocaleDateString("de-DE", { day: "numeric", month: "numeric", year: "2-digit" })}, ${dt.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })}`;
          summaryStamp = el("div", { className: "summary-meta" }, el("div", { className: "timestamp" }, stamp));
        }

        const summary = el("div", { className: "summary" });
        const donutEl = document.createElement("t262-donut");
        donutEl.id = "donut-chart";
        donutEl.style.setProperty("--t262-bg", "#060a14");
        const controlsHost = el("div", { className: "filter-toggles", style: { marginTop: "1rem" } });
        const legacyToggle = el("label", { className: "filter-toggle" });
        const legacyCheckbox = el("input", { type: "checkbox", checked: "checked" });
        legacyToggle.appendChild(legacyCheckbox);
        legacyToggle.appendChild(el("span", null, "legacy (Annex B)"));
        controlsHost.appendChild(legacyToggle);

        // Strict mode toggle — checked by default, persisted in localStorage
        const strictToggle = el("label", { className: "filter-toggle" });
        const strictDefault = localStorage.getItem("t262-strict-only") !== "false";
        const strictCheckbox = el("input", { type: "checkbox" });
        if (strictDefault) strictCheckbox.setAttribute("checked", "checked");
        strictCheckbox.checked = strictDefault;
        strictToggle.appendChild(strictCheckbox);
        strictToggle.appendChild(el("span", null, "strict mode"));
        controlsHost.appendChild(strictToggle);

        function syncToggleStyles() {
          legacyToggle.classList.toggle("active", legacyCheckbox.checked);
          strictToggle.classList.toggle("active", strictCheckbox.checked);
          // Hide legacy toggle in strict mode (strict_summary already includes Annex B strict tests)
          legacyToggle.style.display = strictCheckbox.checked ? "none" : "";
        }

        function renderSummaryCard() {
          let s;
          if (strictCheckbox.checked && data.strict_summary) {
            s = data.strict_summary;
          } else {
            s = makeScopeSummary(standardSummary, scoreState.includeLegacy ? legacySummary : null);
          }
          const ce = (s.compile_error || 0) + (s.compile_timeout || 0);
          donutEl.setAttribute("pass", s.pass || 0);
          donutEl.setAttribute("fail", s.fail || 0);
          donutEl.setAttribute("ce", ce);
          donutEl.setAttribute("skip", s.skip || 0);
          donutEl.setAttribute("total", s.total || 0);
        }

        legacyCheckbox.addEventListener("change", () => {
          scoreState.includeLegacy = legacyCheckbox.checked;
          syncToggleStyles();
          renderSummaryCard();
        });
        strictCheckbox.addEventListener("change", () => {
          localStorage.setItem("t262-strict-only", String(strictCheckbox.checked));
          syncToggleStyles();
          renderSummaryCard();
        });

        syncToggleStyles();
        renderSummaryCard();
        summary.appendChild(donutEl);
        summary.appendChild(controlsHost);
        if (summaryStamp) summary.appendChild(summaryStamp);

        // Stale results indicator
        if (data.summary.stale > 0) {
          const staleCard = makeCard(
            "Stale",
            data.summary.stale.toLocaleString(),
            "var(--text-muted)",
            "from previous runs",
          );
          staleCard.style.borderColor = "var(--error)";
          staleCard.style.borderStyle = "dashed";
          summary.appendChild(staleCard);
        }

        const editionBarsSection = el("div", {
          className: "edition-bar-grid",
        });
        const editionTestsCard = el("div", null, el("h3", null, "Edition Coverage (tests)"));
        const editionTestsBars = document.createElement("t262-edition-bars");
        editionTestsBars.setAttribute("src", "results/test262-editions.json");
        editionTestsBars.setAttribute("mode", "absolute");
        editionTestsCard.appendChild(editionTestsBars);
        editionBarsSection.appendChild(editionTestsCard);

        const editionRateCard = el("div", null, el("h3", null, "Edition Coverage (pass rate)"));
        const editionRateBars = document.createElement("t262-edition-bars");
        editionRateBars.setAttribute("src", "results/test262-editions.json");
        editionRateBars.setAttribute("mode", "percentage");
        editionRateCard.appendChild(editionRateBars);
        editionBarsSection.appendChild(editionRateCard);

        const editionSection = el("div", {
          className: "edition-timeline-section",
        });

        loadEditionSummaries().then((rows) => {
          editionSection.innerHTML = "";
          if (!rows || rows.length === 0) {
            editionSection.appendChild(el("div", { className: "pct" }, "No edition data available."));
            return;
          }
          renderEditionCoverage(rows, editionSection);
        });

        function applyFilters() {
          const query = searchInput.value.toLowerCase().trim();
          tbody.querySelectorAll(".detail-row").forEach((r) => r.remove());

          for (const [group, { groupRow, catRows }] of rowsByGroup) {
            let groupVisible = false;
            for (const { row, cat } of catRows) {
              const nameMatch =
                !query || cat.name.toLowerCase().includes(query) || shortName(cat.name).toLowerCase().includes(query);
              const visible = nameMatch;
              row.style.display = visible ? "" : "none";
              if (visible) groupVisible = true;
            }
            groupRow.style.display = groupVisible ? "" : "none";
          }
        }

        container.appendChild(summary);
        container.appendChild(editionBarsSection);
        container.appendChild(editionSection);

        // --- Unsupported features (skip reasons) ---
        if (data.skip_reasons) {
          const skipEntries = Object.entries(data.skip_reasons)
            .filter(([reason]) => !isProposalSkipReason(reason))
            .sort((a, b) => b[1] - a[1]);
          if (skipEntries.length > 0) {
            const skipSection = el("div", {
              style: { marginBottom: "24px" },
            });
            skipSection.appendChild(el("h3", null, "Unsupported Features (Skipped Tests)"));
            skipSection.appendChild(
              el(
                "div",
                {
                  className: "pct",
                  style: { marginBottom: "0.75rem" },
                },
                "Non-proposal skip reasons in the official scope.",
              ),
            );
            const skipTable = el("table", { className: "cat-table" });
            const skipHead = el("thead");
            const skipHR = el("tr");
            skipHR.appendChild(el("th", null, "Feature / Reason"));
            skipHR.appendChild(el("th", { className: "num" }, "Tests Skipped"));
            skipHead.appendChild(skipHR);
            skipTable.appendChild(skipHead);
            const skipBody = el("tbody");
            for (const [reason, count] of skipEntries) {
              const row = el("tr");
              row.appendChild(el("td", null, reason));
              row.appendChild(el("td", { className: "num" }, count.toLocaleString()));
              skipBody.appendChild(row);
            }
            skipTable.appendChild(skipBody);
            skipSection.appendChild(skipTable);
            container.appendChild(skipSection);
          }
        }

        // --- Search / filter bar ---
        const filterBar = el("div", { className: "filter-bar" });
        const searchInput = el("input", {
          className: "search-box",
          type: "text",
          placeholder: "Search categories...",
        });
        searchInput.addEventListener("input", applyFilters);
        filterBar.appendChild(searchInput);
        container.appendChild(filterBar);

        // --- Error Patterns section (between filters and category table) ---
        const errorPatternsContainer = el("div");
        container.appendChild(errorPatternsContainer);
        renderErrorPatterns(errorPatternsContainer);

        container.appendChild(el("h3", null, "By Category"));

        const table = el("table", { className: "cat-table" });
        const thead = el("thead");
        const headerRow = el("tr");
        for (const [text, cls] of [
          ["Category", ""],
          ["Pass", "num"],
          ["Fail", "num"],
          ["Err", "num"],
          ["Skip", "num"],
          ["Rate", "num"],
          ["Distribution", ""],
        ]) {
          headerRow.appendChild(el("th", cls ? { className: cls } : null, text));
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = el("tbody");

        // Group categories
        const groups = new Map();
        for (const cat of data.categories) {
          const g = groupName(cat.name);
          if (!groups.has(g)) groups.set(g, []);
          groups.get(g).push(cat);
        }

        // Track rows for filtering
        const rowsByGroup = new Map();

        for (const [group, cats] of groups) {
          const gPass = cats.reduce((a, c) => a + c.pass, 0);
          const gTotal = cats.reduce((a, c) => a + c.pass + c.fail + c.skip + c.compile_error, 0);

          const groupRow = el("tr", { className: "group-header" });
          groupRow.appendChild(el("td", { colspan: "7" }, group + " (" + gPass + " pass / " + gTotal + " total)"));
          tbody.appendChild(groupRow);

          const catRows = [];

          for (const cat of cats) {
            const total = cat.pass + cat.fail + cat.skip + cat.compile_error;
            const compilable = cat.pass + cat.fail;
            const catPct = pct(cat.pass, compilable);

            const row = el("tr");
            const nameCell = el("td", { className: "cat-name clickable" }, shortName(cat.name));
            nameCell.addEventListener("click", () => toggleDetail(row, cat.name, null));
            row.appendChild(nameCell);

            const passCell = el(
              "td",
              {
                className: "num" + (cat.pass ? " clickable" : ""),
                style: { color: "var(--pass)" },
              },
              String(cat.pass),
            );
            if (cat.pass)
              passCell.addEventListener("click", (e) => {
                e.stopPropagation();
                toggleDetail(row, cat.name, "pass");
              });
            row.appendChild(passCell);

            const failCell = el(
              "td",
              {
                className: "num" + (cat.fail ? " clickable" : ""),
                style: {
                  color: cat.fail ? "var(--fail)" : "var(--text-muted)",
                },
              },
              String(cat.fail),
            );
            if (cat.fail)
              failCell.addEventListener("click", (e) => {
                e.stopPropagation();
                toggleDetail(row, cat.name, "fail");
              });
            row.appendChild(failCell);

            const errCell = el(
              "td",
              {
                className: "num" + (cat.compile_error ? " clickable" : ""),
                style: {
                  color: cat.compile_error ? "var(--error)" : "var(--text-muted)",
                },
              },
              String(cat.compile_error),
            );
            if (cat.compile_error)
              errCell.addEventListener("click", (e) => {
                e.stopPropagation();
                toggleDetail(row, cat.name, "compile_error");
              });
            row.appendChild(errCell);

            row.appendChild(el("td", { className: "num", style: { color: "var(--text-muted)" } }, String(cat.skip)));
            row.appendChild(el("td", { className: "num" }, compilable > 0 ? catPct + "%" : "\u2014"));

            const barCell = el("td", { style: { width: "120px" } });
            barCell.appendChild(makeBar(pct(cat.pass, total), pct(cat.fail, total), pct(cat.compile_error, total)));
            row.appendChild(barCell);

            tbody.appendChild(row);
            catRows.push({ row, cat });
          }

          rowsByGroup.set(group, { groupRow, catRows });
        }

        table.appendChild(tbody);
        container.appendChild(table);
      }

      async function renderErrorPatterns(container) {
        const loadingEl = el(
          "div",
          { style: { color: "var(--text-muted)", padding: "1rem" } },
          "Loading error patterns...",
        );
        container.appendChild(loadingEl);
        try {
          const map = await loadFileResults();
          loadingEl.remove();
          if (!map) {
            container.appendChild(el("div", { className: "no-data" }, "No file-level data for error patterns"));
            return;
          }

          // Group errors by normalized message
          const patterns = new Map(); // message -> { count, files: [{file, error, status}] }
          for (const [cat, files] of map) {
            for (const f of files) {
              if (f.status !== "compile_error" && f.status !== "fail") continue;
              const err = f.error || "";
              if (!err) continue;
              // Normalize: strip line numbers, file-specific details
              let key = err
                .replace(/L\d+:\d+/g, "L*:*")
                .replace(/#\d+/g, "#*")
                .replace(/"[^"]{20,}"/g, '"..."')
                .replace(/\d{3,}/g, "*");
              // Truncate to first error (before semicolon) for grouping
              const semi = key.indexOf(";");
              if (semi > 0) key = key.substring(0, semi).trim();
              if (key.length > 120) key = key.substring(0, 120) + "...";

              if (!patterns.has(key)) patterns.set(key, { count: 0, status: f.status, files: [] });
              const p = patterns.get(key);
              p.count++;
              if (p.files.length < 50) p.files.push({ file: f.file, error: err });
            }
          }

          // Sort by count descending
          const sorted = [...patterns.entries()].sort((a, b) => b[1].count - a[1].count);
          if (sorted.length === 0) return;

          container.appendChild(el("h2", null, "Error Patterns"));
          container.appendChild(
            el(
              "div",
              { className: "subtitle" },
              sorted.length + " distinct patterns across " + sorted.reduce((a, [, v]) => a + v.count, 0) + " errors",
            ),
          );

          const patternList = el("div", {
            style: { display: "flex", flexDirection: "column", gap: "0.5rem" },
          });

          // Show top 50 patterns
          for (const [pattern, data] of sorted.slice(0, 50)) {
            const card = el("div", {
              className: "card",
              style: { cursor: "pointer" },
            });
            const headerRow = el("div", {
              style: {
                display: "flex",
                alignItems: "baseline",
                gap: "0.75rem",
              },
            });

            const countBadge = el(
              "span",
              {
                style: {
                  background: data.status === "compile_error" ? "var(--error)" : "var(--fail)",
                  color: "var(--bg)",
                  fontWeight: "700",
                  fontSize: "0.75rem",
                  padding: "2px 8px",
                  borderRadius: "10px",
                  flexShrink: "0",
                },
              },
              String(data.count),
            );
            headerRow.appendChild(countBadge);

            const statusLabel = el(
              "span",
              {
                style: {
                  color: "var(--text-muted)",
                  fontSize: "0.625rem",
                  flexShrink: "0",
                },
              },
              data.status === "compile_error" ? "CE" : "FAIL",
            );
            headerRow.appendChild(statusLabel);

            const msgEl = el(
              "span",
              {
                style: {
                  fontFamily: "'SF Mono', SFMono-Regular, Consolas, monospace",
                  fontSize: "0.6875rem",
                  wordBreak: "break-word",
                },
              },
              pattern,
            );
            headerRow.appendChild(msgEl);

            card.appendChild(headerRow);

            // Expandable file list (hidden by default)
            const fileList = el("div", {
              style: {
                display: "none",
                marginTop: "0.5rem",
                borderTop: "1px solid var(--border)",
                paddingTop: "0.5rem",
              },
            });

            for (const f of data.files) {
              const fileEntry = el("div", { className: "detail-file" });
              const fname = (f.file || "").replace("test/", "");

              const fhdr = el("div", { className: "detail-file-header" });
              const lineMatch = f.error.match(/L(\d+):(\d+)\s/);
              const lineInfo = lineMatch ? ":" + lineMatch[1] : "";
              fhdr.appendChild(el("span", { className: "detail-fname" }, fname + lineInfo));
              fileEntry.appendChild(fhdr);

              // Source context placeholder
              fileEntry.appendChild(fetchSourceLines(f.file, f.error));
              fileList.appendChild(fileEntry);
            }
            if (data.count > data.files.length) {
              fileList.appendChild(
                el(
                  "div",
                  {
                    style: {
                      color: "var(--text-muted)",
                      fontSize: "0.625rem",
                      padding: "4px 0",
                    },
                  },
                  "... and " + (data.count - data.files.length) + " more files",
                ),
              );
            }

            card.appendChild(fileList);

            // Toggle expand on click
            card.addEventListener("click", () => {
              const isOpen = fileList.style.display !== "none";
              fileList.style.display = isOpen ? "none" : "block";
            });

            patternList.appendChild(card);
          }

          if (sorted.length > 50) {
            patternList.appendChild(
              el(
                "div",
                {
                  style: {
                    color: "var(--text-muted)",
                    textAlign: "center",
                    padding: "0.5rem",
                  },
                },
                "... " + (sorted.length - 50) + " more patterns",
              ),
            );
          }

          container.appendChild(patternList);
        } catch (e) {
          loadingEl.textContent = "Error loading patterns: " + e.message;
        }
      }

      async function highlightReportCode() {
        try {
          const { codeToHtml } = await import("https://esm.sh/shiki@4.0.2/bundle/web");
          const pres = document.querySelectorAll(".report-code-block");
          for (const pre of pres) {
            if (pre.dataset.highlighted === "true") continue;
            const code = pre.textContent || "";
            if (!code.trim()) continue;
            const html = await codeToHtml(code.trim(), { lang: "typescript", theme: "material-theme-ocean" });
            const match = html.match(/<code[^>]*>([\s\S]*)<\/code>/);
            if (match) {
              pre.innerHTML = match[1];
              pre.dataset.highlighted = "true";
            }
          }
        } catch {
          // Keep plain code blocks if the highlighter fails to load.
        }
      }

      function renderBenchmarks(snippets, container) {
        const section = el("div", { className: "bench-section" });
        section.appendChild(el("h2", null, "Performance Benchmarks"));
        const snippetEntries = [...snippets.entries()];
        if (snippetEntries.length > 0) {
          section.appendChild(el("h3", null, "Benchmark Code Examples"));
          const snippetGrid = el("div", { className: "bench-snippet-grid" });
          for (const [name, snippet] of snippetEntries) {
            const card = el("div", { className: "bench-snippet-card" });
            card.appendChild(el("div", { className: "bench-snippet-head" }, name.split("/")[1] || name));
            const runtimeChart = document.createElement("perf-benchmark-chart");
            runtimeChart.className = "bench-example-chart";
            runtimeChart.setAttribute("src", assetPath("benchmarks/results/latest.json"));
            runtimeChart.setAttribute("mode", "benchmark-runtime");
            runtimeChart.setAttribute("benchmark", name);
            runtimeChart.setAttribute("title", "Runtime Speed");
            runtimeChart.setAttribute("legend", "Wasm runtime speed relative to JS (larger is better)");
            card.appendChild(runtimeChart);
            card.appendChild(el("pre", { className: "report-code-block" }, snippet));
            snippetGrid.appendChild(card);
          }
          section.appendChild(snippetGrid);
        }
        container.appendChild(section);
      }
      const STRAT_COLORS = {
        js: "#8b949e",
        "host-call": "#58a6ff",
        "gc-native": "#3fb950",
        "linear-memory": "#d29922",
      };

      function renderTrends(history, container) {
        if (!history || history.length < 2) return;

        container.appendChild(el("h2", null, "Performance Trends"));
        container.appendChild(el("div", { className: "subtitle" }, history.length + " benchmark runs"));
        container.appendChild(
          makeLegend([
            ["JavaScript", STRAT_COLORS.js],
            ["Host-call", STRAT_COLORS["host-call"]],
            ["GC-native", STRAT_COLORS["gc-native"]],
            ["Linear-memory", STRAT_COLORS["linear-memory"]],
          ]),
        );

        // Collect all benchmark names that appear in at least 2 runs
        const allNames = new Set();
        for (const run of history) {
          for (const name of Object.keys(run.benchmarks)) allNames.add(name);
        }

        const benchGroups = new Map();
        for (const name of [...allNames].sort()) {
          const group = name.split("/")[0];
          if (!benchGroups.has(group)) benchGroups.set(group, []);
          benchGroups.get(group).push(name);
        }

        for (const [group, names] of benchGroups) {
          container.appendChild(el("h3", null, group.charAt(0).toUpperCase() + group.slice(1)));
          const grid = el("div", { className: "trend-grid" });

          for (const name of names) {
            // Collect data points per strategy
            const stratData = {};
            for (let i = 0; i < history.length; i++) {
              const b = history[i].benchmarks[name];
              if (!b) continue;
              for (const [strat, ms] of Object.entries(b)) {
                if (!stratData[strat]) stratData[strat] = [];
                stratData[strat].push({ idx: i, ms });
              }
            }

            // Skip if fewer than 2 data points for all strategies
            const hasData = Object.values(stratData).some((d) => d.length >= 2);
            if (!hasData) continue;

            const card = el("div", { className: "trend-card" });
            const shortN = name.split("/")[1] || name;
            const nameEl = el("div", { className: "bench-name" }, shortN);
            card.appendChild(nameEl);

            // SVG sparkline chart
            const W = 300,
              H = 80,
              PAD = 4;
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("viewBox", "0 0 " + W + " " + H);
            svg.setAttribute("preserveAspectRatio", "none");
            svg.style.height = H + "px";

            // Find global min/max across all strategies for this benchmark
            let globalMin = Infinity,
              globalMax = 0;
            for (const pts of Object.values(stratData)) {
              for (const p of pts) {
                if (p.ms < globalMin) globalMin = p.ms;
                if (p.ms > globalMax) globalMax = p.ms;
              }
            }
            if (globalMax === globalMin) globalMax = globalMin + 1;
            // Add 10% padding
            const range = globalMax - globalMin;
            globalMin = Math.max(0, globalMin - range * 0.1);
            globalMax = globalMax + range * 0.1;

            const xScale = (idx) => PAD + (idx / (history.length - 1)) * (W - 2 * PAD);
            const yScale = (ms) => PAD + (1 - (ms - globalMin) / (globalMax - globalMin)) * (H - 2 * PAD);

            // Draw lines for each strategy
            for (const [strat, pts] of Object.entries(stratData)) {
              if (pts.length < 2) continue;
              const color = STRAT_COLORS[strat] || "#888";

              let d = "";
              for (let i = 0; i < pts.length; i++) {
                const x = xScale(pts[i].idx);
                const y = yScale(pts[i].ms);
                d += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
              }

              const path = document.createElementNS(svgNS, "path");
              path.setAttribute("d", d);
              path.setAttribute("fill", "none");
              path.setAttribute("stroke", color);
              path.setAttribute("stroke-width", "2");
              path.setAttribute("stroke-linecap", "round");
              path.setAttribute("stroke-linejoin", "round");
              svg.appendChild(path);

              // Draw dots at each point
              for (const p of pts) {
                const circle = document.createElementNS(svgNS, "circle");
                circle.setAttribute("cx", xScale(p.idx).toFixed(1));
                circle.setAttribute("cy", yScale(p.ms).toFixed(1));
                circle.setAttribute("r", "3");
                circle.setAttribute("fill", color);
                svg.appendChild(circle);
              }
            }

            card.appendChild(svg);

            // Show delta for the primary strategy (host-call preferred, then gc-native, then js)
            const primaryStrat = stratData["host-call"] ? "host-call" : stratData["gc-native"] ? "gc-native" : "js";
            const pts = stratData[primaryStrat];
            if (pts && pts.length >= 2) {
              const first = pts[0].ms;
              const last = pts[pts.length - 1].ms;
              const delta = ((last - first) / first) * 100;
              const meta = el("div", { className: "trend-meta" });

              const firstDate = history[pts[0].idx].timestamp.split("T")[0];
              const lastDate = history[pts[pts.length - 1].idx].timestamp.split("T")[0];
              meta.appendChild(el("span", null, firstDate + " \u2192 " + lastDate));

              const deltaClass = delta < -5 ? "improved" : delta > 5 ? "regressed" : "neutral";
              const deltaText = delta > 0 ? "+" + delta.toFixed(0) + "%" : delta.toFixed(0) + "%";
              meta.appendChild(
                el("span", { className: "trend-delta " + deltaClass }, deltaText + " (" + primaryStrat + ")"),
              );

              card.appendChild(meta);
            }

            grid.appendChild(card);
          }
          container.appendChild(grid);
        }
      }

      async function main() {
        const [conformance, history, snippets] = await Promise.all([
          loadReportWithFallback(),
          loadJSON(assetPath("benchmarks/results/history.json")),
          loadBenchmarkSnippets(),
        ]);
        const app = document.getElementById("app");
        app.textContent = "";

        if (conformance) {
          renderConformance(conformance, app);
        } else {
          app.appendChild(
            el("div", { className: "no-data" }, "No test262 report found. Run: npx vitest run tests/test262.test.ts"),
          );
        }

        renderBenchmarks(snippets, app);
        await highlightReportCode();

        if (history && history.length >= 2) {
          renderTrends(history, app);
        }

        // Timestamp is now rendered inside renderConformance
      }

      main();
    </script>
    <script type="module" src="../components/perf-benchmark-chart.js"></script>
    <script src="../components/site-nav.js"></script>
    <script src="../components/t262-charts.js"></script>
  </body>
